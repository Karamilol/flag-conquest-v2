<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Teleportation sparkle burst -->
  <!-- Background flash -->
  <circle cx="16" cy="16" r="12" fill="#8855cc" opacity="0.1"/>
  <!-- Afterimage (fading figure silhouette) -->
  <g opacity="0.2">
    <circle cx="10" cy="10" r="2.5" fill="#aa88ff"/>
    <rect x="8.5" y="12" width="3" height="6" rx="1" fill="#aa88ff"/>
  </g>
  <!-- Teleport trail -->
  <path d="M10,14 Q14,12 16,16 Q18,20 22,18" fill="none" stroke="#bb99ff" stroke-width="1" opacity="0.4" stroke-linecap="round" stroke-dasharray="2,2"/>
  <!-- Arrival burst - main star -->
  <g transform="translate(22,18)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5Z" fill="#cc99ff" opacity="0.7"/>
    <path d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z" fill="#eeddff" opacity="0.8"/>
  </g>
  <!-- Secondary sparkles -->
  <g fill="#bb99ff">
    <path d="M6,22 L6.5,20 L7,22 L9,21.5 L7,22.5 L6.5,24 L6,22.5 L4,21.5Z" opacity="0.5"/>
    <path d="M26,8 L26.3,6.5 L26.6,8 L28,7.5 L26.6,8.3 L26.3,9.5 L26,8.3 L24.5,7.5Z" opacity="0.4"/>
    <path d="M16,4 L16.3,2.5 L16.6,4 L18,3.5 L16.6,4.3 L16.3,5.5 L16,4.3 L14.5,3.5Z" opacity="0.45"/>
  </g>
  <!-- Scattered particles -->
  <circle cx="14" cy="20" r="0.6" fill="#ddbbff" opacity="0.5"/>
  <circle cx="20" cy="12" r="0.5" fill="#ddbbff" opacity="0.4"/>
  <circle cx="26" cy="22" r="0.4" fill="#ddbbff" opacity="0.4"/>
  <circle cx="18" cy="26" r="0.5" fill="#ddbbff" opacity="0.35"/>
  <circle cx="8" cy="16" r="0.4" fill="#ddbbff" opacity="0.35"/>
  <!-- Disappear rings at origin -->
  <circle cx="10" cy="12" r="4" fill="none" stroke="#aa88ff" stroke-width="0.4" opacity="0.2"/>
  <circle cx="10" cy="12" r="6" fill="none" stroke="#aa88ff" stroke-width="0.3" opacity="0.15"/>
</svg>