<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Raccoon face with gold coin -->
  <!-- Face shape -->
  <ellipse cx="16" cy="14" rx="10" ry="9" fill="#888888"/>
  <!-- Darker mask -->
  <path d="M6,10 Q10,8 16,10 Q22,8 26,10 L26,16 Q22,14 16,16 Q10,14 6,16Z" fill="#333333"/>
  <!-- Eyes in mask -->
  <circle cx="11" cy="12" r="2" fill="#111111"/>
  <circle cx="11.5" cy="11.5" r="0.8" fill="#88ff88" opacity="0.8"/>
  <circle cx="11.5" cy="11.5" r="0.3" fill="#ffffff"/>
  <circle cx="21" cy="12" r="2" fill="#111111"/>
  <circle cx="21.5" cy="11.5" r="0.8" fill="#88ff88" opacity="0.8"/>
  <circle cx="21.5" cy="11.5" r="0.3" fill="#ffffff"/>
  <!-- Lighter patches above eyes -->
  <ellipse cx="11" cy="9" rx="2.5" ry="1" fill="#aaaaaa" opacity="0.5"/>
  <ellipse cx="21" cy="9" rx="2.5" ry="1" fill="#aaaaaa" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="16" cy="16" rx="1.5" ry="1" fill="#222222"/>
  <!-- Mouth -->
  <path d="M14,17.5 Q16,19 18,17.5" fill="none" stroke="#222222" stroke-width="0.5"/>
  <!-- Ears -->
  <ellipse cx="8" cy="6" rx="3" ry="2.5" fill="#777777"/>
  <ellipse cx="8" cy="6" rx="1.5" ry="1.2" fill="#aa8888" opacity="0.5"/>
  <ellipse cx="24" cy="6" rx="3" ry="2.5" fill="#777777"/>
  <ellipse cx="24" cy="6" rx="1.5" ry="1.2" fill="#aa8888" opacity="0.5"/>
  <!-- Gold coin in mouth -->
  <circle cx="16" cy="24" r="4.5" fill="#daa520" stroke="#b8860b" stroke-width="0.6"/>
  <circle cx="16" cy="24" r="3" fill="none" stroke="#b8860b" stroke-width="0.4"/>
  <text x="16" y="26" text-anchor="middle" font-size="5" font-weight="bold" fill="#8B6914">G</text>
  <path d="M14,22 Q14.5,21.5 15.5,21.5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
</svg>