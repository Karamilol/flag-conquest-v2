<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- All-seeing eye with golden glow -->
  <!-- Outer glow -->
  <ellipse cx="16" cy="16" rx="14" ry="9" fill="#ddaa22" opacity="0.1"/>
  <!-- Eye shape -->
  <path d="M2,16 Q8,6 16,6 Q24,6 30,16 Q24,26 16,26 Q8,26 2,16Z" fill="#2a6f4f"/>
  <!-- Eye inner -->
  <path d="M4,16 Q9,8 16,8 Q23,8 28,16 Q23,24 16,24 Q9,24 4,16Z" fill="#3a8f5f"/>
  <!-- Iris -->
  <circle cx="16" cy="16" r="6" fill="#44aa66"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#2a7744" stroke-width="0.5"/>
  <!-- Iris detail -->
  <path d="M16,10 L15,14 L16,11Z" fill="#55bb77" opacity="0.5"/>
  <path d="M22,16 L18,15 L21,16Z" fill="#55bb77" opacity="0.5"/>
  <path d="M16,22 L17,18 L16,21Z" fill="#55bb77" opacity="0.5"/>
  <path d="M10,16 L14,17 L11,16Z" fill="#55bb77" opacity="0.5"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="3" fill="#1a2a1e"/>
  <!-- Pupil highlight -->
  <circle cx="14.5" cy="14.5" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="17.5" cy="17" r="0.5" fill="#ffffff" opacity="0.4"/>
  <!-- Eye outline -->
  <path d="M2,16 Q8,6 16,6 Q24,6 30,16 Q24,26 16,26 Q8,26 2,16Z" fill="none" stroke="#1a4a2f" stroke-width="0.8"/>
  <!-- Perception lines -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#88ddaa" stroke-width="0.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="6" y1="6" x2="8" y2="8" stroke="#88ddaa" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="26" y1="6" x2="24" y2="8" stroke="#88ddaa" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="16" y1="30" x2="16" y2="27" stroke="#88ddaa" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
</svg>