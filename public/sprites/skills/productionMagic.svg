<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Gold chest being magically conjured -->
  <!-- Magic circle below -->
  <ellipse cx="16" cy="26" rx="10" ry="3" fill="#cc9900" opacity="0.15"/>
  <ellipse cx="16" cy="26" rx="10" ry="3" fill="none" stroke="#ddaa22" stroke-width="0.5" opacity="0.3"/>
  <!-- Chest body -->
  <rect x="7" y="16" width="18" height="10" rx="1" fill="#8B6914"/>
  <!-- Chest lid -->
  <path d="M6,16 Q6,12 16,11 Q26,12 26,16Z" fill="#a07a1e"/>
  <path d="M7,16 Q7,13 16,12 Q25,13 25,16Z" fill="#b08a2e" opacity="0.5"/>
  <!-- Chest lock -->
  <rect x="14" y="15" width="4" height="3" rx="0.5" fill="#daa520"/>
  <circle cx="16" cy="16.5" r="0.6" fill="#8B6914"/>
  <!-- Chest bands -->
  <rect x="7" y="19" width="18" height="1" fill="#6a4a10" opacity="0.4"/>
  <rect x="7" y="23" width="18" height="1" fill="#6a4a10" opacity="0.4"/>
  <!-- Chest highlight -->
  <path d="M8,17 L24,17" fill="none" stroke="#c4984a" stroke-width="0.5" opacity="0.3"/>
  <!-- Magic conjuring sparkles above -->
  <g fill="#ffdd44" opacity="0.6">
    <path d="M10,8 L10.5,6 L11,8 L13,7.5 L11,8.5 L10.5,10 L10,8.5 L8,7.5Z"/>
  </g>
  <g fill="#ffdd44" opacity="0.5">
    <path d="M22,6 L22.3,4.5 L22.6,6 L24,5.5 L22.6,6.3 L22.3,7.5 L22,6.3 L20.5,5.5Z"/>
  </g>
  <g fill="#ffee88" opacity="0.45">
    <path d="M16,4 L16.4,2 L16.8,4 L18.5,3.3 L16.8,4.4 L16.4,6 L16,4.4 L14,3.3Z"/>
  </g>
  <!-- Gold coins spilling -->
  <circle cx="10" cy="14" r="1.5" fill="#daa520" stroke="#b8860b" stroke-width="0.3"/>
  <circle cx="22" cy="13" r="1.3" fill="#daa520" stroke="#b8860b" stroke-width="0.3"/>
  <circle cx="16" cy="10" r="1.5" fill="#eebb33" stroke="#cc9922" stroke-width="0.3"/>
  <!-- Magic particles rising -->
  <circle cx="8" cy="12" r="0.4" fill="#ffcc44" opacity="0.4"/>
  <circle cx="24" cy="10" r="0.5" fill="#ffcc44" opacity="0.35"/>
</svg>