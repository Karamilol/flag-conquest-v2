<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rain of arrows from sky -->
  <!-- Dark cloud -->
  <ellipse cx="16" cy="5" rx="12" ry="4" fill="#556677" opacity="0.5"/>
  <ellipse cx="14" cy="4" rx="6" ry="3" fill="#667788" opacity="0.4"/>
  <!-- Arrows raining down -->
  <g fill="#8899aa">
    <!-- Arrow 1 -->
    <line x1="6" y1="10" x2="8" y2="24" stroke="#8B6914" stroke-width="0.8"/>
    <path d="M8,24 L7,21 L8,22 L9,21Z" fill="#8899aa"/>
    <!-- Arrow 2 -->
    <line x1="11" y1="8" x2="12" y2="22" stroke="#8B6914" stroke-width="0.8"/>
    <path d="M12,22 L11,19 L12,20 L13,19Z" fill="#8899aa"/>
    <!-- Arrow 3 -->
    <line x1="16" y1="9" x2="16" y2="26" stroke="#8B6914" stroke-width="0.8"/>
    <path d="M16,26 L15,23 L16,24 L17,23Z" fill="#8899aa"/>
    <!-- Arrow 4 -->
    <line x1="21" y1="8" x2="20" y2="23" stroke="#8B6914" stroke-width="0.8"/>
    <path d="M20,23 L19,20 L20,21 L21,20Z" fill="#8899aa"/>
    <!-- Arrow 5 -->
    <line x1="26" y1="10" x2="24" y2="25" stroke="#8B6914" stroke-width="0.8"/>
    <path d="M24,25 L23,22 L24,23 L25,22Z" fill="#8899aa"/>
  </g>
  <!-- Fletching details -->
  <path d="M5.5,10.5 L6,9 L7,11Z" fill="#cc4444" opacity="0.6"/>
  <path d="M10.5,8.5 L11,7 L12,9Z" fill="#cc4444" opacity="0.6"/>
  <path d="M15.5,9.5 L16,8 L17,10Z" fill="#cc4444" opacity="0.6"/>
  <path d="M20.5,8.5 L21,7 L22,9Z" fill="#cc4444" opacity="0.6"/>
  <path d="M25.5,10.5 L26,9 L27,11Z" fill="#cc4444" opacity="0.6"/>
  <!-- Ground impact dust -->
  <ellipse cx="8" cy="26" rx="2" ry="0.8" fill="#aa9977" opacity="0.3"/>
  <ellipse cx="16" cy="28" rx="2.5" ry="0.8" fill="#aa9977" opacity="0.3"/>
  <ellipse cx="24" cy="27" rx="2" ry="0.8" fill="#aa9977" opacity="0.3"/>
</svg>