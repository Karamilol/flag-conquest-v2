<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Powerful lightning bolt -->
  <!-- Background glow -->
  <ellipse cx="16" cy="16" rx="10" ry="14" fill="#8855cc" opacity="0.1"/>
  <!-- Main bolt -->
  <path d="M18,1 L12,13 L17,13 L10,31 L14,18 L9,18 L18,1Z" fill="#ffdd44"/>
  <!-- Bright core -->
  <path d="M17,3 L13,13 L16,13 L12,28 L14.5,18 L11,18 L17,3Z" fill="#ffffff" opacity="0.6"/>
  <!-- Electric edges -->
  <path d="M12,13 L10,11 L12,12" fill="none" stroke="#ffee88" stroke-width="0.5" opacity="0.5"/>
  <path d="M17,13 L19,12 L17.5,13.5" fill="none" stroke="#ffee88" stroke-width="0.5" opacity="0.5"/>
  <path d="M14,18 L16,19 L14.5,18.5" fill="none" stroke="#ffee88" stroke-width="0.5" opacity="0.5"/>
  <path d="M9,18 L7,17 L9,17.5" fill="none" stroke="#ffee88" stroke-width="0.5" opacity="0.5"/>
  <!-- Side sparks -->
  <line x1="8" y1="8" x2="5" y2="6" stroke="#ddcc44" stroke-width="0.6" opacity="0.6" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="25" y2="8" stroke="#ddcc44" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="6" y1="22" x2="3" y2="24" stroke="#ddcc44" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="24" y2="22" stroke="#ddcc44" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Impact glow at bottom -->
  <ellipse cx="12" cy="30" rx="5" ry="2" fill="#ffdd44" opacity="0.2"/>
  <!-- Spark dots -->
  <circle cx="6" cy="10" r="0.5" fill="#ffee88" opacity="0.6"/>
  <circle cx="24" cy="14" r="0.6" fill="#ffee88" opacity="0.5"/>
  <circle cx="4" cy="20" r="0.4" fill="#ffee88" opacity="0.5"/>
  <circle cx="26" cy="24" r="0.5" fill="#ffee88" opacity="0.4"/>
</svg>