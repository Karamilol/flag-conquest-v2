<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blood-dripping sword -->
  <!-- Blade -->
  <path d="M15,2 L17,2 L18,22 L16,24 L14,22Z" fill="#a0aab8"/>
  <!-- Blade highlight -->
  <path d="M15.2,3 L16,2.5 L16,22 L15.2,21Z" fill="#c0ccd8" opacity="0.6"/>
  <!-- Blade edge -->
  <path d="M16.8,3 L17,2.5 L18,22 L16.8,21Z" fill="#8090a0" opacity="0.4"/>
  <!-- Blood on blade -->
  <path d="M14.5,10 Q14,12 14.8,14 L15.5,14 Q15,12 15.5,10Z" fill="#990022" opacity="0.8"/>
  <path d="M17,8 Q17.8,10 17.5,13 L16.8,13 Q17.2,10 16.5,8Z" fill="#990022" opacity="0.7"/>
  <!-- Guard/crossguard -->
  <rect x="11" y="22" width="10" height="2" rx="0.5" fill="#8B6914"/>
  <rect x="11" y="22" width="10" height="0.8" rx="0.3" fill="#c4984a" opacity="0.5"/>
  <!-- Grip -->
  <rect x="14.5" y="24" width="3" height="4" rx="0.5" fill="#4a3010"/>
  <rect x="14.5" y="24.5" width="3" height="0.6" rx="0.2" fill="#6a4a20" opacity="0.5"/>
  <rect x="14.5" y="25.8" width="3" height="0.6" rx="0.2" fill="#6a4a20" opacity="0.5"/>
  <rect x="14.5" y="27" width="3" height="0.6" rx="0.2" fill="#6a4a20" opacity="0.5"/>
  <!-- Pommel -->
  <circle cx="16" cy="29" r="1.5" fill="#8B6914"/>
  <circle cx="15.5" cy="28.5" r="0.5" fill="#c4984a" opacity="0.4"/>
  <!-- Blood drips from blade -->
  <path d="M14,14 Q13.5,16 14,17.5" fill="none" stroke="#880022" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="14" cy="18" r="0.6" fill="#880022"/>
  <path d="M17.5,13 Q18,15 17.5,17" fill="none" stroke="#880022" stroke-width="0.7" stroke-linecap="round"/>
  <ellipse cx="17.5" cy="17.5" rx="0.5" ry="0.7" fill="#880022"/>
</svg>