<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Golden wheat bundle with coins -->
  <!-- Wheat stalks -->
  <line x1="10" y1="28" x2="12" y2="10" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="15" y2="8" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="17" y2="9" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="28" x2="20" y2="11" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <!-- Wheat heads -->
  <ellipse cx="12" cy="8" rx="1.5" ry="3.5" fill="#daa520" transform="rotate(-5 12 8)"/>
  <ellipse cx="15" cy="6" rx="1.5" ry="3.5" fill="#daa520"/>
  <ellipse cx="17" cy="7" rx="1.5" ry="3.5" fill="#daa520" transform="rotate(3 17 7)"/>
  <ellipse cx="20" cy="9" rx="1.5" ry="3.5" fill="#daa520" transform="rotate(8 20 9)"/>
  <!-- Wheat head highlights -->
  <ellipse cx="11.5" cy="7" rx="0.6" ry="2" fill="#eebb33" opacity="0.5" transform="rotate(-5 11.5 7)"/>
  <ellipse cx="14.5" cy="5" rx="0.6" ry="2" fill="#eebb33" opacity="0.5"/>
  <ellipse cx="16.5" cy="6" rx="0.6" ry="2" fill="#eebb33" opacity="0.5"/>
  <!-- Wheat whiskers -->
  <line x1="12" y1="5" x2="10" y2="2" stroke="#daa520" stroke-width="0.4" opacity="0.7"/>
  <line x1="15" y1="3" x2="14" y2="1" stroke="#daa520" stroke-width="0.4" opacity="0.7"/>
  <line x1="17" y1="4" x2="18" y2="1" stroke="#daa520" stroke-width="0.4" opacity="0.7"/>
  <line x1="20" y1="6" x2="22" y2="3" stroke="#daa520" stroke-width="0.4" opacity="0.7"/>
  <!-- Binding ribbon -->
  <path d="M9,22 Q16,20 23,22" fill="none" stroke="#cc9900" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gold coin -->
  <circle cx="25" cy="25" r="4" fill="#daa520" stroke="#b8860b" stroke-width="0.6"/>
  <circle cx="25" cy="25" r="2.8" fill="none" stroke="#b8860b" stroke-width="0.4"/>
  <text x="25" y="27" text-anchor="middle" font-size="5" font-weight="bold" fill="#8B6914">$</text>
  <!-- Coin shine -->
  <path d="M23,23 Q23.5,22 24.5,22" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5" stroke-linecap="round"/>
</svg>