<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Left horn -->
  <path d="M6,12 Q3,6 2,2 Q1,0 3,1 Q6,3 8,8 Q9,10 8,12" fill="#4a3a20" stroke="#3a2a15" stroke-width="0.5"/>
  <path d="M5,10 Q3,6 3,3" fill="none" stroke="#6a5a30" stroke-width="0.5" opacity="0.4"/>
  <!-- Horn ridges left -->
  <path d="M4,5 Q5,4 6,5" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>
  <path d="M5,7 Q6,6 7,7" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>
  <path d="M6,9 Q7,8 8,9" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>

  <!-- Right horn -->
  <path d="M26,12 Q29,6 30,2 Q31,0 29,1 Q26,3 24,8 Q23,10 24,12" fill="#4a3a20" stroke="#3a2a15" stroke-width="0.5"/>
  <path d="M27,10 Q29,6 29,3" fill="none" stroke="#6a5a30" stroke-width="0.5" opacity="0.4"/>
  <!-- Horn ridges right -->
  <path d="M28,5 Q27,4 26,5" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>
  <path d="M27,7 Q26,6 25,7" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>
  <path d="M26,9 Q25,8 24,9" fill="none" stroke="#3a2a15" stroke-width="0.3" opacity="0.5"/>

  <!-- Skull -->
  <path d="M8,10 Q8,5 16,4 Q24,5 24,10 L24,18 Q24,22 20,22 L12,22 Q8,22 8,18 Z" fill="#c0b8a0" stroke="#8a8270" stroke-width="0.5"/>
  <!-- Skull shading -->
  <path d="M10,7 Q16,5 22,7" fill="none" stroke="#d0c8b0" stroke-width="0.8" opacity="0.4"/>
  <path d="M9,10 Q9,7 13,5.5" fill="none" stroke="#a09880" stroke-width="0.5" opacity="0.4"/>
  <path d="M23,10 Q23,7 19,5.5" fill="none" stroke="#a09880" stroke-width="0.5" opacity="0.4"/>
  <!-- Brow ridge -->
  <path d="M9,11 Q12,9 16,10 Q20,9 23,11" fill="none" stroke="#8a8270" stroke-width="0.8"/>

  <!-- Left eye socket - glowing red -->
  <path d="M10,12 Q10,10 13,10 Q14.5,10 14.5,12 Q14.5,15 13,15 Q10,15 10,12" fill="#1a0a0a" stroke="#0a0505" stroke-width="0.3"/>
  <ellipse cx="12.5" cy="12" rx="1.2" ry="1" fill="#8B1A1A" opacity="0.7"/>
  <ellipse cx="12.5" cy="12" rx="0.6" ry="0.5" fill="#cc3030" opacity="0.5"/>
  <circle cx="12" cy="11.5" r="0.3" fill="#ff5050" opacity="0.4"/>

  <!-- Right eye socket - glowing red -->
  <path d="M17.5,12 Q17.5,10 19,10 Q22,10 22,12 Q22,15 19,15 Q17.5,15 17.5,12" fill="#1a0a0a" stroke="#0a0505" stroke-width="0.3"/>
  <ellipse cx="19.5" cy="12" rx="1.2" ry="1" fill="#8B1A1A" opacity="0.7"/>
  <ellipse cx="19.5" cy="12" rx="0.6" ry="0.5" fill="#cc3030" opacity="0.5"/>
  <circle cx="19" cy="11.5" r="0.3" fill="#ff5050" opacity="0.4"/>

  <!-- Nose -->
  <path d="M14.5,15 L16,14 L17.5,15 L16,17 Z" fill="#2a2a1a" stroke="#1a1a0a" stroke-width="0.2"/>

  <!-- Fangs/teeth - jagged -->
  <path d="M10,19 L11,21 L12,19 L13.5,22 L15,19 L16,21.5 L17,19 L18.5,22 L20,19 L21,21 L22,19" fill="none" stroke="#d0c8b0" stroke-width="1" stroke-linecap="round"/>
  <!-- Upper jaw -->
  <path d="M9,19 L23,19" stroke="#8a8270" stroke-width="0.5"/>
  <!-- Lower jaw -->
  <path d="M9,19 L9,22 Q9,25 12,25 L20,25 Q23,25 23,22 L23,19" fill="none" stroke="#8a8270" stroke-width="0.5"/>
  <path d="M10,23 L22,23" stroke="#a09880" stroke-width="0.3" opacity="0.4"/>

  <!-- Skull cracks -->
  <path d="M14,5 L15,8 L14,10" fill="none" stroke="#8a8270" stroke-width="0.3" opacity="0.5"/>
  <path d="M20,6 L19,8" fill="none" stroke="#8a8270" stroke-width="0.3" opacity="0.4"/>

  <!-- Crown/trophy mark on forehead -->
  <path d="M13,7 L14,6 L16,8 L18,6 L19,7" fill="none" stroke="#c9a020" stroke-width="0.5" opacity="0.5"/>

  <!-- Red glow effect -->
  <ellipse cx="16" cy="12" rx="10" ry="6" fill="#8B1A1A" opacity="0.06"/>
  <!-- Ground shadow -->
  <ellipse cx="16" cy="30" rx="10" ry="1.5" fill="#000" opacity="0.12"/>
</svg>