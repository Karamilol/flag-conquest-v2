<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cave mouth / dungeon entrance -->
  <path d="M4,28 L4,14 Q4,8 10,6 Q16,4 22,6 Q28,8 28,14 L28,28 Z" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Cave interior darkness gradient -->
  <path d="M6,28 L6,15 Q6,10 12,8 Q16,7 20,8 Q26,10 26,15 L26,28 Z" fill="#1a1a1a" opacity="0.8"/>
  <path d="M8,28 L8,16 Q8,12 14,10 Q16,9 18,10 Q24,12 24,16 L24,28 Z" fill="#0a0a0a" opacity="0.6"/>
  <!-- Cave rock details -->
  <path d="M4,14 Q5,12 6,14" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.5"/>
  <path d="M26,14 Q27,12 28,14" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.5"/>
  <path d="M7,20 Q6,18 5,20" fill="none" stroke="#3a3a3a" stroke-width="0.4" opacity="0.4"/>
  <path d="M27,22 Q26,20 25,22" fill="none" stroke="#3a3a3a" stroke-width="0.4" opacity="0.4"/>
  <!-- Stalactites -->
  <path d="M12,7 L12.5,11 L13,7" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.3"/>
  <path d="M18,6.5 L18.5,9 L19,6.5" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.3"/>
  <path d="M15,6 L15.3,8 L15.6,6" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.3"/>

  <!-- Stone arch frame -->
  <path d="M3,28 L3,14 Q3,7 10,5 Q16,3 22,5 Q29,7 29,14 L29,28" fill="none" stroke="#5a5a5a" stroke-width="1.5"/>
  <path d="M3.5,28 L3.5,14 Q3.5,8 10,6" fill="none" stroke="#7a7a7a" stroke-width="0.5" opacity="0.4"/>

  <!-- Pickaxe handle -->
  <path d="M2,4 L14,22" stroke="#6a4a20" stroke-width="2" stroke-linecap="round"/>
  <path d="M2.5,4.5 L13.5,21" stroke="#8B6914" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <!-- Pickaxe head -->
  <path d="M1,3 Q0,1 2,1 Q5,1 7,3 Q8,4 7,5 Q6,5 5,4 Q3,3 2,3 Z" fill="#8a8a9a" stroke="#5a5a6a" stroke-width="0.4"/>
  <path d="M2,1.5 Q4,1.5 6,3" fill="none" stroke="#b0b0c0" stroke-width="0.4" opacity="0.4"/>
  <!-- Pickaxe back spike -->
  <path d="M2,3 Q1,5 0,6 Q0,7 1,6.5 Q2,6 3,4" fill="#8a8a9a" stroke="#5a5a6a" stroke-width="0.3"/>

  <!-- Eerie glow from inside -->
  <ellipse cx="16" cy="22" rx="5" ry="4" fill="#2a4a2a" opacity="0.3"/>
  <ellipse cx="16" cy="22" rx="3" ry="2.5" fill="#3a6a3a" opacity="0.2"/>
  <!-- Glowing eyes in the dark -->
  <circle cx="14" cy="20" r="0.5" fill="#4a8a4a" opacity="0.6"/>
  <circle cx="18" cy="20" r="0.5" fill="#4a8a4a" opacity="0.6"/>
  <circle cx="14" cy="20" r="0.3" fill="#6aba6a" opacity="0.4"/>
  <circle cx="18" cy="20" r="0.3" fill="#6aba6a" opacity="0.4"/>

  <!-- Ground -->
  <path d="M0,28 L32,28" stroke="#5a4a30" stroke-width="1" opacity="0.5"/>
</svg>