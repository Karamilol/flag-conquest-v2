<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Top cap -->
  <path d="M8,4 L24,4 Q26,4 26,6 L24,7 L8,7 L6,6 Q6,4 8,4 Z" fill="#c9a020" stroke="#8B6914" stroke-width="0.5"/>
  <path d="M9,4.5 L23,4.5" stroke="#e0c040" stroke-width="0.5" opacity="0.5"/>
  <!-- Top ornamental ring -->
  <rect x="7" y="6.5" width="18" height="1.5" rx="0.3" fill="#b08a18" stroke="#8B6914" stroke-width="0.3"/>
  <path d="M8,7 L24,7" stroke="#d4b040" stroke-width="0.4" opacity="0.4"/>

  <!-- Top glass bulb -->
  <path d="M9,8 L9,11 Q9,16 16,16 Q23,16 23,11 L23,8 Z" fill="#e8d8b0" stroke="#8B7355" stroke-width="0.4" opacity="0.8"/>
  <!-- Sand in top (partially emptied) -->
  <path d="M10,11 Q10,13 16,16 Q15,14 12,13 Q10,12 10,11" fill="#c9a860" opacity="0.5"/>
  <path d="M22,11 Q22,13 16,16 Q17,14 20,13 Q22,12 22,11" fill="#c9a860" opacity="0.5"/>
  <!-- Falling sand stream -->
  <path d="M16,16 L16,17" stroke="#c9a860" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <!-- Sand particles falling -->
  <circle cx="15.5" cy="17.5" r="0.3" fill="#c9a860" opacity="0.4"/>
  <circle cx="16.3" cy="18" r="0.2" fill="#c9a860" opacity="0.3"/>

  <!-- Narrow waist -->
  <path d="M13,15 Q16,17 19,15" fill="none" stroke="#8B7355" stroke-width="0.4" opacity="0.5"/>
  <path d="M13,17 Q16,15 19,17" fill="none" stroke="#8B7355" stroke-width="0.4" opacity="0.5"/>

  <!-- Bottom glass bulb -->
  <path d="M9,24 L9,17 Q9,16 16,16 Q23,16 23,17 L23,24 Z" fill="#e8d8b0" stroke="#8B7355" stroke-width="0.4" opacity="0.8"/>
  <!-- Sand pile in bottom -->
  <path d="M10,24 Q10,20 16,18 Q22,20 22,24 Z" fill="#c9a860" opacity="0.6"/>
  <path d="M11,24 Q12,21 16,19 Q20,21 21,24" fill="#d4b870" opacity="0.4"/>
  <!-- Glass highlight -->
  <path d="M10,9 Q10,12 13,14" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.25"/>
  <path d="M10,19 Q10,22 12,23" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom ornamental ring -->
  <rect x="7" y="24" width="18" height="1.5" rx="0.3" fill="#b08a18" stroke="#8B6914" stroke-width="0.3"/>
  <path d="M8,24.5 L24,24.5" stroke="#d4b040" stroke-width="0.4" opacity="0.4"/>
  <!-- Bottom cap -->
  <path d="M8,25.5 L24,25.5 Q26,25.5 26,27.5 L24,28.5 L8,28.5 L6,27.5 Q6,25.5 8,25.5 Z" fill="#c9a020" stroke="#8B6914" stroke-width="0.5"/>
  <path d="M9,26 L23,26" stroke="#e0c040" stroke-width="0.5" opacity="0.5"/>

  <!-- Frame pillars -->
  <path d="M9,8 L9,24" stroke="#b08a18" stroke-width="1" stroke-linecap="round"/>
  <path d="M23,8 L23,24" stroke="#b08a18" stroke-width="1" stroke-linecap="round"/>
  <path d="M9.3,8 L9.3,24" stroke="#d4b040" stroke-width="0.3" opacity="0.3"/>
  <path d="M23.3,8 L23.3,24" stroke="#d4b040" stroke-width="0.3" opacity="0.3"/>

  <!-- Subtle golden glow -->
  <ellipse cx="16" cy="16" rx="8" ry="10" fill="#c9a020" opacity="0.06"/>
</svg>