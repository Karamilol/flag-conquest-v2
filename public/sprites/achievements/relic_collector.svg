<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Soft stone glow -->
  <ellipse cx="16" cy="16" rx="12" ry="12" fill="#c8b898" opacity="0.06"/>
  <!-- Base/floor -->
  <rect x="2" y="27" width="28" height="3" rx="0.5" fill="#6a6050"/>
  <rect x="2" y="27" width="28" height="1.5" rx="0.3" fill="#7a7060" opacity="0.5"/>
  <!-- Left pillar -->
  <rect x="4" y="8" width="4" height="19" fill="#8a8070"/>
  <rect x="4.5" y="8.5" width="3" height="18" fill="#9a9080"/>
  <rect x="5" y="9" width="1.2" height="17" fill="#aaa090" opacity="0.3"/>
  <!-- Left pillar fluting -->
  <line x1="5.5" y1="10" x2="5.5" y2="26" stroke="#706860" stroke-width="0.3" opacity="0.4"/>
  <line x1="6.5" y1="10" x2="6.5" y2="26" stroke="#706860" stroke-width="0.3" opacity="0.4"/>
  <!-- Left pillar capital -->
  <path d="M3,8 L9,8 L8.5,6 Q6,5 3.5,6 Z" fill="#8a8070"/>
  <path d="M3.5,7.5 L8.5,7.5 L8,6.5 Q6,5.5 4,6.5 Z" fill="#9a9080" opacity="0.6"/>
  <!-- Left pillar base -->
  <rect x="3" y="25" width="6" height="2" rx="0.3" fill="#7a7060"/>
  <rect x="3" y="25" width="6" height="1" rx="0.2" fill="#8a8070" opacity="0.5"/>
  <!-- Right pillar -->
  <rect x="24" y="8" width="4" height="19" fill="#8a8070"/>
  <rect x="24.5" y="8.5" width="3" height="18" fill="#9a9080"/>
  <rect x="25" y="9" width="1.2" height="17" fill="#aaa090" opacity="0.3"/>
  <!-- Right pillar fluting -->
  <line x1="25.5" y1="10" x2="25.5" y2="26" stroke="#706860" stroke-width="0.3" opacity="0.4"/>
  <line x1="26.5" y1="10" x2="26.5" y2="26" stroke="#706860" stroke-width="0.3" opacity="0.4"/>
  <!-- Right pillar capital -->
  <path d="M23,8 L29,8 L28.5,6 Q26,5 23.5,6 Z" fill="#8a8070"/>
  <path d="M23.5,7.5 L28.5,7.5 L28,6.5 Q26,5.5 24,6.5 Z" fill="#9a9080" opacity="0.6"/>
  <!-- Right pillar base -->
  <rect x="23" y="25" width="6" height="2" rx="0.3" fill="#7a7060"/>
  <rect x="23" y="25" width="6" height="1" rx="0.2" fill="#8a8070" opacity="0.5"/>
  <!-- Architrave (top beam) -->
  <rect x="3" y="4" width="26" height="3" rx="0.5" fill="#7a7060"/>
  <rect x="3" y="4" width="26" height="1.5" rx="0.3" fill="#8a8070" opacity="0.6"/>
  <!-- Pediment (triangular top) -->
  <path d="M3,4 L16,1 L29,4 Z" fill="#8a8070"/>
  <path d="M5,3.8 L16,1.5 L27,3.8 Z" fill="#9a9080" opacity="0.5"/>
  <!-- Central relic pedestal -->
  <rect x="13" y="22" width="6" height="5" rx="0.3" fill="#6a6050"/>
  <rect x="13" y="22" width="6" height="2" rx="0.2" fill="#7a7060" opacity="0.5"/>
  <!-- Relic object (glowing crystal/artifact) -->
  <path d="M16,12 L13,18 L15,20 L17,20 L19,18 Z" fill="#c8a030"/>
  <path d="M16,12 L14,17 L16,19 Z" fill="#dab040" opacity="0.6"/>
  <path d="M16,12 L18,17 L16,19 Z" fill="#b89020" opacity="0.8"/>
  <!-- Relic inner glow -->
  <path d="M16,14 L14.5,17.5 L16,19 L17.5,17.5 Z" fill="#e8c850" opacity="0.4"/>
  <circle cx="16" cy="17" r="1" fill="#f0d860" opacity="0.4"/>
  <!-- Relic aura -->
  <circle cx="16" cy="17" r="4" fill="#ffd700" opacity="0.1"/>
  <circle cx="16" cy="17" r="3" fill="#ffe840" opacity="0.08"/>
  <!-- Light rays from relic -->
  <line x1="16" y1="10" x2="16" y2="8" stroke="#ffd700" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  <line x1="12" y1="14" x2="10" y2="13" stroke="#ffd700" stroke-width="0.3" opacity="0.25" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="22" y2="13" stroke="#ffd700" stroke-width="0.3" opacity="0.25" stroke-linecap="round"/>
  <!-- Sparkle on relic -->
  <path d="M16,11 L16.3,9.8 L16.6,11 L16.3,12.2 Z" fill="#fff8c0" opacity="0.7"/>
  <path d="M15.6,11 L16.3,10.6 L17,11 L16.3,11.4 Z" fill="#fff8c0" opacity="0.5"/>
</svg>