<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Radiant-cut purple gem on a velvet cushion -->
  <!-- Soft underglow -->
  <ellipse cx="16" cy="24" rx="10" ry="4" fill="#aa44ff" opacity="0.08"/>

  <!-- Cushion/pedestal -->
  <path d="M6,25 Q16,28 26,25 L25,27 Q16,30 7,27Z" fill="#3a1a2a"/>
  <path d="M6,25 Q16,28 26,25" fill="none" stroke="#5a2a4a" stroke-width="0.4" opacity="0.5"/>
  <path d="M8,25.5 Q16,27.5 24,25.5" fill="none" stroke="#6a3a5a" stroke-width="0.3" opacity="0.3"/>

  <!-- Gem pavilion (bottom) -->
  <path d="M8,16 L16,26 L24,16Z" fill="#6622aa"/>
  <path d="M8,16 L16,26 L14,16Z" fill="#7733bb" opacity="0.7"/>
  <path d="M14,16 L16,26 L18,16Z" fill="#8844cc"/>
  <path d="M18,16 L16,26 L24,16Z" fill="#5518a0" opacity="0.8"/>

  <!-- Gem crown (top) -->
  <path d="M5,16 L9,7 L16,5 L23,7 L27,16Z" fill="#9955dd"/>
  <!-- Table facet (top face) -->
  <path d="M10,10 L16,8 L22,10 L20,16 L12,16Z" fill="#bb77ff"/>
  <path d="M10,10 L16,8 L16,16 L12,16Z" fill="#cc99ff" opacity="0.45"/>
  <!-- Side crown facets -->
  <path d="M5,16 L9,7 L10,10 L7,16Z" fill="#8844cc"/>
  <path d="M27,16 L23,7 L22,10 L25,16Z" fill="#7733bb"/>
  <!-- Star facets -->
  <path d="M10,10 L9,7 L12,16Z" fill="#9050dd" opacity="0.4"/>
  <path d="M22,10 L23,7 L20,16Z" fill="#7040cc" opacity="0.4"/>

  <!-- Girdle -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="#4a1888" stroke-width="0.7"/>

  <!-- Facet lines in pavilion -->
  <line x1="14" y1="16" x2="16" y2="26" stroke="#4a1888" stroke-width="0.35" opacity="0.5"/>
  <line x1="18" y1="16" x2="16" y2="26" stroke="#4a1888" stroke-width="0.35" opacity="0.5"/>

  <!-- Highlight reflection -->
  <path d="M7,12 L9,8 L12,8 L9,14Z" fill="#ffffff" opacity="0.18"/>
  <ellipse cx="10" cy="11" rx="1.3" ry="0.8" fill="#ffffff" opacity="0.25" transform="rotate(-20,10,11)"/>

  <!-- Inner fire -->
  <ellipse cx="16" cy="14" rx="2" ry="1.5" fill="#dd88ff" opacity="0.15"/>

  <!-- Sparkle cross (top) -->
  <g opacity="0.8">
    <line x1="16" y1="1" x2="16" y2="4" stroke="#ddaaff" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="14.5" y1="2.5" x2="17.5" y2="2.5" stroke="#ddaaff" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- Sparkle (left) -->
  <g opacity="0.5">
    <line x1="2" y1="10" x2="2" y2="12" stroke="#ddaaff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="1" y1="11" x2="3" y2="11" stroke="#ddaaff" stroke-width="0.5" stroke-linecap="round"/>
  </g>
  <!-- Sparkle (right) -->
  <g opacity="0.4">
    <line x1="29" y1="7" x2="29" y2="9" stroke="#ddaaff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="28" y1="8" x2="30" y2="8" stroke="#ddaaff" stroke-width="0.5" stroke-linecap="round"/>
  </g>

  <!-- Outline -->
  <path d="M16,5 L9,7 L5,16 L16,26 L27,16 L23,7Z" fill="none" stroke="#3a1070" stroke-width="0.5" opacity="0.5"/>
</svg>