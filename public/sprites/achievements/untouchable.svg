<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer radiant glow -->
  <circle cx="16" cy="16" r="14" fill="#4090e0" opacity="0.06"/>
  <circle cx="16" cy="16" r="11" fill="#50a0f0" opacity="0.08"/>
  <circle cx="16" cy="16" r="8" fill="#60b0ff" opacity="0.06"/>
  <!-- Light rays behind shield -->
  <line x1="16" y1="1" x2="16" y2="4" stroke="#80c0ff" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <line x1="6" y1="5" x2="8" y2="7" stroke="#80c0ff" stroke-width="0.6" opacity="0.25" stroke-linecap="round"/>
  <line x1="26" y1="5" x2="24" y2="7" stroke="#80c0ff" stroke-width="0.6" opacity="0.25" stroke-linecap="round"/>
  <line x1="3" y1="14" x2="6" y2="14.5" stroke="#80c0ff" stroke-width="0.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="29" y1="14" x2="26" y2="14.5" stroke="#80c0ff" stroke-width="0.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="5" y1="24" x2="7.5" y2="22" stroke="#80c0ff" stroke-width="0.4" opacity="0.15" stroke-linecap="round"/>
  <line x1="27" y1="24" x2="24.5" y2="22" stroke="#80c0ff" stroke-width="0.4" opacity="0.15" stroke-linecap="round"/>
  <!-- Shield body (kite shield shape) -->
  <path d="M16,3 L6,8 L6,16 Q6,24 16,30 Q26,24 26,16 L26,8 Z" fill="#2060a0"/>
  <path d="M16,4 L7,8.5 L7,16 Q7,23 16,29 Q25,23 25,16 L25,8.5 Z" fill="#2870b8"/>
  <path d="M16,5 L8,9 L8,16 Q8,22.5 16,28 Q24,22.5 24,16 L24,9 Z" fill="#3080c8"/>
  <!-- Shield inner field -->
  <path d="M16,7 L10,10.5 L10,16 Q10,21.5 16,26 Q22,21.5 22,16 L22,10.5 Z" fill="#2870b8" opacity="0.6"/>
  <!-- Shield central cross -->
  <rect x="15" y="8" width="2" height="17" rx="0.3" fill="#c8d8e8" opacity="0.5"/>
  <rect x="10" y="14" width="12" height="2" rx="0.3" fill="#c8d8e8" opacity="0.5"/>
  <!-- Cross highlight -->
  <rect x="15.3" y="8.5" width="0.8" height="16" rx="0.2" fill="#e0e8f0" opacity="0.3"/>
  <rect x="10.5" y="14.3" width="11" height="0.8" rx="0.2" fill="#e0e8f0" opacity="0.3"/>
  <!-- Shield boss (center circle) -->
  <circle cx="16" cy="15" r="2.5" fill="#4090d0"/>
  <circle cx="16" cy="15" r="2" fill="#50a0e0"/>
  <circle cx="16" cy="15" r="1.3" fill="#60b0f0" opacity="0.7"/>
  <circle cx="16" cy="15" r="0.6" fill="#a0d0ff" opacity="0.6"/>
  <!-- Boss highlight -->
  <ellipse cx="15" cy="14" rx="0.8" ry="0.6" fill="#ffffff" opacity="0.25"/>
  <!-- Shield rim -->
  <path d="M16,3 L6,8 L6,16 Q6,24 16,30 Q26,24 26,16 L26,8 Z" fill="none" stroke="#1a4a78" stroke-width="1.2"/>
  <path d="M16,3.5 L6.5,8.2 L6.5,16 Q6.5,23.5 16,29.5 Q25.5,23.5 25.5,16 L25.5,8.2 Z" fill="none" stroke="#4090d0" stroke-width="0.4" opacity="0.4"/>
  <!-- Rim rivets -->
  <circle cx="11" cy="7" r="0.6" fill="#5a90c0"/>
  <circle cx="21" cy="7" r="0.6" fill="#5a90c0"/>
  <circle cx="7" cy="12" r="0.6" fill="#5a90c0"/>
  <circle cx="25" cy="12" r="0.6" fill="#5a90c0"/>
  <circle cx="8" cy="20" r="0.6" fill="#5a90c0"/>
  <circle cx="24" cy="20" r="0.6" fill="#5a90c0"/>
  <!-- Shield highlight/sheen -->
  <path d="M10,8 Q12,7 14,8 L10,10 Q8,12 8,15" fill="#ffffff" opacity="0.1"/>
  <path d="M11,9 Q12,8 13,8.5 L10,11" fill="#ffffff" opacity="0.08"/>
  <!-- Energy aura around shield -->
  <path d="M16,1 L5,7 L4,16 Q4,25 16,31" fill="none" stroke="#60b0ff" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
  <path d="M16,1 L27,7 L28,16 Q28,25 16,31" fill="none" stroke="#60b0ff" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
  <!-- Sparkle -->
  <path d="M16,1 L16.3,0 L16.6,1 L16.3,2 Z" fill="#ffffff" opacity="0.6"/>
  <path d="M15.6,1 L16.3,0.6 L17,1 L16.3,1.4 Z" fill="#ffffff" opacity="0.4"/>
</svg>