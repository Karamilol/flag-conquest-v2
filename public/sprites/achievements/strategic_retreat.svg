<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Castle base/wall -->
  <rect x="4" y="16" width="24" height="14" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.5"/>
  <!-- Stone texture -->
  <path d="M4,20 L28,20 M4,24 L28,24 M4,28 L28,28" stroke="#6a6a6a" stroke-width="0.3" opacity="0.5"/>
  <path d="M10,16 L10,20 M20,16 L20,20 M15,20 L15,24 M8,24 L8,28 M22,24 L22,28" stroke="#6a6a6a" stroke-width="0.3" opacity="0.5"/>
  <!-- Wall highlight -->
  <path d="M5,17 L27,17" stroke="#9a9a9a" stroke-width="0.5" opacity="0.4"/>

  <!-- Left tower -->
  <rect x="2" y="8" width="8" height="22" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="0.5"/>
  <path d="M3,9 L9,9" stroke="#8a8a8a" stroke-width="0.5" opacity="0.4"/>
  <!-- Left battlements -->
  <rect x="1" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <rect x="5" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <rect x="8" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <!-- Left tower window -->
  <path d="M5,13 Q6,11 7,13 L7,16 L5,16 Z" fill="#1a1a2a" stroke="#4a4a4a" stroke-width="0.3"/>
  <circle cx="6" cy="12.5" r="0.3" fill="#e8c040" opacity="0.6"/>

  <!-- Right tower -->
  <rect x="22" y="8" width="8" height="22" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="0.5"/>
  <path d="M23,9 L29,9" stroke="#8a8a8a" stroke-width="0.5" opacity="0.4"/>
  <!-- Right battlements -->
  <rect x="21" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <rect x="25" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <rect x="28" y="5" width="3" height="3" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.4"/>
  <!-- Right tower window -->
  <path d="M25,13 Q26,11 27,13 L27,16 L25,16 Z" fill="#1a1a2a" stroke="#4a4a4a" stroke-width="0.3"/>
  <circle cx="26" cy="12.5" r="0.3" fill="#e8c040" opacity="0.6"/>

  <!-- Gate arch -->
  <path d="M12,30 L12,22 Q16,17 20,22 L20,30" fill="#2a1a0a" stroke="#4a4a4a" stroke-width="0.5"/>
  <!-- Gate door -->
  <path d="M13,30 L13,23 Q16,19 19,23 L19,30" fill="#3a2a15" stroke="#2a1a0a" stroke-width="0.3"/>
  <!-- Gate portcullis lines -->
  <path d="M14,22 L14,30 M16,20 L16,30 M18,22 L18,30" stroke="#5a5a5a" stroke-width="0.4" opacity="0.5"/>
  <path d="M13,24 L19,24 M13,27 L19,27" stroke="#5a5a5a" stroke-width="0.4" opacity="0.5"/>
  <!-- Gate keystone -->
  <path d="M15,18 L16,17 L17,18" fill="#8a8a8a" stroke="#5a5a5a" stroke-width="0.3"/>

  <!-- Center battlements -->
  <rect x="11" y="14" width="2.5" height="2" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.3"/>
  <rect x="14.5" y="14" width="3" height="2" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.3"/>
  <rect x="18.5" y="14" width="2.5" height="2" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="0.3"/>

  <!-- Warm window glow -->
  <circle cx="6" cy="13" r="2" fill="#e8c040" opacity="0.08"/>
  <circle cx="26" cy="13" r="2" fill="#e8c040" opacity="0.08"/>
  <!-- Ground shadow -->
  <ellipse cx="16" cy="31" rx="14" ry="1" fill="#000" opacity="0.15"/>
</svg>