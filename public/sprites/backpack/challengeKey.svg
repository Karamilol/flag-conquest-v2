<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fiery challenge key - dark iron with flames -->
  <!-- Fire glow -->
  <ellipse cx="12" cy="8" rx="8" ry="8" fill="#ff4400" opacity="0.08"/>
  <!-- Key bow (head) - skull-like shape -->
  <circle cx="12" cy="10" r="6" fill="#444444" stroke="#333333" stroke-width="0.8"/>
  <circle cx="12" cy="10" r="4.5" fill="#555555"/>
  <!-- Skull eye holes -->
  <ellipse cx="10" cy="9.5" rx="1.2" ry="1.5" fill="#ff4400" opacity="0.7"/>
  <ellipse cx="14" cy="9.5" rx="1.2" ry="1.5" fill="#ff4400" opacity="0.7"/>
  <!-- Eye glow -->
  <ellipse cx="10" cy="9.5" rx="0.5" ry="0.7" fill="#ffaa44" opacity="0.5"/>
  <ellipse cx="14" cy="9.5" rx="0.5" ry="0.7" fill="#ffaa44" opacity="0.5"/>
  <!-- Nose -->
  <path d="M12,11 L11.5,12.5 L12.5,12.5Z" fill="#333333"/>
  <!-- Mouth line -->
  <path d="M10,13.5 L14,13.5" fill="none" stroke="#333333" stroke-width="0.5"/>
  <!-- Key shaft -->
  <rect x="17" y="9" width="12" height="2.5" rx="0.3" fill="#555555"/>
  <rect x="17" y="9" width="12" height="1" rx="0.2" fill="#666666" opacity="0.4"/>
  <!-- Key teeth - jagged -->
  <path d="M27,11.5 L28,11.5 L28,16 L27,16 L27,14 L26,14 L26,16 L24,16 L24,13 L23,13 L23,15 L21,15 L21,11.5Z" fill="#555555"/>
  <!-- Teeth edge highlight -->
  <path d="M21,11.5 L28,11.5" fill="none" stroke="#777777" stroke-width="0.3" opacity="0.4"/>
  <!-- Flames coming off key bow -->
  <path d="M8,6 Q7,3 9,2 Q8,4 10,5Z" fill="#ff4400" opacity="0.6"/>
  <path d="M12,5 Q11,2 13,1 Q12,3 14,4Z" fill="#ff6600" opacity="0.5"/>
  <path d="M16,6 Q17,3 15,2 Q16,4 14,5Z" fill="#ff4400" opacity="0.5"/>
  <!-- Flame highlights -->
  <path d="M9,4 Q9,3 10,3Z" fill="#ffaa33" opacity="0.4"/>
  <path d="M13,3 Q12.5,2 13.5,2Z" fill="#ffaa33" opacity="0.4"/>
  <!-- Hot metal glow on shaft -->
  <path d="M18,10 L22,10" fill="none" stroke="#ff6600" stroke-width="0.3" opacity="0.2"/>
  <!-- Ember particles -->
  <circle cx="6" cy="3" r="0.4" fill="#ff6600" opacity="0.5"/>
  <circle cx="16" cy="2" r="0.3" fill="#ffaa33" opacity="0.4"/>
  <circle cx="4" cy="8" r="0.3" fill="#ff4400" opacity="0.3"/>
</svg>