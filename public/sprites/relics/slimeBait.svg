<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Jar of slime bait with worm -->
  <!-- Jar body -->
  <path d="M9,12 L9,25 Q9,28 12,28 L20,28 Q23,28 23,25 L23,12Z" fill="#88bbdd" opacity="0.3"/>
  <path d="M9,12 L9,25 Q9,28 12,28 L20,28 Q23,28 23,25 L23,12Z" fill="none" stroke="#5588aa" stroke-width="0.5" opacity="0.5"/>
  <!-- Jar neck -->
  <rect x="11" y="8" width="10" height="4" fill="#88bbdd" opacity="0.25"/>
  <!-- Lid -->
  <rect x="10" y="6" width="12" height="3" rx="1" fill="#8B6914"/>
  <rect x="10" y="6" width="12" height="1.2" rx="0.5" fill="#c4984a" opacity="0.4"/>
  <!-- Green slime liquid inside -->
  <path d="M10,14 L10,25 Q10,27 12,27 L20,27 Q22,27 22,25 L22,14Z" fill="#44aa55" opacity="0.6"/>
  <path d="M10.5,14.5 L10.5,22 Q11,24 13,24 L16,24 L16,14.5Z" fill="#55cc66" opacity="0.3"/>
  <!-- Worm inside -->
  <path d="M14,18 Q12,16 14,14 Q16,12 18,14 Q20,16 18,18 Q16,20 14,18" fill="none" stroke="#cc7744" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="14" cy="18" r="0.6" fill="#dd8855"/>
  <!-- Bubbles -->
  <circle cx="13" cy="22" r="0.7" fill="#66dd77" opacity="0.4"/>
  <circle cx="19" cy="16" r="0.5" fill="#66dd77" opacity="0.3"/>
  <!-- Glass shine -->
  <path d="M11,14 L11,22" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.25" stroke-linecap="round"/>
  <!-- Label -->
  <rect x="12" y="20" width="8" height="4" rx="0.5" fill="#e8dcc8" opacity="0.5"/>
  <line x1="13" y1="21.5" x2="19" y2="21.5" stroke="#8a7040" stroke-width="0.3" opacity="0.5"/>
  <line x1="13" y1="23" x2="17" y2="23" stroke="#8a7040" stroke-width="0.3" opacity="0.4"/>
</svg>