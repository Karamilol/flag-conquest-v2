  <path d="M4,22 L8,18 L28,18 L28,22 L24,26 L4,26Z" fill="#777777"/>
  <path d="M4,22 L8,18 L28,18 L28,22Z" fill="#999999" opacity="0.4"/>
  <path d="M28,18 L28,22 L24,26 L24,22Z" fill="#555555" opacity="0.4"/>
  <!-- Middle ingot -->
  <path d="M6,18 L10,14 L26,14 L26,18 L22,22 L6,22Z" fill="#888888"/>
  <path d="M6,18 L10,14 L26,14 L26,18Z" fill="#aaaaaa" opacity="0.4"/>
  <path d="M26,14 L26,18 L22,22 L22,18Z" fill="#666666" opacity="0.4"/>
  <!-- Top ingot -->
  <path d="M8,14 L12,10 L24,10 L24,14 L20,18 L8,18Z" fill="#999999"/>
