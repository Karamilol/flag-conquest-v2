  <!-- Sparkle for quality -->
  <g fill="#ffdd88" opacity="0.4">
    <path d="M26,6 L26.3,4.5 L26.6,6 L28,5.5 L26.6,6.3 L26.3,7.5 L26,6.3 L24.5,5.5Z"/>
