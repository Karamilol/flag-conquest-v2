<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Straw training dummy -->
  <!-- Post -->
  <rect x="14.5" y="18" width="3" height="12" fill="#6a4a20"/>
  <!-- Base -->
  <path d="M10,28 L22,28 L24,30 L8,30Z" fill="#5a3a15"/>
  <!-- Body (burlap sack) -->
  <ellipse cx="16" cy="14" rx="7" ry="8" fill="#c4984a"/>
  <ellipse cx="14" cy="12" rx="3" ry="4" fill="#d4a85a" opacity="0.3"/>
  <!-- Straw texture -->
  <g stroke="#daa520" stroke-width="0.4" opacity="0.4">
    <line x1="10" y1="10" x2="8" y2="8"/>
    <line x1="22" y1="10" x2="24" y2="8"/>
    <line x1="11" y1="14" x2="8" y2="14"/>
    <line x1="21" y1="14" x2="24" y2="14"/>
    <line x1="12" y1="18" x2="10" y2="20"/>
    <line x1="20" y1="18" x2="22" y2="20"/>
  </g>
  <!-- Cross arm -->
  <rect x="6" y="12" width="20" height="2.5" rx="0.5" fill="#6a4a20"/>
  <!-- Target mark on body -->
  <circle cx="16" cy="12" r="3" fill="none" stroke="#cc3333" stroke-width="0.8" opacity="0.5"/>
  <circle cx="16" cy="12" r="1" fill="#cc3333" opacity="0.4"/>
  <!-- Slash marks (battle worn) -->
  <path d="M12,9 L14,11" fill="none" stroke="#5a3a15" stroke-width="0.6" opacity="0.4"/>
  <path d="M18,13 L20,15" fill="none" stroke="#5a3a15" stroke-width="0.6" opacity="0.4"/>
  <!-- Head (sack with face) -->
  <circle cx="16" cy="5" r="4" fill="#c4984a"/>
  <circle cx="16" cy="5" r="4" fill="none" stroke="#b08838" stroke-width="0.4"/>
  <!-- Eyes (X marks) -->
  <g stroke="#5a3a15" stroke-width="0.5" opacity="0.5">
    <line x1="13" y1="4" x2="15" y2="6"/>
    <line x1="15" y1="4" x2="13" y2="6"/>
    <line x1="17" y1="4" x2="19" y2="6"/>
    <line x1="19" y1="4" x2="17" y2="6"/>
  </g>
</svg>