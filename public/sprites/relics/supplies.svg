<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Medical supply crate with cross -->
  <!-- Crate body -->
  <rect x="5" y="10" width="22" height="16" rx="1.5" fill="#8B6914"/>
  <rect x="5" y="10" width="22" height="5" rx="1" fill="#a07a1e" opacity="0.3"/>
  <rect x="5" y="10" width="22" height="16" rx="1.5" fill="none" stroke="#6a4a10" stroke-width="0.7"/>
  <!-- Crate bands -->
  <rect x="5" y="14" width="22" height="1" fill="#6a4a10" opacity="0.3"/>
  <rect x="5" y="23" width="22" height="1" fill="#6a4a10" opacity="0.3"/>
  <!-- Red cross emblem -->
  <rect x="13" y="12" width="6" height="12" rx="0.5" fill="#cc3333"/>
  <rect x="10" y="15" width="12" height="6" rx="0.5" fill="#cc3333"/>
  <!-- Cross highlight -->
  <rect x="14" y="12.5" width="2" height="11" rx="0.3" fill="#dd5555" opacity="0.4"/>
  <rect x="10.5" y="16" width="11" height="2" rx="0.3" fill="#dd5555" opacity="0.4"/>
  <!-- Lid line -->
  <line x1="5" y1="11" x2="27" y2="11" stroke="#6a4a10" stroke-width="0.5"/>
  <!-- Metal corners -->
  <rect x="5" y="10" width="2.5" height="2.5" rx="0.3" fill="#aabbcc" opacity="0.5"/>
  <rect x="24.5" y="10" width="2.5" height="2.5" rx="0.3" fill="#aabbcc" opacity="0.5"/>
  <rect x="5" y="23.5" width="2.5" height="2.5" rx="0.3" fill="#aabbcc" opacity="0.4"/>
  <rect x="24.5" y="23.5" width="2.5" height="2.5" rx="0.3" fill="#aabbcc" opacity="0.4"/>
  <!-- Healing glow -->
  <ellipse cx="16" cy="18" rx="8" ry="6" fill="#ff4444" opacity="0.06"/>
  <!-- Handle -->
  <path d="M12,10 Q12,7 16,7 Q20,7 20,10" fill="none" stroke="#6a4a10" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Shine -->
  <path d="M7,11 L14,11" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.15"/>
</svg>