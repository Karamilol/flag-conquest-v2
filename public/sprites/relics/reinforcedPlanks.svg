<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Reinforced wooden planks with nails -->
  <!-- Plank 1 -->
  <rect x="4" y="6" width="24" height="5" rx="0.5" fill="#a07a1e"/>
  <rect x="4" y="6" width="24" height="1.5" rx="0.3" fill="#b08a2e" opacity="0.3"/>
  <line x1="4" y1="9" x2="28" y2="9" stroke="#8B6914" stroke-width="0.3" opacity="0.3"/>
  <!-- Plank 2 -->
  <rect x="4" y="13" width="24" height="5" rx="0.5" fill="#8B6914"/>
  <rect x="4" y="13" width="24" height="1.5" rx="0.3" fill="#a07a1e" opacity="0.3"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#7a5a14" stroke-width="0.3" opacity="0.3"/>
  <!-- Plank 3 -->
  <rect x="4" y="20" width="24" height="5" rx="0.5" fill="#a07a1e"/>
  <rect x="4" y="20" width="24" height="1.5" rx="0.3" fill="#b08a2e" opacity="0.3"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#8B6914" stroke-width="0.3" opacity="0.3"/>
  <!-- Metal reinforcement band (horizontal) -->
  <rect x="3" y="11.5" width="26" height="1.5" rx="0.3" fill="#aabbcc"/>
  <rect x="3" y="11.5" width="26" height="0.5" rx="0.2" fill="#ccddee" opacity="0.3"/>
  <rect x="3" y="18" width="26" height="1.5" rx="0.3" fill="#aabbcc"/>
  <rect x="3" y="18" width="26" height="0.5" rx="0.2" fill="#ccddee" opacity="0.3"/>
  <!-- Nails -->
  <circle cx="8" cy="8" r="0.8" fill="#aabbcc"/>
  <circle cx="24" cy="8" r="0.8" fill="#aabbcc"/>
  <circle cx="8" cy="15" r="0.8" fill="#aabbcc"/>
  <circle cx="24" cy="15" r="0.8" fill="#aabbcc"/>
  <circle cx="8" cy="22" r="0.8" fill="#aabbcc"/>
  <circle cx="24" cy="22" r="0.8" fill="#aabbcc"/>
  <!-- Wood grain -->
  <path d="M6,7 Q10,7.5 14,7" fill="none" stroke="#7a5a14" stroke-width="0.2" opacity="0.3"/>
  <path d="M16,14 Q20,14.5 24,14" fill="none" stroke="#6a4a10" stroke-width="0.2" opacity="0.3"/>
</svg>