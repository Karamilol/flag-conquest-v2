<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Gnarled walking stick -->
  <!-- Stick body -->
  <path d="M14,2 Q12,6 13,12 Q14,18 12,24 Q11,28 12,30" fill="none" stroke="#6a4a20" stroke-width="3" stroke-linecap="round"/>
  <!-- Stick highlight -->
  <path d="M14,2 Q12.5,6 13.5,12 Q14.5,18 12.5,24" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Knots/bumps -->
  <circle cx="13" cy="8" r="1.5" fill="#5a3a15"/>
  <circle cx="13" cy="8" r="1.5" fill="none" stroke="#6a4a20" stroke-width="0.3"/>
  <circle cx="14" cy="16" r="1.2" fill="#5a3a15"/>
  <!-- Top handle (curved) -->
  <path d="M14,2 Q16,1 18,2 Q22,4 22,8 Q22,10 20,10" fill="none" stroke="#6a4a20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handle highlight -->
  <path d="M15,2 Q18,2 19,4" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <!-- Speed indicator -->
  <line x1="20" y1="14" x2="26" y2="12" stroke="#66ccff" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="24" y2="17" stroke="#66ccff" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="22" y2="22" stroke="#66ccff" stroke-width="0.5" opacity="0.25" stroke-linecap="round"/>
  <!-- Ground contact dust -->
  <circle cx="12" cy="30" r="1.5" fill="#aa9977" opacity="0.15"/>
  <!-- Worn grip marks -->
  <path d="M16,4 Q18,3 20,4" fill="none" stroke="#5a3a15" stroke-width="0.4" opacity="0.3"/>
</svg>