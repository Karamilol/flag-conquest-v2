<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rolled papyrus scroll -->
  <!-- Unrolled portion -->
  <path d="M6,6 L24,4 L26,24 L8,26Z" fill="#e8dcc8"/>
  <path d="M7,7 L23,5 L22,8 L7,10Z" fill="#f0e8d8" opacity="0.3"/>
  <!-- Scroll text lines -->
  <g stroke="#aa9977" stroke-width="0.4" opacity="0.4">
    <line x1="9" y1="10" x2="22" y2="8.5"/>
    <line x1="9" y1="13" x2="22" y2="11.5"/>
    <line x1="9" y1="16" x2="20" y2="14.5"/>
    <line x1="9" y1="19" x2="22" y2="17.5"/>
    <line x1="9" y1="22" x2="18" y2="20.5"/>
  </g>
  <!-- Roll at bottom -->
  <ellipse cx="8" cy="26" rx="3" ry="2" fill="#d8ccb8"/>
  <ellipse cx="8" cy="26" rx="3" ry="2" fill="none" stroke="#c4b8a0" stroke-width="0.4"/>
  <ellipse cx="8" cy="26" rx="1.5" ry="1" fill="#c4b8a0" opacity="0.4"/>
  <!-- Roll at top -->
  <ellipse cx="25" cy="4" rx="2.5" ry="1.8" fill="#d8ccb8"/>
  <ellipse cx="25" cy="4" rx="2.5" ry="1.8" fill="none" stroke="#c4b8a0" stroke-width="0.4"/>
  <ellipse cx="25" cy="4" rx="1.2" ry="0.9" fill="#c4b8a0" opacity="0.4"/>
  <!-- Aged edges -->
  <path d="M6,6 L8,26" fill="none" stroke="#c4b8a0" stroke-width="0.5" opacity="0.4"/>
  <path d="M24,4 L26,24" fill="none" stroke="#c4b8a0" stroke-width="0.5" opacity="0.4"/>
  <!-- Magic glyph -->
  <circle cx="16" cy="15" r="2" fill="none" stroke="#8855cc" stroke-width="0.4" opacity="0.3"/>
  <path d="M16,13 L15,15 L16,17 L17,15Z" fill="#8855cc" opacity="0.2"/>
  <!-- Seal -->
  <circle cx="22" cy="22" r="2" fill="#cc3333" opacity="0.4"/>
  <circle cx="22" cy="22" r="1" fill="#dd5555" opacity="0.3"/>
</svg>