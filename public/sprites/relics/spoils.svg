<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Arrow through a coin - archer spoils -->
  <!-- Coin -->
  <circle cx="16" cy="16" r="8" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#b8860b" stroke-width="0.5"/>
  <!-- Coin face detail -->
  <text x="16" y="19" text-anchor="middle" font-size="8" font-weight="bold" fill="#8B6914">G</text>
  <!-- Coin highlight -->
  <path d="M12,12 Q14,10 16,10" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <circle cx="12" cy="12" r="0.6" fill="#ffffff" opacity="0.3"/>
  <!-- Arrow through coin -->
  <line x1="2" y1="22" x2="30" y2="10" stroke="#8B6914" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M30,10 L26,9 L27,11Z" fill="#8899aa"/>
  <!-- Arrow fletching -->
  <path d="M4,21 L2,23 L4,22Z" fill="#cc4444" opacity="0.7"/>
  <path d="M3,22 L2,20 L4,21Z" fill="#aa3333" opacity="0.6"/>
  <!-- Impact sparkles -->
  <circle cx="12" cy="18" r="0.5" fill="#ffdd44" opacity="0.5"/>
  <circle cx="20" cy="14" r="0.5" fill="#ffdd44" opacity="0.5"/>
  <!-- Extra coins scattered -->
  <circle cx="6" cy="8" r="2" fill="#daa520" stroke="#b8860b" stroke-width="0.3" opacity="0.5"/>
  <circle cx="26" cy="24" r="1.8" fill="#daa520" stroke="#b8860b" stroke-width="0.3" opacity="0.4"/>
</svg>