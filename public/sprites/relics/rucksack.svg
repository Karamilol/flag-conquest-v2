<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Travel rucksack/backpack -->
  <!-- Bag body -->
  <path d="M7,12 L7,26 Q7,28 9,28 L23,28 Q25,28 25,26 L25,12 Q25,8 16,8 Q7,8 7,12Z" fill="#6a8a3a"/>
  <!-- Lighter panel -->
  <path d="M8,12 L8,24 Q8,26 10,26 L16,26 L16,10 Q10,9 8,12Z" fill="#7a9a4a" opacity="0.4"/>
  <!-- Top flap -->
  <path d="M6,12 Q6,8 16,7 Q26,8 26,12 L26,14 Q24,12 16,12 Q8,12 6,14Z" fill="#5a7a2a"/>
  <!-- Flap buckle -->
  <rect x="14" y="13" width="4" height="2.5" rx="0.5" fill="#c4984a"/>
  <circle cx="16" cy="14.3" r="0.5" fill="#8B6914"/>
  <!-- Front pocket -->
  <rect x="10" y="18" width="12" height="7" rx="1" fill="#5a7a2a" opacity="0.6"/>
  <rect x="10" y="18" width="12" height="7" rx="1" fill="none" stroke="#4a6a20" stroke-width="0.4"/>
  <!-- Pocket flap -->
  <path d="M10,18 L22,18 L22,20 Q16,21 10,20Z" fill="#4a6a20" opacity="0.4"/>
  <!-- Straps -->
  <path d="M10,10 Q8,10 6,14 L6,22" fill="none" stroke="#5a7a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22,10 Q24,10 26,14 L26,22" fill="none" stroke="#5a7a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Strap buckles -->
  <rect x="5" y="20" width="2.5" height="2" rx="0.3" fill="#c4984a"/>
  <rect x="24.5" y="20" width="2.5" height="2" rx="0.3" fill="#c4984a"/>
  <!-- Stitching -->
  <line x1="7.5" y1="12" x2="7.5" y2="26" stroke="#4a6a20" stroke-width="0.3" opacity="0.4" stroke-dasharray="1,1.5"/>
  <line x1="24.5" y1="12" x2="24.5" y2="26" stroke="#4a6a20" stroke-width="0.3" opacity="0.4" stroke-dasharray="1,1.5"/>
</svg>