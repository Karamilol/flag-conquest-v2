<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Ornate ring / signet ring -->
  <!-- Ring glow -->
  <ellipse cx="16" cy="16" rx="10" ry="10" fill="#daa520" opacity="0.06"/>
  <!-- Ring band -->
  <ellipse cx="16" cy="18" rx="9" ry="7" fill="none" stroke="#daa520" stroke-width="3"/>
  <!-- Ring band highlight -->
  <path d="M7,18 Q7,12 16,11 Q25,12 25,18" fill="none" stroke="#eebb33" stroke-width="1" opacity="0.4"/>
  <!-- Ring band shadow -->
  <path d="M7,18 Q7,24 16,25 Q25,24 25,18" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.3"/>
  <!-- Gem setting -->
  <ellipse cx="16" cy="10" rx="5" ry="3.5" fill="#daa520" stroke="#b8860b" stroke-width="0.5"/>
  <!-- Gem -->
  <ellipse cx="16" cy="10" rx="3.5" ry="2.5" fill="#cc2244"/>
  <ellipse cx="16" cy="10" rx="3.5" ry="2.5" fill="none" stroke="#aa1133" stroke-width="0.3"/>
  <!-- Gem facets -->
  <path d="M13,9 L16,8 L19,9 L16,10Z" fill="#dd4466" opacity="0.5"/>
  <path d="M13,9 L16,10 L16,12 L13,11Z" fill="#bb2244" opacity="0.3"/>
  <!-- Gem highlight -->
  <circle cx="14.5" cy="9" r="0.8" fill="#ffffff" opacity="0.4"/>
  <!-- Prong details -->
  <circle cx="12.5" cy="10" r="0.5" fill="#eebb33"/>
  <circle cx="19.5" cy="10" r="0.5" fill="#eebb33"/>
  <circle cx="16" cy="7.5" r="0.5" fill="#eebb33"/>
  <circle cx="16" cy="12.5" r="0.5" fill="#eebb33"/>
  <!-- Sparkle -->
  <g fill="#ffffff" opacity="0.4">
    <path d="M22,6 L22.3,4.5 L22.6,6 L24,5.5 L22.6,6.3 L22.3,7.5 L22,6.3 L20.5,5.5Z"/>
  </g>
</svg>