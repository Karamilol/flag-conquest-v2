<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Feather quill pen with ink -->
  <!-- Quill shaft -->
  <line x1="6" y1="28" x2="24" y2="4" stroke="#e8dcc8" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Feather vane (right side) -->
  <path d="M24,4 Q28,6 26,10 Q24,14 22,16 Q20,12 22,8 Q22,6 24,4Z" fill="#e8dcc8"/>
  <path d="M24,4 Q26,5 25,8 Q24,10 23,12 L22,8Z" fill="#f0ece0" opacity="0.5"/>
  <!-- Feather vane (left side) -->
  <path d="M24,4 Q22,2 20,4 Q18,6 16,10 Q18,8 20,6 Q22,4 24,4Z" fill="#d8ccb8"/>
  <!-- Feather barbs -->
  <g stroke="#c4b8a0" stroke-width="0.3" opacity="0.4">
    <line x1="23" y1="6" x2="26" y2="7"/>
    <line x1="22" y1="8" x2="25" y2="9"/>
    <line x1="21" y1="10" x2="24" y2="11"/>
    <line x1="20" y1="12" x2="23" y2="13"/>
    <line x1="22" y1="5" x2="20" y2="4"/>
    <line x1="21" y1="7" x2="19" y2="6"/>
  </g>
  <!-- Nib (metal tip) -->
  <path d="M6,28 L8,24 L7,28Z" fill="#c4984a"/>
  <path d="M6,28 L7,25 L6.5,28Z" fill="#daa520" opacity="0.5"/>
  <!-- Ink on nib -->
  <path d="M6,28 L7,26" fill="none" stroke="#222266" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <!-- Ink drops -->
  <circle cx="4" cy="29" r="1" fill="#222266" opacity="0.4"/>
  <circle cx="8" cy="30" r="0.6" fill="#222266" opacity="0.3"/>
  <!-- Magic sparkle on feather -->
  <circle cx="22" cy="6" r="0.5" fill="#aa88ff" opacity="0.5"/>
  <circle cx="20" cy="10" r="0.4" fill="#aa88ff" opacity="0.4"/>
</svg>