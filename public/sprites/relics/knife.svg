<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sharp combat knife -->
  <!-- Blade -->
  <path d="M18,2 L20,2 L22,20 L18,22Z" fill="#a0aab8"/>
  <!-- Blade highlight -->
  <path d="M18.5,3 L19.5,3 L19.5,20 L18.5,21Z" fill="#c0ccd8" opacity="0.5"/>
  <!-- Blade edge -->
  <path d="M20,2 L22,20 L20,20Z" fill="#8899aa" opacity="0.4"/>
  <!-- Blade tip -->
  <path d="M18,2 L20,2 L19,1Z" fill="#b0bac8"/>
  <!-- Edge gleam -->
  <path d="M21.5,4 L21.8,16" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.3" stroke-linecap="round"/>
  <!-- Guard -->
  <rect x="15" y="20" width="10" height="2" rx="0.5" fill="#888888"/>
  <rect x="15" y="20" width="10" height="0.7" rx="0.3" fill="#aaaaaa" opacity="0.4"/>
  <!-- Grip -->
  <rect x="17" y="22" width="6" height="6" rx="0.5" fill="#333333"/>
  <!-- Grip wrapping -->
  <line x1="17" y1="23" x2="23" y2="23" stroke="#444444" stroke-width="0.5"/>
  <line x1="17" y1="24.5" x2="23" y2="24.5" stroke="#444444" stroke-width="0.5"/>
  <line x1="17" y1="26" x2="23" y2="26" stroke="#444444" stroke-width="0.5"/>
  <line x1="17" y1="27.5" x2="23" y2="27.5" stroke="#444444" stroke-width="0.5"/>
  <!-- Pommel -->
  <rect x="17.5" y="28" width="5" height="1.5" rx="0.5" fill="#888888"/>
  <!-- Crit indicator -->
  <text x="10" y="10" font-size="5" font-weight="bold" fill="#ff4444" opacity="0.4">!</text>
  <!-- Sharp gleam at tip -->
  <circle cx="19" cy="2" r="0.8" fill="#ffffff" opacity="0.35"/>
</svg>