<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Stacked cargo crates/trunks -->
  <!-- Bottom crate -->
  <rect x="4" y="18" width="24" height="10" rx="1" fill="#8B6914"/>
  <rect x="4" y="18" width="24" height="3" rx="0.5" fill="#a07a1e" opacity="0.3"/>
  <rect x="4" y="18" width="24" height="10" rx="1" fill="none" stroke="#6a4a10" stroke-width="0.6"/>
  <!-- Bottom crate bands -->
  <rect x="4" y="22" width="24" height="1.2" rx="0.2" fill="#6a4a10" opacity="0.4"/>
  <!-- Bottom crate lock -->
  <rect x="14" y="22" width="4" height="3" rx="0.5" fill="#aabbcc"/>
  <circle cx="16" cy="23.5" r="0.5" fill="#888888"/>
  <!-- Top crate (smaller, offset) -->
  <rect x="7" y="8" width="18" height="10" rx="1" fill="#a07a1e"/>
  <rect x="7" y="8" width="18" height="3" rx="0.5" fill="#b08a2e" opacity="0.3"/>
  <rect x="7" y="8" width="18" height="10" rx="1" fill="none" stroke="#7a5a14" stroke-width="0.5"/>
  <!-- Top crate bands -->
  <rect x="7" y="12" width="18" height="1" rx="0.2" fill="#7a5a14" opacity="0.4"/>
  <!-- Top crate label -->
  <rect x="12" y="13.5" width="8" height="3" rx="0.3" fill="#e8dcc8" opacity="0.5"/>
  <line x1="13" y1="14.5" x2="19" y2="14.5" stroke="#8a7040" stroke-width="0.3" opacity="0.4"/>
  <line x1="13" y1="15.8" x2="17" y2="15.8" stroke="#8a7040" stroke-width="0.3" opacity="0.3"/>
  <!-- Rope -->
  <path d="M6,18 Q4,14 7,10" fill="none" stroke="#c4984a" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <path d="M26,18 Q28,14 25,10" fill="none" stroke="#c4984a" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Shine -->
  <path d="M8,9 L14,9" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.15"/>
</svg>