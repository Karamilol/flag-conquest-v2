<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Golden aura -->
  <ellipse cx="16" cy="16" rx="14" ry="15" fill="#ccaa30" opacity="0.06"/>
  <ellipse cx="16" cy="14" rx="10" ry="11" fill="#ddbb40" opacity="0.08"/>
  <ellipse cx="16" cy="12" rx="6" ry="7" fill="#eedd60" opacity="0.06"/>
  <!-- Aura rays -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#ddbb40" stroke-width="0.4" opacity="0.25"/>
  <line x1="8" y1="5" x2="10" y2="7" stroke="#ddbb40" stroke-width="0.4" opacity="0.2"/>
  <line x1="24" y1="5" x2="22" y2="7" stroke="#ddbb40" stroke-width="0.4" opacity="0.2"/>
  <line x1="5" y1="12" x2="7" y2="13" stroke="#ddbb40" stroke-width="0.3" opacity="0.15"/>
  <line x1="27" y1="12" x2="25" y2="13" stroke="#ddbb40" stroke-width="0.3" opacity="0.15"/>
  <!-- Baton shaft -->
  <rect x="14.5" y="8" width="3" height="20" rx="1" fill="#3a2a1a"/>
  <rect x="14.5" y="8" width="3" height="20" rx="1" fill="url(#cm1)"/>
  <rect x="14.5" y="8" width="3" height="20" rx="1" fill="none" stroke="#2a1a0a" stroke-width="0.4"/>
  <!-- Shaft highlight -->
  <rect x="15" y="9" width="0.8" height="18" rx="0.3" fill="white" opacity="0.1"/>
  <!-- Gold bands on shaft -->
  <rect x="14" y="14" width="4" height="1.2" rx="0.3" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <rect x="14.2" y="14.3" width="3.6" height="0.4" rx="0.2" fill="#e8d060" opacity="0.4"/>
  <rect x="14" y="18" width="4" height="1.2" rx="0.3" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <rect x="14.2" y="18.3" width="3.6" height="0.4" rx="0.2" fill="#e8d060" opacity="0.4"/>
  <rect x="14" y="22" width="4" height="1.2" rx="0.3" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <rect x="14.2" y="22.3" width="3.6" height="0.4" rx="0.2" fill="#e8d060" opacity="0.4"/>
  <!-- Grip wrap -->
  <path d="M14.5 24 L17.5 25" stroke="#5a4030" stroke-width="0.5" opacity="0.6"/>
  <path d="M14.5 25.5 L17.5 26.5" stroke="#5a4030" stroke-width="0.5" opacity="0.6"/>
  <!-- Baton head — ornate top -->
  <circle cx="16" cy="7" r="4" fill="#c8a030"/>
  <circle cx="16" cy="7" r="4" fill="url(#cm2)" opacity="0.7"/>
  <circle cx="16" cy="7" r="4" fill="none" stroke="#a08020" stroke-width="0.5"/>
  <!-- Head inner ring -->
  <circle cx="16" cy="7" r="2.8" fill="none" stroke="#e8c850" stroke-width="0.4"/>
  <circle cx="16" cy="7" r="2.8" fill="#ddbb40" opacity="0.3"/>
  <!-- Crown points on head -->
  <path d="M13 4.5 L12.5 3 L14 4" fill="#c8a030" stroke="#a08020" stroke-width="0.3"/>
  <path d="M16 3.5 L16 2 L16.5 3.5" fill="#c8a030" stroke="#a08020" stroke-width="0.3"/>
  <path d="M19 4.5 L19.5 3 L18 4" fill="#c8a030" stroke="#a08020" stroke-width="0.3"/>
  <!-- Crown point highlights -->
  <line x1="12.8" y1="3.5" x2="13.5" y2="4.2" stroke="#eedd60" stroke-width="0.2" opacity="0.5"/>
  <line x1="16" y1="2.5" x2="16" y2="3.5" stroke="#eedd60" stroke-width="0.2" opacity="0.5"/>
  <!-- Center gem -->
  <circle cx="16" cy="7" r="1.3" fill="#cc2020"/>
  <circle cx="16" cy="7" r="1.3" fill="url(#cm3)" opacity="0.6"/>
  <circle cx="16" cy="7" r="1.3" fill="none" stroke="#881010" stroke-width="0.3"/>
  <!-- Gem highlight -->
  <ellipse cx="15.3" cy="6.3" rx="0.5" ry="0.3" fill="white" opacity="0.35"/>
  <!-- Head shine -->
  <path d="M13 5 Q14 4.5 15 5" stroke="white" stroke-width="0.3" opacity="0.25"/>
  <!-- Bottom pommel -->
  <ellipse cx="16" cy="28.5" rx="2.5" ry="1" fill="#c8a030" stroke="#a08020" stroke-width="0.3"/>
  <ellipse cx="16" cy="28.2" rx="1.5" ry="0.5" fill="#e8d060" opacity="0.3"/>
  <!-- Sparkle particles -->
  <circle cx="8" cy="8" r="0.4" fill="#ffee80" opacity="0.5"/>
  <circle cx="24" cy="6" r="0.35" fill="#ffee80" opacity="0.4"/>
  <circle cx="6" cy="14" r="0.3" fill="#ffdd60" opacity="0.35"/>
  <circle cx="26" cy="10" r="0.3" fill="#ffdd60" opacity="0.35"/>
  <defs>
    <linearGradient id="cm1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="40%" stop-color="#7a5a3a"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="cm2" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#eedd60"/>
      <stop offset="100%" stop-color="#a08020"/>
    </radialGradient>
    <radialGradient id="cm3" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#ff6060"/>
      <stop offset="100%" stop-color="#881020"/>
    </radialGradient>
  </defs>
</svg>