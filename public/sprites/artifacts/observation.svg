<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Target indicator glow -->
  <circle cx="25" cy="7" r="5" fill="#ff4444" opacity="0.08"/>
  <circle cx="25" cy="7" r="3" fill="#ff6666" opacity="0.06"/>
  <!-- Target crosshair -->
  <circle cx="25" cy="7" r="4" fill="none" stroke="#cc3333" stroke-width="0.5" opacity="0.6"/>
  <circle cx="25" cy="7" r="2" fill="none" stroke="#cc3333" stroke-width="0.4" opacity="0.5"/>
  <circle cx="25" cy="7" r="0.5" fill="#ff4444" opacity="0.7"/>
  <line x1="25" y1="2.5" x2="25" y2="4.5" stroke="#cc3333" stroke-width="0.4" opacity="0.5"/>
  <line x1="25" y1="9.5" x2="25" y2="11.5" stroke="#cc3333" stroke-width="0.4" opacity="0.5"/>
  <line x1="20.5" y1="7" x2="22.5" y2="7" stroke="#cc3333" stroke-width="0.4" opacity="0.5"/>
  <line x1="27.5" y1="7" x2="29.5" y2="7" stroke="#cc3333" stroke-width="0.4" opacity="0.5"/>
  <!-- Spyglass body — main tube -->
  <path d="M5 26 L20 11" stroke="#8b6914" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M5 26 L20 11" stroke="url(#ob1)" stroke-width="4" stroke-linecap="round"/>
  <!-- Tube segment lines -->
  <line x1="9" y1="22" x2="10.5" y2="20.5" stroke="#6b4a0a" stroke-width="0.4" opacity="0.6"/>
  <line x1="12" y1="19" x2="13.5" y2="17.5" stroke="#6b4a0a" stroke-width="0.4" opacity="0.6"/>
  <line x1="15" y1="16" x2="16.5" y2="14.5" stroke="#6b4a0a" stroke-width="0.4" opacity="0.6"/>
  <!-- Brass bands -->
  <path d="M8 23 L9.5 21.5" stroke="#c8a030" stroke-width="1.2" opacity="0.7"/>
  <path d="M8.3 22.7 L9.2 21.8" stroke="#e8c860" stroke-width="0.4" opacity="0.4"/>
  <path d="M14 17 L15.5 15.5" stroke="#c8a030" stroke-width="1.2" opacity="0.7"/>
  <path d="M14.3 16.7 L15.2 15.8" stroke="#e8c860" stroke-width="0.4" opacity="0.4"/>
  <!-- Objective lens (wide end) -->
  <ellipse cx="21" cy="10" rx="3.5" ry="3.5" transform="rotate(-45 21 10)" fill="none" stroke="#8b6914" stroke-width="1"/>
  <ellipse cx="21" cy="10" rx="3" ry="3" transform="rotate(-45 21 10)" fill="#1a2a4a" opacity="0.7"/>
  <ellipse cx="21" cy="10" rx="3" ry="3" transform="rotate(-45 21 10)" fill="url(#ob2)" opacity="0.6"/>
  <!-- Lens reflection -->
  <ellipse cx="20" cy="9" rx="1.2" ry="0.8" transform="rotate(-45 20 9)" fill="white" opacity="0.2"/>
  <ellipse cx="19.5" cy="8.5" rx="0.5" ry="0.3" transform="rotate(-45 19.5 8.5)" fill="white" opacity="0.35"/>
  <!-- Lens ring -->
  <ellipse cx="21" cy="10" rx="3.5" ry="3.5" fill="none" stroke="#c8a030" stroke-width="0.6" opacity="0.6"/>
  <!-- Eyepiece (narrow end) -->
  <circle cx="4.5" cy="26.5" r="2" fill="#6b4a0a"/>
  <circle cx="4.5" cy="26.5" r="1.5" fill="#3a2a1a"/>
  <circle cx="4.5" cy="26.5" r="2" fill="none" stroke="#c8a030" stroke-width="0.5" opacity="0.6"/>
  <circle cx="4" cy="26" r="0.4" fill="white" opacity="0.15"/>
  <!-- Tube shine -->
  <path d="M7 24 L18 13" stroke="white" stroke-width="0.5" opacity="0.12"/>
  <path d="M6.5 23.5 L11 18" stroke="white" stroke-width="0.3" opacity="0.2"/>
  <!-- Shadow -->
  <ellipse cx="10" cy="29" rx="6" ry="1.5" fill="#000" opacity="0.12"/>
  <defs>
    <linearGradient id="ob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a07820"/>
      <stop offset="50%" stop-color="#c8a040"/>
      <stop offset="100%" stop-color="#7a5810"/>
    </linearGradient>
    <radialGradient id="ob2" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#4a6a9a"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </radialGradient>
  </defs>
</svg>