<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Bugle body -->
  <path d="M6,18 Q6,14 10,12 L20,9 Q24,8 26,10 Q28,12 26,14 L22,15 Q20,18 16,20 L10,21 Q6,21 6,18 Z" fill="#B8860B" />
  <!-- Bugle shading layers -->
  <path d="M6,18 Q6,15 10,13 L18,10 Q20,12 16,14 L10,16 Q7,17 6,18 Z" fill="#DAA520" opacity="0.5" />
  <path d="M18,10 L20,9 Q24,8 26,10 Q27,11 26,12 L22,13 Q20,11 18,10 Z" fill="#DAA520" opacity="0.4" />
  <path d="M10,19 L16,18 Q18,17 20,16 L22,15 Q20,18 16,20 L10,21 Q8,20.5 10,19 Z" fill="#8B6914" opacity="0.5" />
  <!-- Bugle bell opening -->
  <ellipse cx="25.5" cy="12" rx="2.5" ry="3" fill="#8B6914" />
  <ellipse cx="25.5" cy="12" rx="1.8" ry="2.2" fill="#2A1A00" />
  <ellipse cx="25.5" cy="11.5" rx="1.2" ry="1.5" fill="#3D2800" opacity="0.6" />
  <!-- Bugle highlight strokes -->
  <path d="M8,16 Q10,13 14,11.5" fill="none" stroke="white" stroke-width="0.4" opacity="0.3" />
  <path d="M14,11 L19,9.5" fill="none" stroke="white" stroke-width="0.3" opacity="0.25" />
  <!-- Bugle mouthpiece -->
  <circle cx="7" cy="17.5" r="1.5" fill="#C9A84C" />
  <circle cx="7" cy="17.5" r="0.8" fill="#2A1A00" />
  <circle cx="6.7" cy="17.2" r="0.3" fill="white" opacity="0.3" />
  <!-- Bugle valve details -->
  <circle cx="14" cy="13" r="0.8" fill="#C9A84C" stroke="#8B6914" stroke-width="0.3" />
  <circle cx="17" cy="12" r="0.8" fill="#C9A84C" stroke="#8B6914" stroke-width="0.3" />
  <circle cx="13.8" cy="12.7" r="0.3" fill="white" opacity="0.3" />
  <circle cx="16.8" cy="11.7" r="0.3" fill="white" opacity="0.3" />
  <!-- Stern face silhouette behind bugle -->
  <circle cx="12" cy="7" r="3.5" fill="#2A1A2E" opacity="0.8" />
  <!-- Helmet shape -->
  <path d="M8.5,5 Q12,2 15.5,5 L15,7 Q12,5.5 9,7 Z" fill="#4A4A5A" opacity="0.85" />
  <path d="M9,5.5 Q12,3 15,5.5" fill="none" stroke="#6A6A7A" stroke-width="0.4" opacity="0.6" />
  <!-- Face features (stern) -->
  <line x1="10" y1="6.5" x2="11.2" y2="6.8" stroke="#1A1A2E" stroke-width="0.6" />
  <line x1="12.8" y1="6.8" x2="14" y2="6.5" stroke="#1A1A2E" stroke-width="0.6" />
  <!-- Furrowed brows -->
  <line x1="9.8" y1="6" x2="11.5" y2="6.3" stroke="#1A1A2E" stroke-width="0.5" />
  <line x1="12.5" y1="6.3" x2="14.2" y2="6" stroke="#1A1A2E" stroke-width="0.5" />
  <!-- Stern mouth -->
  <line x1="10.5" y1="9" x2="13.5" y2="9" stroke="#1A1A2E" stroke-width="0.5" />
  <line x1="10.5" y1="9" x2="10.2" y2="8.6" stroke="#1A1A2E" stroke-width="0.4" />
  <line x1="13.5" y1="9" x2="13.8" y2="8.6" stroke="#1A1A2E" stroke-width="0.4" />
  <!-- Sound waves from bugle -->
  <path d="M27,10 Q29,9 29,12 Q29,15 27,14" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.5" />
  <path d="M29,9 Q31,8 31,12 Q31,16 29,15" fill="none" stroke="#DAA520" stroke-width="0.4" opacity="0.3" />
  <!-- Musical notes -->
  <circle cx="28" cy="6" r="0.8" fill="#DAA520" opacity="0.4" />
  <line x1="28.8" y1="6" x2="28.8" y2="3" stroke="#DAA520" stroke-width="0.4" opacity="0.4" />
  <circle cx="30" cy="7.5" r="0.6" fill="#DAA520" opacity="0.3" />
  <line x1="30.6" y1="7.5" x2="30.6" y2="5" stroke="#DAA520" stroke-width="0.3" opacity="0.3" />
  <!-- Ground shadow -->
  <ellipse cx="16" cy="23" rx="8" ry="1" fill="#1A1A2E" opacity="0.15" />
  <!-- Brass glow -->
  <ellipse cx="16" cy="14" rx="10" ry="6" fill="#DAA520" opacity="0.06" />
</svg>