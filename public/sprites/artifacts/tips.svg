<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="ti_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd44" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffdd44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ti_coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee66"/>
      <stop offset="30%" stop-color="#ddaa22"/>
      <stop offset="100%" stop-color="#bb8811"/>
    </linearGradient>
    <linearGradient id="ti_coinside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccaa22"/>
      <stop offset="100%" stop-color="#997711"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#ti_glow)"/>
  <!-- Bottom coin stack (5 coins) -->
  <ellipse cx="14" cy="27" rx="6" ry="1.5" fill="url(#ti_coinside)"/>
  <ellipse cx="14" cy="27" rx="6" ry="1.5" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <rect x="8" y="25.5" width="12" height="1.5" fill="url(#ti_coinside)"/>
  <ellipse cx="14" cy="25.5" rx="6" ry="1.5" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <rect x="8" y="24" width="12" height="1.5" fill="url(#ti_coinside)"/>
  <ellipse cx="14" cy="24" rx="6" ry="1.5" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <rect x="8" y="22.5" width="12" height="1.5" fill="url(#ti_coinside)"/>
  <ellipse cx="14" cy="22.5" rx="6" ry="1.5" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <rect x="8" y="21" width="12" height="1.5" fill="url(#ti_coinside)"/>
  <ellipse cx="14" cy="21" rx="6" ry="1.5" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <!-- Highlight on top coin face -->
  <ellipse cx="12.5" cy="20.5" rx="2.5" ry="0.7" fill="white" opacity="0.12"/>
  <!-- Coin edge highlights -->
  <path d="M8.5 22 L8.5 26" stroke="white" stroke-width="0.3" opacity="0.1"/>
  <!-- Second stack (3 coins, offset right) -->
  <rect x="16" y="26" width="8" height="1.2" fill="url(#ti_coinside)"/>
  <ellipse cx="20" cy="27.2" rx="4" ry="1.2" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <rect x="16" y="24.8" width="8" height="1.2" fill="url(#ti_coinside)"/>
  <ellipse cx="20" cy="26" rx="4" ry="1.2" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <ellipse cx="20" cy="24.8" rx="4" ry="1.2" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3"/>
  <ellipse cx="19" cy="24.5" rx="1.5" ry="0.5" fill="white" opacity="0.1"/>
  <!-- Single loose coin -->
  <ellipse cx="24" cy="28.5" rx="2.5" ry="1.2" fill="url(#ti_coin)" stroke="#aa8811" stroke-width="0.3" transform="rotate(-15 24 28.5)"/>
  <!-- Plus sign (glowing) -->
  <g transform="translate(22,8)">
    <!-- Plus glow -->
    <circle cx="0" cy="0" r="5" fill="#44dd44" opacity="0.1"/>
    <!-- Plus circle background -->
    <circle cx="0" cy="0" r="4.5" fill="#228833" stroke="#116622" stroke-width="0.5" opacity="0.85"/>
    <circle cx="-1" cy="-1" r="3" fill="white" opacity="0.06"/>
    <!-- Plus sign -->
    <rect x="-2.5" y="-0.8" width="5" height="1.6" rx="0.3" fill="#66ff66" opacity="0.9"/>
    <rect x="-0.8" y="-2.5" width="1.6" height="5" rx="0.3" fill="#66ff66" opacity="0.9"/>
    <!-- Plus highlight -->
    <rect x="-2" y="-0.5" width="2" height="0.5" rx="0.2" fill="white" opacity="0.25"/>
    <rect x="-0.5" y="-2" width="0.5" height="2" rx="0.2" fill="white" opacity="0.25"/>
  </g>
  <!-- Sparkles -->
  <circle cx="6" cy="19" r="0.5" fill="#ffee88" opacity="0.5"/>
  <circle cx="10" cy="16" r="0.4" fill="#ffee88" opacity="0.4"/>
  <circle cx="26" cy="20" r="0.4" fill="#ffee88" opacity="0.4"/>
</svg>