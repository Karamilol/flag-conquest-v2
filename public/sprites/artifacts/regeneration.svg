<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Healing pulse rings -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#40cc60" stroke-width="0.4" opacity="0.15"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#60ee80" stroke-width="0.3" opacity="0.12"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#80ff90" stroke-width="0.3" opacity="0.1"/>
  <!-- Green healing glow background -->
  <ellipse cx="16" cy="16" rx="10" ry="11" fill="#30aa50" opacity="0.08"/>
  <ellipse cx="16" cy="16" rx="7" ry="8" fill="#50cc70" opacity="0.06"/>
  <!-- Bandage wrap — main roll -->
  <ellipse cx="16" cy="16" rx="7" ry="8" fill="#e8e0d0"/>
  <ellipse cx="16" cy="16" rx="7" ry="8" fill="url(#rg1)" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="7" ry="8" fill="none" stroke="#c8b898" stroke-width="0.5"/>
  <!-- Bandage texture lines (wrapped) -->
  <path d="M10 12 Q13 10 16 11 Q19 12 22 10" fill="none" stroke="#c8b898" stroke-width="0.4" opacity="0.5"/>
  <path d="M9.5 15 Q13 13 16 14 Q19 15 22.5 13" fill="none" stroke="#c8b898" stroke-width="0.4" opacity="0.5"/>
  <path d="M9.5 18 Q13 16 16 17 Q19 18 22.5 16" fill="none" stroke="#c8b898" stroke-width="0.4" opacity="0.5"/>
  <path d="M10 21 Q13 19 16 20 Q19 21 22 19" fill="none" stroke="#c8b898" stroke-width="0.4" opacity="0.5"/>
  <!-- Bandage end trailing -->
  <path d="M22 13 Q25 12 26 10 Q27 8 25 7" fill="#e8e0d0" stroke="#c8b898" stroke-width="0.4"/>
  <path d="M22 13 Q24.5 12 25.5 10.5" stroke="#d8d0c0" stroke-width="0.3" opacity="0.4"/>
  <!-- Bandage roll center -->
  <ellipse cx="16" cy="16" rx="3.5" ry="4.5" fill="#d8d0c0" stroke="#b8a888" stroke-width="0.4"/>
  <ellipse cx="16" cy="16" rx="3.5" ry="4.5" fill="url(#rg2)" opacity="0.4"/>
  <!-- Center spiral hint -->
  <path d="M16 12 Q18.5 13 18.5 16 Q18.5 19 16 20" fill="none" stroke="#b8a888" stroke-width="0.3" opacity="0.5"/>
  <path d="M16 13 Q17.5 14 17.5 16 Q17.5 18 16 19" fill="none" stroke="#b8a888" stroke-width="0.3" opacity="0.4"/>
  <!-- Green healing cross on bandage -->
  <rect x="14.5" y="13" width="3" height="6" rx="0.4" fill="#40aa60" opacity="0.7"/>
  <rect x="13" y="14.5" width="6" height="3" rx="0.4" fill="#40aa60" opacity="0.7"/>
  <!-- Cross highlight -->
  <rect x="15" y="13.5" width="1.2" height="5" rx="0.2" fill="#70dd90" opacity="0.35"/>
  <rect x="13.5" y="15" width="5" height="1.2" rx="0.2" fill="#70dd90" opacity="0.35"/>
  <!-- Green pulse particles -->
  <circle cx="7" cy="10" r="0.7" fill="#50cc70" opacity="0.4"/>
  <circle cx="25" cy="20" r="0.6" fill="#50cc70" opacity="0.35"/>
  <circle cx="10" cy="25" r="0.5" fill="#60dd80" opacity="0.3"/>
  <circle cx="22" cy="8" r="0.5" fill="#60dd80" opacity="0.35"/>
  <circle cx="5" cy="18" r="0.4" fill="#40bb60" opacity="0.3"/>
  <circle cx="27" cy="14" r="0.4" fill="#40bb60" opacity="0.3"/>
  <!-- Rising heal particles -->
  <circle cx="13" cy="6" r="0.4" fill="#80ff90" opacity="0.4"/>
  <circle cx="19" cy="4" r="0.3" fill="#80ff90" opacity="0.35"/>
  <circle cx="16" cy="3" r="0.35" fill="#a0ffa0" opacity="0.3"/>
  <!-- Bandage highlight shine -->
  <path d="M11 12 Q13 11 15 12" stroke="white" stroke-width="0.4" opacity="0.2"/>
  <path d="M11 15 Q13 14 15 15" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <defs>
    <linearGradient id="rg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ece0"/>
      <stop offset="100%" stop-color="#b0a888" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="rg2" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#f0ece0"/>
      <stop offset="100%" stop-color="#c0b898"/>
    </radialGradient>
  </defs>
</svg>