<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="co_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffdd88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="co_tunic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4488bb"/>
      <stop offset="100%" stop-color="#225588"/>
    </linearGradient>
    <linearGradient id="co_pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa7733"/>
      <stop offset="100%" stop-color="#774411"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#co_glow)"/>
  <!-- Motion lines -->
  <line x1="1" y1="14" x2="5" y2="14" stroke="#aabbcc" stroke-width="0.5" opacity="0.3"/>
  <line x1="2" y1="18" x2="6" y2="18" stroke="#aabbcc" stroke-width="0.5" opacity="0.25"/>
  <line x1="1" y1="22" x2="5" y2="22" stroke="#aabbcc" stroke-width="0.5" opacity="0.3"/>
  <!-- Back leg (running stride) -->
  <path d="M12 22 L9 27 L8 29" stroke="#664422" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="8" cy="29" rx="2" ry="0.8" fill="#553311" stroke="#442200" stroke-width="0.3"/>
  <!-- Front leg -->
  <path d="M18 22 L22 26 L24 27" stroke="#664422" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="24.5" cy="27" rx="2" ry="0.8" fill="#553311" stroke="#442200" stroke-width="0.3"/>
  <!-- Body/tunic -->
  <path d="M11 12 L10 22 L20 22 L19 12 Z" fill="url(#co_tunic)" stroke="#1a4466" stroke-width="0.4"/>
  <path d="M11.5 12.5 L11 18" stroke="white" stroke-width="0.5" fill="none" opacity="0.1"/>
  <!-- Belt -->
  <rect x="10" y="19" width="10" height="1.5" rx="0.3" fill="#664422" stroke="#442200" stroke-width="0.3"/>
  <rect x="14.5" y="18.8" width="1.5" height="2" rx="0.3" fill="#ddaa44" stroke="#aa8822" stroke-width="0.2"/>
  <!-- Back arm -->
  <path d="M12 13 L9 17 L8 19" stroke="url(#co_tunic)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Front arm holding letter -->
  <path d="M18 13 L22 11 L24 10" stroke="url(#co_tunic)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="24" cy="10" r="1" fill="#ddb888"/>
  <!-- Letter/envelope -->
  <rect x="22" y="6" width="6" height="4.5" rx="0.3" fill="#ffffee" stroke="#ccbb88" stroke-width="0.4"/>
  <path d="M22.3 6.3 L25 8.5 L27.7 6.3" stroke="#ccaa66" stroke-width="0.4" fill="none"/>
  <circle cx="25" cy="9" r="0.5" fill="#dd3333" opacity="0.7"/>
  <!-- Head -->
  <circle cx="15" cy="9" r="3.5" fill="#ddb888" stroke="#bb9966" stroke-width="0.4"/>
  <!-- Hair -->
  <path d="M11.5 8 Q12 5 15 4.5 Q18 5 18.5 8" fill="#553322" stroke="#442211" stroke-width="0.3"/>
  <!-- Cap -->
  <path d="M11.5 8 Q12 6 15 5.5 Q18 6 18.5 8 L19 7 Q18 4.5 15 4 Q12 4.5 11 7 Z" fill="#4488bb" stroke="#225588" stroke-width="0.3"/>
  <path d="M12 6.5 Q13 5 15 4.8" stroke="white" stroke-width="0.3" fill="none" opacity="0.2"/>
  <!-- Face -->
  <circle cx="14" cy="9" r="0.5" fill="#553322"/>
  <circle cx="17" cy="9" r="0.5" fill="#553322"/>
  <path d="M13.5 10.5 Q15 11.5 16.5 10.5" stroke="#aa7755" stroke-width="0.3" fill="none"/>
  <!-- Pouch on belt -->
  <path d="M11 19 L10 23 L13 23 L12.5 19 Z" fill="url(#co_pouch)" stroke="#553300" stroke-width="0.3"/>
  <path d="M10.5 21 L12.5 21" stroke="#886633" stroke-width="0.3"/>
  <circle cx="11.5" cy="21.5" r="0.3" fill="#ddaa44"/>
  <!-- Dust puffs -->
  <circle cx="6" cy="27" r="1.5" fill="#ccbb99" opacity="0.15"/>
  <circle cx="4" cy="26" r="1" fill="#ccbb99" opacity="0.1"/>
</svg>