  <circle cx="12" cy="10" r="0.6" fill="#ffa" opacity="0.6"/>
  <circle cx="20" cy="10" r="0.5" fill="#ffa" opacity="0.5"/>
  <circle cx="16" cy="7" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="14" cy="18" r="0.4" fill="#ff8" opacity="0.4"/>
  <circle cx="18" cy="18" r="0.4" fill="#ff8" opacity="0.4"/>
