  <line x1="11" y1="9" x2="9" y2="7" stroke="#ff8" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="21" y1="9" x2="23" y2="7" stroke="#ff8" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
