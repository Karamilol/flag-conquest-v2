  <circle cx="29" cy="8" r="0.8" fill="#DAA520"/>
  <circle cx="29" cy="8" r="0.5" fill="#fc6" opacity="0.5"/>
  <!-- Impact flash star -->
  <polygon points="16,8 17,12 21,13 17.5,15 18.5,19 16,16.5 13.5,19 14.5,15 11,13 15,12" fill="#ff8" opacity="0.7"/>
  <polygon points="16,10 16.5,12.5 19,13 17,14.5 17.5,17 16,15.5 14.5,17 15,14.5 13,13 15.5,12.5" fill="white" opacity="0.5"/>
