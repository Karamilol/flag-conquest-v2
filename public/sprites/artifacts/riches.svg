  <path d="M4 14 L4 10 Q4 7 6 7 L26 7 Q28 7 28 10 L28 14Z" fill="url(#ri2)" opacity="0.5"/>
  <path d="M4 14 L4 10 Q4 7 6 7 L26 7 Q28 7 28 10 L28 14Z" fill="none" stroke="#4a2808" stroke-width="0.6"/>
