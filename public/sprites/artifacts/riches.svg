  <rect x="14.3" y="15.3" width="3.4" height="0.6" rx="0.2" fill="#e8d060" opacity="0.3"/>
  <!-- Gold coins overflowing -->
  <!-- Back row coins -->
  <ellipse cx="10" cy="12" rx="2.2" ry="1" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="10" cy="11.7" rx="1.5" ry="0.5" fill="#eec840" opacity="0.4"/>
  <ellipse cx="15" cy="11" rx="2.2" ry="1" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="15" cy="10.7" rx="1.5" ry="0.5" fill="#eec840" opacity="0.4"/>
  <ellipse cx="20" cy="11.5" rx="2.2" ry="1" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="20" cy="11.2" rx="1.5" ry="0.5" fill="#eec840" opacity="0.4"/>
  <!-- Front row coins -->
  <ellipse cx="8" cy="13.5" rx="2" ry="0.9" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="12.5" cy="13" rx="2" ry="0.9" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="17" cy="12.5" rx="2" ry="0.9" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
  <ellipse cx="22" cy="13" rx="2" ry="0.9" fill="#ddaa20" stroke="#aa8010" stroke-width="0.3"/>
