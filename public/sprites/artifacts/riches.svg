  <rect x="4" y="14" width="24" height="13" rx="1.5" fill="none" stroke="#4a2808" stroke-width="0.6"/>
  <!-- Chest wood planks -->
  <line x1="4" y1="19" x2="28" y2="19" stroke="#5a3010" stroke-width="0.4" opacity="0.5"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#5a3010" stroke-width="0.4" opacity="0.5"/>
