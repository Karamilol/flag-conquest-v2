  <rect x="5" y="26.5" width="2" height="1.5" rx="0.3" fill="#4a2808"/>
  <rect x="25" y="26.5" width="2" height="1.5" rx="0.3" fill="#4a2808"/>
  <defs>
    <linearGradient id="ri1" x1="0" y1="0" x2="0" y2="1">
