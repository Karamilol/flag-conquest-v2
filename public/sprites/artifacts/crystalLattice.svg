<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background glow -->
  <circle cx="16" cy="16" r="13" fill="#08f" opacity="0.08"/>
  <!-- Lattice grid lines -->
  <line x1="4" y1="8" x2="28" y2="8" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <line x1="4" y1="24" x2="28" y2="24" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <line x1="8" y1="4" x2="8" y2="28" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <line x1="16" y1="4" x2="16" y2="28" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <line x1="24" y1="4" x2="24" y2="28" stroke="#4af" stroke-width="0.4" opacity="0.2"/>
  <!-- Central diamond crystal -->
  <path d="M16 4 L24 16 L16 28 L8 16 Z" fill="#1a5a9a"/>
  <path d="M16 4 L8 16 L16 28 Z" fill="#2a6aaa" opacity="0.6"/>
  <path d="M16 4 L24 16 L16 28 Z" fill="#0a4a8a" opacity="0.6"/>
  <!-- Crystal facets -->
  <path d="M16 4 L12 16 L16 28 Z" fill="#3a7abb" opacity="0.3"/>
  <path d="M16 4 L16 16 L8 16 Z" fill="#4a8acc" opacity="0.2"/>
  <!-- Crystal outline -->
  <path d="M16 4 L24 16 L16 28 L8 16 Z" stroke="#0a4a8a" stroke-width="0.7" fill="none"/>
  <!-- Inner facet lines -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#4a8acc" stroke-width="0.4" opacity="0.4"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#4a8acc" stroke-width="0.4" opacity="0.4"/>
  <line x1="16" y1="4" x2="8" y2="16" stroke="#4a8acc" stroke-width="0.3" opacity="0.3"/>
  <line x1="16" y1="4" x2="24" y2="16" stroke="#4a8acc" stroke-width="0.3" opacity="0.3"/>
  <!-- Lattice node diamonds (corners) -->
  <path d="M8 8 L9 9 L8 10 L7 9 Z" fill="#6af" opacity="0.5"/>
  <path d="M24 8 L25 9 L24 10 L23 9 Z" fill="#6af" opacity="0.5"/>
  <path d="M8 24 L9 25 L8 26 L7 25 Z" fill="#6af" opacity="0.5"/>
  <path d="M24 24 L25 25 L24 26 L23 25 Z" fill="#6af" opacity="0.5"/>
  <!-- Highlight -->
  <path d="M14 6 L10 14 L12 12 Z" fill="white" opacity="0.2"/>
  <circle cx="13" cy="9" r="0.6" fill="white" opacity="0.3"/>
  <!-- Energy at nodes -->
  <circle cx="8" cy="16" r="1.2" fill="#4af" opacity="0.4"/>
  <circle cx="24" cy="16" r="1.2" fill="#4af" opacity="0.4"/>
  <circle cx="16" cy="4" r="1.2" fill="#6cf" opacity="0.5"/>
  <circle cx="16" cy="28" r="1.2" fill="#4af" opacity="0.4"/>
  <!-- Sparkles -->
  <circle cx="16" cy="16" r="1.5" fill="#8df" opacity="0.3"/>
  <circle cx="16" cy="16" r="0.6" fill="white" opacity="0.4"/>
</svg>