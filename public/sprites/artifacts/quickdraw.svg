<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Speed glow -->
  <ellipse cx="16" cy="16" rx="14" ry="10" fill="#ff8" opacity="0.06"/>
  <!-- Bow - top limb -->
  <path d="M8 4 Q4 10 6 16" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M8 4 Q4.5 10 6.5 15" stroke="#a88030" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Bow - bottom limb -->
  <path d="M6 16 Q4 22 8 28" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M6.5 17 Q4.5 22 8 27" stroke="#a88030" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Bowstring -->
  <line x1="8" y1="4" x2="8" y2="28" stroke="#ddc" stroke-width="0.6"/>
  <!-- Bowstring pulled back -->
  <line x1="8" y1="4" x2="16" y2="16" stroke="#ddc" stroke-width="0.5" opacity="0.7"/>
  <line x1="8" y1="28" x2="16" y2="16" stroke="#ddc" stroke-width="0.5" opacity="0.7"/>
  <!-- Arrow on string -->
  <line x1="16" y1="16" x2="28" y2="16" stroke="#8B6914" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16.5" y1="15.5" x2="27" y2="15.5" stroke="#a88030" stroke-width="0.4" opacity="0.5"/>
  <!-- Arrowhead -->
  <path d="M28 16 L25 13.5 L26 16 L25 18.5 Z" fill="#aaa"/>
  <path d="M28 16 L25.5 14 L26 16 Z" fill="#ccc" opacity="0.5"/>
  <path d="M28 16 L25 13.5 L26 16 L25 18.5 Z" stroke="#888" stroke-width="0.3" fill="none"/>
  <!-- Fletching on nocked arrow -->
  <path d="M17 14.5 L18 16 L17 16 Z" fill="#944" opacity="0.6"/>
  <path d="M17 17.5 L18 16 L17 16 Z" fill="#a55" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="20" y1="12" x2="26" y2="12" stroke="#ff8" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="29" y2="14" stroke="#ff8" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <line x1="22" y1="18" x2="29" y2="18" stroke="#ff8" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="26" y2="20" stroke="#ff8" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Motion blur arrows (ghost) -->
  <line x1="20" y1="10" x2="30" y2="10" stroke="#aaa" stroke-width="0.5" opacity="0.15"/>
  <line x1="20" y1="22" x2="30" y2="22" stroke="#aaa" stroke-width="0.5" opacity="0.15"/>
  <!-- Bow grip detail -->
  <rect x="5" y="14" width="2.5" height="4" rx="0.5" fill="#6a4a2a"/>
  <rect x="5.3" y="14.3" width="1" height="3.4" rx="0.3" fill="#8a6a4a" opacity="0.4"/>
  <!-- Sparkle at nock point -->
  <circle cx="16" cy="16" r="0.8" fill="white" opacity="0.5"/>
</svg>