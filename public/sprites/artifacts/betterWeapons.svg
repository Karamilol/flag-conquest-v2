<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bw_glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#88bbff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#88bbff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bw_blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbccdd"/>
      <stop offset="30%" stop-color="#ddeeff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#99aabb"/>
    </linearGradient>
    <linearGradient id="bw_anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="bw_enchant" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="100%" stop-color="#4488dd"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#bw_glow)"/>
  <!-- Anvil base -->
  <rect x="6" y="26" width="20" height="3" rx="0.5" fill="#444" stroke="#222" stroke-width="0.4"/>
  <rect x="6.5" y="26.3" width="8" height="1" rx="0.3" fill="white" opacity="0.06"/>
  <!-- Anvil legs -->
  <rect x="8" y="23" width="4" height="3" fill="#555" stroke="#333" stroke-width="0.3"/>
  <rect x="20" y="23" width="4" height="3" fill="#555" stroke="#333" stroke-width="0.3"/>
  <!-- Anvil body -->
  <path d="M4 20 L6 18 L26 18 L28 20 L28 23 L4 23 Z" fill="url(#bw_anvil)" stroke="#222" stroke-width="0.5"/>
  <!-- Anvil face (top) -->
  <rect x="6" y="17" width="20" height="2" rx="0.3" fill="#777" stroke="#444" stroke-width="0.4"/>
  <rect x="7" y="17.2" width="8" height="0.8" rx="0.2" fill="white" opacity="0.08"/>
  <!-- Anvil horn -->
  <path d="M6 17.5 L2 19 L2 20 L4 20 L6 19 Z" fill="#666" stroke="#333" stroke-width="0.3"/>
  <path d="M3 19 L5 18" stroke="white" stroke-width="0.3" fill="none" opacity="0.1"/>
  <!-- Sword blade (resting on anvil, angled) -->
  <path d="M11 16 L12 3 L14.5 2 L16 3 L15 16 Z" fill="url(#bw_blade)" stroke="#8899aa" stroke-width="0.4"/>
  <!-- Blade center ridge -->
  <line x1="13.5" y1="4" x2="13" y2="15" stroke="white" stroke-width="0.4" opacity="0.3"/>
  <!-- Blade edge highlight -->
  <path d="M12.2 4 L11.5 14" stroke="white" stroke-width="0.3" fill="none" opacity="0.2"/>
  <!-- Sword tip -->
  <path d="M12 3 L13.5 0.5 L14.5 2 L16 3" fill="#ddeeff" stroke="#8899aa" stroke-width="0.3"/>
  <!-- Guard/crossguard -->
  <rect x="9" y="15.5" width="9" height="1.5" rx="0.5" fill="#ddaa44" stroke="#aa8822" stroke-width="0.3"/>
  <rect x="9.5" y="15.8" width="3" height="0.6" rx="0.2" fill="white" opacity="0.15"/>
  <!-- Enchantment glow around blade -->
  <path d="M11 14 Q9 8 12 3" stroke="url(#bw_enchant)" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M15 14 Q17 8 15.5 3" stroke="url(#bw_enchant)" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Enchantment particles -->
  <circle cx="10" cy="8" r="0.8" fill="#88ccff" opacity="0.4"/>
  <circle cx="17" cy="6" r="0.6" fill="#88ccff" opacity="0.35"/>
  <circle cx="9" cy="12" r="0.5" fill="#aaddff" opacity="0.3"/>
  <circle cx="17" cy="10" r="0.7" fill="#88ccff" opacity="0.3"/>
  <circle cx="11" cy="5" r="0.4" fill="#aaddff" opacity="0.45"/>
  <!-- Rune symbols (subtle) -->
  <path d="M20 8 L22 6 L21 9 L23 8" stroke="#88bbff" stroke-width="0.4" fill="none" opacity="0.35"/>
  <path d="M22 12 L24 11 L23 14" stroke="#88bbff" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Sparkles -->
  <circle cx="14" cy="1" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="8" cy="6" r="0.4" fill="#aaddff" opacity="0.4"/>
</svg>