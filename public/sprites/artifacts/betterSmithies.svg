<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bs_glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ff6622" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6622" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bs_brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#884422"/>
      <stop offset="100%" stop-color="#663311"/>
    </linearGradient>
    <linearGradient id="bs_fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff2200"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="80%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
    <linearGradient id="bs_bellows" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#997755"/>
      <stop offset="100%" stop-color="#664422"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#bs_glow)"/>
  <!-- Forge base/hearth -->
  <rect x="4" y="16" width="18" height="12" rx="1" fill="url(#bs_brick)" stroke="#442200" stroke-width="0.5"/>
  <!-- Brick pattern -->
  <line x1="4" y1="20" x2="22" y2="20" stroke="#553311" stroke-width="0.3" opacity="0.5"/>
  <line x1="4" y1="24" x2="22" y2="24" stroke="#553311" stroke-width="0.3" opacity="0.5"/>
  <line x1="13" y1="16" x2="13" y2="20" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <line x1="9" y1="20" x2="9" y2="24" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <line x1="17" y1="20" x2="17" y2="24" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <line x1="13" y1="24" x2="13" y2="28" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <!-- Forge opening -->
  <path d="M7 18 Q7 15 10 14 L16 14 Q19 15 19 18 Z" fill="#111" stroke="#442200" stroke-width="0.4"/>
  <!-- Fire inside forge -->
  <path d="M9 18 Q10 14 11 16 Q12 13 13 15.5 Q14 12.5 15 15 Q16 13 17 18 Z" fill="url(#bs_fire)" opacity="0.9"/>
  <path d="M10 18 Q11 15 12 17 Q13 14 14 16.5 Q15 14 16 18 Z" fill="#ffee44" opacity="0.4"/>
  <!-- Embers above -->
  <circle cx="11" cy="11" r="0.5" fill="#ff6622" opacity="0.4"/>
  <circle cx="14" cy="10" r="0.4" fill="#ffaa44" opacity="0.35"/>
  <circle cx="13" cy="8" r="0.3" fill="#ff8833" opacity="0.25"/>
  <circle cx="16" cy="9" r="0.35" fill="#ff6622" opacity="0.3"/>
  <!-- Chimney -->
  <rect x="15" y="3" width="4" height="13" rx="0.5" fill="url(#bs_brick)" stroke="#442200" stroke-width="0.4"/>
  <line x1="15" y1="8" x2="19" y2="8" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <line x1="17" y1="3" x2="17" y2="8" stroke="#553311" stroke-width="0.3" opacity="0.4"/>
  <!-- Chimney top -->
  <rect x="14.5" y="2.5" width="5" height="1.5" rx="0.3" fill="#773322" stroke="#552211" stroke-width="0.3"/>
  <!-- Smoke -->
  <circle cx="17" cy="1" r="1" fill="#888" opacity="0.15"/>
  <circle cx="18.5" cy="0" r="0.8" fill="#888" opacity="0.1"/>
  <!-- Bellows (right side) -->
  <path d="M22 18 L28 14 L29 15 L29 21 L28 22 L22 22 Z" fill="url(#bs_bellows)" stroke="#553311" stroke-width="0.4"/>
  <!-- Bellows folds -->
  <line x1="23" y1="18.5" x2="27" y2="15.5" stroke="#886644" stroke-width="0.3" opacity="0.5"/>
  <line x1="23" y1="20" x2="27" y2="17.5" stroke="#886644" stroke-width="0.3" opacity="0.5"/>
  <line x1="23" y1="21.5" x2="27" y2="19.5" stroke="#886644" stroke-width="0.3" opacity="0.5"/>
  <!-- Bellows highlight -->
  <path d="M23 19 L26 16" stroke="white" stroke-width="0.3" fill="none" opacity="0.1"/>
  <!-- Bellows handle -->
  <rect x="28" y="13.5" width="2" height="2" rx="0.3" fill="#664422" stroke="#442200" stroke-width="0.3"/>
  <rect x="28" y="21" width="2" height="2" rx="0.3" fill="#664422" stroke="#442200" stroke-width="0.3"/>
  <!-- Bellows nozzle -->
  <rect x="20" y="19" width="2.5" height="2" rx="0.5" fill="#888" stroke="#555" stroke-width="0.3"/>
  <!-- Heat glow -->
  <ellipse cx="13" cy="17" rx="5" ry="2" fill="#ff4400" opacity="0.1"/>
  <!-- Forge highlight -->
  <rect x="4.5" y="16.3" width="4" height="1" rx="0.3" fill="white" opacity="0.06"/>
</svg>