<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Book shadow -->
  <ellipse cx="16" cy="28" rx="10" ry="2" fill="#1a0a00" opacity="0.2"/>
  <!-- Back cover -->
  <path d="M5 5 L5 26 Q5 27 6 27 L16 27 L16 5Z" fill="#5c2a0e"/>
  <path d="M27 5 L27 26 Q27 27 26 27 L16 27 L16 5Z" fill="#6b3210"/>
  <!-- Page block left -->
  <path d="M6 6 L6 25.5 Q6 26 7 26 L15.5 26 L15.5 6Z" fill="#f0e6d0"/>
  <path d="M6 6 L6 25.5 Q6 26 7 26 L15.5 26 L15.5 6Z" fill="url(#tm1)" opacity="0.3"/>
  <!-- Page block right -->
  <path d="M16.5 6 L16.5 26 L25 26 Q26 26 26 25.5 L26 6Z" fill="#f5ecd8"/>
  <!-- Page edge lines -->
  <line x1="7" y1="25.5" x2="15" y2="25.5" stroke="#c8b898" stroke-width="0.3" opacity="0.5"/>
  <line x1="7" y1="25" x2="15" y2="25" stroke="#c8b898" stroke-width="0.2" opacity="0.3"/>
  <line x1="17" y1="25.5" x2="25" y2="25.5" stroke="#c8b898" stroke-width="0.3" opacity="0.5"/>
  <line x1="17" y1="25" x2="25" y2="25" stroke="#c8b898" stroke-width="0.2" opacity="0.3"/>
  <!-- Spine -->
  <rect x="15.2" y="4.5" width="1.6" height="23" fill="#4a2008" rx="0.3"/>
  <line x1="16" y1="5" x2="16" y2="27" stroke="#6b3a18" stroke-width="0.4" opacity="0.5"/>
  <!-- Spine bands -->
  <rect x="15" y="7" width="2" height="0.8" rx="0.2" fill="#8b5e3c" opacity="0.6"/>
  <rect x="15" y="23" width="2" height="0.8" rx="0.2" fill="#8b5e3c" opacity="0.6"/>
  <!-- Sword diagram on left page -->
  <line x1="11" y1="9" x2="11" y2="21" stroke="#444" stroke-width="0.8"/>
  <!-- Blade -->
  <path d="M10.4 9 L11 7.5 L11.6 9 L11.6 17 L10.4 17Z" fill="#8899aa" stroke="#556" stroke-width="0.3"/>
  <path d="M10.7 9 L11 8 L11.3 9 L11.3 16" fill="white" opacity="0.2"/>
  <!-- Guard -->
  <rect x="9" y="17" width="4" height="1" rx="0.3" fill="#8b6914" stroke="#6b4a0a" stroke-width="0.2"/>
  <!-- Grip -->
  <rect x="10.3" y="18" width="1.4" height="2.5" rx="0.2" fill="#5c3a1a"/>
  <line x1="10.5" y1="18.5" x2="11.5" y2="18.5" stroke="#7a5030" stroke-width="0.3"/>
  <line x1="10.5" y1="19.2" x2="11.5" y2="19.2" stroke="#7a5030" stroke-width="0.3"/>
  <line x1="10.5" y1="19.9" x2="11.5" y2="19.9" stroke="#7a5030" stroke-width="0.3"/>
  <!-- Pommel -->
  <circle cx="11" cy="21" r="0.8" fill="#8b6914" stroke="#6b4a0a" stroke-width="0.2"/>
  <!-- Diagram lines/annotations on left -->
  <line x1="7.5" y1="12" x2="9.8" y2="12" stroke="#884422" stroke-width="0.3" stroke-dasharray="0.5,0.5"/>
  <line x1="7.5" y1="15" x2="9.8" y2="15" stroke="#884422" stroke-width="0.3" stroke-dasharray="0.5,0.5"/>
  <line x1="7.5" y1="18" x2="9" y2="17.5" stroke="#884422" stroke-width="0.3" stroke-dasharray="0.5,0.5"/>
  <!-- Text lines on right page -->
  <line x1="18" y1="9" x2="24" y2="9" stroke="#886644" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="10.5" x2="24" y2="10.5" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="12" x2="23" y2="12" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="13.5" x2="24" y2="13.5" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="15" x2="22" y2="15" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="17" x2="24" y2="17" stroke="#886644" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="18.5" x2="24" y2="18.5" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="20" x2="23" y2="20" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <line x1="18" y1="21.5" x2="24" y2="21.5" stroke="#886644" stroke-width="0.3" opacity="0.3"/>
  <!-- Red accent marks -->
  <circle cx="18.5" cy="9" r="0.4" fill="#aa3322" opacity="0.6"/>
  <circle cx="18.5" cy="17" r="0.4" fill="#aa3322" opacity="0.6"/>
  <!-- Cover edge highlight -->
  <path d="M5 5 L5 26" stroke="#8b5e3c" stroke-width="0.3" opacity="0.4"/>
  <path d="M27 5 L27 26" stroke="#8b5e3c" stroke-width="0.3" opacity="0.3"/>
  <!-- Top cover edges -->
  <line x1="5" y1="5" x2="15.2" y2="5" stroke="#4a2008" stroke-width="0.5"/>
  <line x1="16.8" y1="5" x2="27" y2="5" stroke="#4a2008" stroke-width="0.5"/>
  <!-- Page glow -->
  <rect x="7" y="7" width="8" height="18" rx="0.5" fill="#fff8e0" opacity="0.08"/>
  <defs>
    <linearGradient id="tm1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0c0a0"/>
      <stop offset="100%" stop-color="#f0e8d8" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>