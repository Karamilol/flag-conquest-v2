<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ca_metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="40%" stop-color="#777"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <radialGradient id="ca_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#ca_glow)"/>
  <!-- Ground surface -->
  <path d="M2 26 Q8 24 16 25 Q24 24 30 26 L30 30 L2 30 Z" fill="#665544" opacity="0.3"/>
  <!-- Caltrop 1 (center, large) -->
  <g transform="translate(14,16)">
    <line x1="0" y1="-5" x2="0" y2="3" stroke="url(#ca_metal)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="4" y2="-1" stroke="url(#ca_metal)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="3" x2="-3" y2="-1" stroke="url(#ca_metal)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Spike tips -->
    <circle cx="0" cy="-5.5" r="0.5" fill="#ccc"/>
    <circle cx="-4.3" cy="2.3" r="0.5" fill="#ccc"/>
    <circle cx="4.3" cy="3.3" r="0.5" fill="#ccc"/>
    <!-- Center joint -->
    <circle cx="0" cy="0" r="1.2" fill="#888" stroke="#555" stroke-width="0.4"/>
    <circle cx="-0.3" cy="-0.3" r="0.4" fill="white" opacity="0.25"/>
    <!-- Highlight on top spike -->
    <line x1="-0.3" y1="-4" x2="-0.3" y2="-1" stroke="white" stroke-width="0.3" opacity="0.2"/>
  </g>
  <!-- Caltrop 2 (left) -->
  <g transform="translate(6,22) scale(0.8)">
    <line x1="0" y1="-5" x2="0" y2="3" stroke="#888" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="4" y2="-1" stroke="#888" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="3" x2="-3" y2="-1" stroke="#888" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="0" cy="-5.5" r="0.5" fill="#bbb"/>
    <circle cx="0" cy="0" r="1" fill="#777" stroke="#555" stroke-width="0.3"/>
    <circle cx="-0.3" cy="-0.3" r="0.3" fill="white" opacity="0.2"/>
  </g>
  <!-- Caltrop 3 (right) -->
  <g transform="translate(24,20) scale(0.75) rotate(30)">
    <line x1="0" y1="-5" x2="0" y2="3" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="4" y2="-1" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="3" x2="-3" y2="-1" stroke="#999" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="0" cy="-5.5" r="0.5" fill="#ccc"/>
    <circle cx="0" cy="0" r="1" fill="#888" stroke="#555" stroke-width="0.3"/>
  </g>
  <!-- Caltrop 4 (small, back) -->
  <g transform="translate(18,10) scale(0.6) rotate(-20)">
    <line x1="0" y1="-5" x2="0" y2="3" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="4" y2="-1" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="3" x2="-3" y2="-1" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="0.9" fill="#666" stroke="#444" stroke-width="0.3"/>
  </g>
  <!-- Caltrop 5 (small, far left) -->
  <g transform="translate(8,12) scale(0.55) rotate(45)">
    <line x1="0" y1="-5" x2="0" y2="3" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="4" y2="-1" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="3" x2="-3" y2="-1" stroke="#777" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="0.9" fill="#666" stroke="#444" stroke-width="0.3"/>
  </g>
  <!-- Metal gleam effects -->
  <circle cx="14" cy="11" r="0.4" fill="white" opacity="0.4"/>
  <circle cx="20" cy="18" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="8" cy="19" r="0.3" fill="white" opacity="0.3"/>
</svg>