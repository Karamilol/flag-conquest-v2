<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="fs_body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#88ee88"/>
      <stop offset="60%" stop-color="#44bb44"/>
      <stop offset="100%" stop-color="#228822"/>
    </radialGradient>
    <radialGradient id="fs_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ff88" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#88ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fs_eye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ddeedd"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="16" cy="18" r="14" fill="url(#fs_glow)"/>
  <!-- Shadow -->
  <ellipse cx="16" cy="28" rx="10" ry="2" fill="#226622" opacity="0.3"/>
  <!-- Slime body -->
  <path d="M5 26 Q5 14 9 10 Q12 7 16 6 Q20 7 23 10 Q27 14 27 26 Z" fill="url(#fs_body)" stroke="#1a7722" stroke-width="0.5"/>
  <!-- Body highlight (left) -->
  <path d="M8 22 Q8 15 11 11 Q13 9 15 8" stroke="white" stroke-width="1.2" fill="none" opacity="0.2" stroke-linecap="round"/>
  <!-- Body sheen blob -->
  <ellipse cx="11" cy="14" rx="2.5" ry="3.5" fill="white" opacity="0.12" transform="rotate(-15 11 14)"/>
  <!-- Drip detail left -->
  <path d="M7 25 Q6 27 7 29 Q8 28 7 26" fill="#33aa33" opacity="0.6"/>
  <!-- Drip detail right -->
  <path d="M25 24 Q26 27 25 29 Q24 27 25 25" fill="#33aa33" opacity="0.6"/>
  <!-- Left eye -->
  <ellipse cx="12" cy="16" rx="2.5" ry="3" fill="url(#fs_eye)" stroke="#449944" stroke-width="0.3"/>
  <ellipse cx="12.5" cy="16.5" rx="1.2" ry="1.5" fill="#224422"/>
  <circle cx="12" cy="15.5" r="0.6" fill="white" opacity="0.8"/>
  <!-- Right eye -->
  <ellipse cx="20" cy="16" rx="2.5" ry="3" fill="url(#fs_eye)" stroke="#449944" stroke-width="0.3"/>
  <ellipse cx="20.5" cy="16.5" rx="1.2" ry="1.5" fill="#224422"/>
  <circle cx="20" cy="15.5" r="0.6" fill="white" opacity="0.8"/>
  <!-- Cute smile -->
  <path d="M12 21 Q14 24 16 24 Q18 24 20 21" stroke="#1a6622" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- Blush cheeks -->
  <ellipse cx="9.5" cy="20" rx="1.8" ry="1" fill="#ff8888" opacity="0.2"/>
  <ellipse cx="22.5" cy="20" rx="1.8" ry="1" fill="#ff8888" opacity="0.2"/>
  <!-- Sparkle -->
  <circle cx="24" cy="8" r="0.7" fill="#aaffaa" opacity="0.6"/>
  <circle cx="7" cy="9" r="0.5" fill="#aaffaa" opacity="0.5"/>
  <!-- Bubble detail -->
  <circle cx="22" cy="12" r="1" fill="white" opacity="0.15" stroke="white" stroke-width="0.2" stroke-opacity="0.2"/>
</svg>