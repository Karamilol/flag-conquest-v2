<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="rd_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ddff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#88ddff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rd_glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbddee"/>
      <stop offset="40%" stop-color="#88bbdd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6699bb" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="rd_sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4a0"/>
      <stop offset="100%" stop-color="#cc9944"/>
    </linearGradient>
    <linearGradient id="rd_frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="16" cy="16" r="14" fill="url(#rd_glow)"/>
  <!-- Top frame cap -->
  <rect x="10" y="3" width="12" height="2.5" rx="1" fill="url(#rd_frame)" stroke="#6a4a10" stroke-width="0.4"/>
  <rect x="10.5" y="3.3" width="5" height="1" rx="0.5" fill="white" opacity="0.15"/>
  <!-- Bottom frame cap -->
  <rect x="10" y="26.5" width="12" height="2.5" rx="1" fill="url(#rd_frame)" stroke="#6a4a10" stroke-width="0.4"/>
  <rect x="10.5" y="26.8" width="5" height="1" rx="0.5" fill="white" opacity="0.15"/>
  <!-- Upper glass bulb -->
  <path d="M14 5.5 Q10 8 10 12 L10 14 Q10 15.5 13 16 L19 16 Q22 15.5 22 14 L22 12 Q22 8 18 5.5 Z" fill="url(#rd_glass)" stroke="#7799aa" stroke-width="0.5"/>
  <!-- Upper glass highlight -->
  <path d="M14.5 6 Q11.5 8.5 11.5 11.5 L11.5 12" stroke="white" stroke-width="0.6" fill="none" opacity="0.4"/>
  <!-- Lower glass bulb -->
  <path d="M14 26.5 Q10 24 10 20 L10 18 Q10 16.5 13 16 L19 16 Q22 16.5 22 18 L22 20 Q22 24 18 26.5 Z" fill="url(#rd_glass)" stroke="#7799aa" stroke-width="0.5"/>
  <!-- Sand in top (small amount remaining) -->
  <path d="M14.5 13 L15.5 15.5 L16.5 15.5 L17.5 13 Q18 12.5 17 12.5 L15 12.5 Q14 12.5 14.5 13 Z" fill="url(#rd_sand)" opacity="0.8"/>
  <!-- Sand stream -->
  <line x1="16" y1="15.5" x2="16" y2="17" stroke="#ddbb66" stroke-width="0.5" opacity="0.7"/>
  <!-- Sand pile in bottom -->
  <path d="M12 25 Q12 22 14 20.5 L16 19 L18 20.5 Q20 22 20 25 Q20 26 18 26.5 L14 26.5 Q12 26 12 25 Z" fill="url(#rd_sand)" opacity="0.85"/>
  <path d="M13 24 Q13 22 15 20.5 L16 19.5" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
  <!-- Speed lines (right side) -->
  <line x1="24" y1="10" x2="28" y2="10" stroke="#66bbdd" stroke-width="0.6" opacity="0.5"/>
  <line x1="25" y1="13" x2="29" y2="13" stroke="#66bbdd" stroke-width="0.5" opacity="0.4"/>
  <line x1="24" y1="16" x2="28" y2="16" stroke="#66bbdd" stroke-width="0.6" opacity="0.5"/>
  <line x1="25" y1="19" x2="29" y2="19" stroke="#66bbdd" stroke-width="0.5" opacity="0.4"/>
  <line x1="24" y1="22" x2="28" y2="22" stroke="#66bbdd" stroke-width="0.6" opacity="0.5"/>
  <!-- Speed lines (left side) -->
  <line x1="4" y1="11" x2="8" y2="11" stroke="#66bbdd" stroke-width="0.5" opacity="0.4"/>
  <line x1="3" y1="16" x2="7" y2="16" stroke="#66bbdd" stroke-width="0.5" opacity="0.4"/>
  <line x1="4" y1="21" x2="8" y2="21" stroke="#66bbdd" stroke-width="0.5" opacity="0.4"/>
  <!-- Sparkle accents -->
  <circle cx="12" cy="8" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="20" cy="24" r="0.4" fill="#ffe488" opacity="0.5"/>
</svg>