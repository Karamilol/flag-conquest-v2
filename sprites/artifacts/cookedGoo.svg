<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="cg_glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#44ff66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#44ff66" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg_pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="50%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="cg_liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ee66"/>
      <stop offset="100%" stop-color="#228833"/>
    </linearGradient>
    <radialGradient id="cg_fire" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="16" cy="14" r="14" fill="url(#cg_glow)"/>
  <!-- Fire underneath -->
  <path d="M9 28 Q10 24 11 26 Q12 22 13 25 Q14 21 15 24 Q16 20 17 24 Q18 21 19 25 Q20 22 21 26 Q22 24 23 28 Z" fill="url(#cg_fire)" opacity="0.8"/>
  <path d="M11 27 Q12 24 13 26 Q14 22 15 25 Q16 21 17 25 Q18 23 19 27" fill="#ffaa22" opacity="0.5"/>
  <!-- Fire glow -->
  <ellipse cx="16" cy="27" rx="7" ry="3" fill="#ff6600" opacity="0.15"/>
  <!-- Cauldron body -->
  <path d="M6 14 Q5 16 6 24 Q6 26 10 27 L22 27 Q26 26 26 24 Q27 16 26 14 Z" fill="url(#cg_pot)" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Cauldron highlight -->
  <path d="M7 15 Q7 18 7.5 22" stroke="white" stroke-width="0.8" fill="none" opacity="0.1" stroke-linecap="round"/>
  <!-- Cauldron rim -->
  <ellipse cx="16" cy="14" rx="10.5" ry="3" fill="#444" stroke="#222" stroke-width="0.5"/>
  <ellipse cx="16" cy="14" rx="10" ry="2.5" fill="#555"/>
  <path d="M7 13 Q10 12 16 12 Q22 12 25 13" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
  <!-- Green liquid surface -->
  <ellipse cx="16" cy="14.5" rx="9" ry="2" fill="url(#cg_liquid)" opacity="0.85"/>
  <ellipse cx="14" cy="14" rx="4" ry="1" fill="#88ff88" opacity="0.2"/>
  <!-- Bubbles -->
  <circle cx="12" cy="13" r="1.2" fill="#88ff88" opacity="0.4" stroke="#44aa44" stroke-width="0.3"/>
  <circle cx="12" cy="12.5" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="19" cy="14" r="0.9" fill="#88ff88" opacity="0.35" stroke="#44aa44" stroke-width="0.2"/>
  <circle cx="15" cy="13.5" r="0.7" fill="#88ff88" opacity="0.3"/>
  <!-- Rising steam/vapor bubbles -->
  <circle cx="13" cy="10" r="1" fill="#88ff88" opacity="0.15"/>
  <circle cx="11" cy="8" r="1.3" fill="#88ff88" opacity="0.1"/>
  <circle cx="18" cy="9" r="0.8" fill="#88ff88" opacity="0.12"/>
  <circle cx="20" cy="7" r="1.1" fill="#88ff88" opacity="0.08"/>
  <!-- Cauldron handles -->
  <path d="M6 17 Q3 17 3 20 Q3 23 6 23" stroke="#444" stroke-width="1.2" fill="none"/>
  <path d="M26 17 Q29 17 29 20 Q29 23 26 23" stroke="#444" stroke-width="1.2" fill="none"/>
  <!-- Handle highlights -->
  <path d="M5.5 18 Q4 18 4 20" stroke="white" stroke-width="0.3" fill="none" opacity="0.15"/>
</svg>