<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Golden aura -->
  <circle cx="16" cy="14" r="13" fill="#fc0" opacity="0.06"/>
  <circle cx="16" cy="14" r="9" fill="#fd0" opacity="0.08"/>
  <!-- Chain of light - curved connecting line -->
  <path d="M4 16 Q8 8 16 6 Q24 8 28 16" stroke="#fa0" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M6 22 Q10 16 16 14 Q22 16 26 22" stroke="#fa0" stroke-width="0.6" fill="none" opacity="0.2"/>
  <!-- Blessing orb 1 (left) -->
  <circle cx="6" cy="16" r="3" fill="#da0" opacity="0.4"/>
  <circle cx="6" cy="16" r="2" fill="#fc0" opacity="0.5"/>
  <circle cx="6" cy="16" r="1" fill="#fe0" opacity="0.6"/>
  <circle cx="5.3" cy="15.3" r="0.5" fill="white" opacity="0.4"/>
  <!-- Blessing orb 2 (center top) -->
  <circle cx="16" cy="6" r="4" fill="#da0" opacity="0.4"/>
  <circle cx="16" cy="6" r="3" fill="#fc0" opacity="0.5"/>
  <circle cx="16" cy="6" r="1.8" fill="#fe0" opacity="0.6"/>
  <circle cx="15" cy="5" r="0.7" fill="white" opacity="0.4"/>
  <!-- Star in center orb -->
  <path d="M16 3 L16.5 5 L18 5.5 L16.5 6 L16 8 L15.5 6 L14 5.5 L15.5 5 Z" fill="white" opacity="0.5"/>
  <!-- Blessing orb 3 (right) -->
  <circle cx="26" cy="16" r="3" fill="#da0" opacity="0.4"/>
  <circle cx="26" cy="16" r="2" fill="#fc0" opacity="0.5"/>
  <circle cx="26" cy="16" r="1" fill="#fe0" opacity="0.6"/>
  <circle cx="25.3" cy="15.3" r="0.5" fill="white" opacity="0.4"/>
  <!-- Smaller chain orbs -->
  <circle cx="10" cy="10" r="1.5" fill="#fc0" opacity="0.35"/>
  <circle cx="10" cy="10" r="0.8" fill="#fe0" opacity="0.4"/>
  <circle cx="22" cy="10" r="1.5" fill="#fc0" opacity="0.35"/>
  <circle cx="22" cy="10" r="0.8" fill="#fe0" opacity="0.4"/>
  <!-- Descending sparkles -->
  <circle cx="10" cy="20" r="0.8" fill="#fc0" opacity="0.3"/>
  <circle cx="16" cy="22" r="1" fill="#fc0" opacity="0.25"/>
  <circle cx="22" cy="20" r="0.8" fill="#fc0" opacity="0.3"/>
  <circle cx="13" cy="26" r="0.5" fill="#fa0" opacity="0.2"/>
  <circle cx="19" cy="26" r="0.5" fill="#fa0" opacity="0.2"/>
  <circle cx="16" cy="28" r="0.4" fill="#fa0" opacity="0.15"/>
  <!-- Light rays from center -->
  <line x1="16" y1="6" x2="16" y2="1" stroke="#fe0" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="16" y1="6" x2="12" y2="2" stroke="#fe0" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
  <line x1="16" y1="6" x2="20" y2="2" stroke="#fe0" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
  <!-- Sparkle crosses -->
  <path d="M8 24 L8 22.5 M7.25 23.25 L8.75 23.25" stroke="#fc0" stroke-width="0.4" opacity="0.3"/>
  <path d="M24 24 L24 22.5 M23.25 23.25 L24.75 23.25" stroke="#fc0" stroke-width="0.4" opacity="0.3"/>
</svg>