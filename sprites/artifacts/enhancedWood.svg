<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="ew_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ffaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#88ffaa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ew_wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b08830"/>
      <stop offset="50%" stop-color="#8a6a1e"/>
      <stop offset="100%" stop-color="#6a4e12"/>
    </linearGradient>
    <linearGradient id="ew_enchant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44ffaa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22aa66" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ew_metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#ew_glow)"/>
  <!-- Wooden plank body -->
  <rect x="5" y="8" width="22" height="16" rx="1" fill="url(#ew_wood)" stroke="#5a4008" stroke-width="0.5"/>
  <!-- Wood grain lines -->
  <path d="M6 11 Q10 10.5 16 11 Q22 11.5 26 11" stroke="#7a5a14" stroke-width="0.3" fill="none" opacity="0.5"/>
  <path d="M6 14 Q12 13.5 18 14 Q24 14.5 26 14" stroke="#7a5a14" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M6 17 Q10 17.5 16 17 Q22 16.5 26 17" stroke="#7a5a14" stroke-width="0.3" fill="none" opacity="0.5"/>
  <path d="M6 20 Q14 19.5 20 20 Q25 20.5 26 20" stroke="#7a5a14" stroke-width="0.3" fill="none" opacity="0.4"/>
  <!-- Wood knot -->
  <ellipse cx="20" cy="15" rx="1.5" ry="1.2" fill="#6a4e12" stroke="#5a3e08" stroke-width="0.3" opacity="0.6"/>
  <!-- Plank highlight (top edge) -->
  <rect x="6" y="8.3" width="10" height="1.2" rx="0.3" fill="white" opacity="0.08"/>
  <!-- Metal reinforcement corners -->
  <path d="M5 8 L9 8 L9 9 L6 9 L6 12 L5 12 Z" fill="url(#ew_metal)" stroke="#555" stroke-width="0.3"/>
  <path d="M27 8 L23 8 L23 9 L26 9 L26 12 L27 12 Z" fill="url(#ew_metal)" stroke="#555" stroke-width="0.3"/>
  <path d="M5 24 L9 24 L9 23 L6 23 L6 20 L5 20 Z" fill="url(#ew_metal)" stroke="#555" stroke-width="0.3"/>
  <path d="M27 24 L23 24 L23 23 L26 23 L26 20 L27 20 Z" fill="url(#ew_metal)" stroke="#555" stroke-width="0.3"/>
  <!-- Metal highlights -->
  <path d="M5.3 8.3 L7 8.3 L7 8.8 L5.8 8.8 L5.8 10" stroke="white" stroke-width="0.2" fill="none" opacity="0.2"/>
  <!-- Rivets -->
  <circle cx="7" cy="9.5" r="0.5" fill="#888" stroke="#555" stroke-width="0.2"/>
  <circle cx="25" cy="9.5" r="0.5" fill="#888" stroke="#555" stroke-width="0.2"/>
  <circle cx="7" cy="22.5" r="0.5" fill="#888" stroke="#555" stroke-width="0.2"/>
  <circle cx="25" cy="22.5" r="0.5" fill="#888" stroke="#555" stroke-width="0.2"/>
  <!-- Enchantment glow overlay -->
  <rect x="5" y="8" width="22" height="16" rx="1" fill="url(#ew_enchant)" opacity="0.15"/>
  <!-- Enchantment rune lines on plank -->
  <path d="M12 12 L14 10 L16 12 L14 14 Z" stroke="#44ffaa" stroke-width="0.5" fill="#44ffaa" fill-opacity="0.1" opacity="0.5"/>
  <line x1="14" y1="10" x2="14" y2="14" stroke="#44ffaa" stroke-width="0.4" opacity="0.4"/>
  <line x1="12" y1="12" x2="16" y2="12" stroke="#44ffaa" stroke-width="0.4" opacity="0.4"/>
  <!-- Magic particles -->
  <circle cx="9" cy="13" r="0.6" fill="#66ffbb" opacity="0.4"/>
  <circle cx="22" cy="11" r="0.5" fill="#66ffbb" opacity="0.35"/>
  <circle cx="15" cy="19" r="0.7" fill="#66ffbb" opacity="0.3"/>
  <circle cx="24" cy="18" r="0.4" fill="#88ffcc" opacity="0.4"/>
  <circle cx="8" cy="19" r="0.5" fill="#88ffcc" opacity="0.3"/>
  <!-- Edge glow -->
  <rect x="5" y="8" width="22" height="16" rx="1" fill="none" stroke="#44ffaa" stroke-width="0.6" opacity="0.2"/>
  <!-- Sparkle -->
  <circle cx="3" cy="10" r="0.5" fill="#88ffcc" opacity="0.5"/>
  <circle cx="29" cy="14" r="0.4" fill="#88ffcc" opacity="0.4"/>
</svg>