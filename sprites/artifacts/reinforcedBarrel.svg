<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Shadow -->
  <ellipse cx="16" cy="29" rx="10" ry="2.5" fill="#000" opacity="0.12"/>
  <!-- Cannon barrel body -->
  <rect x="6" y="10" width="22" height="12" rx="2" fill="#555"/>
  <rect x="6" y="10" width="22" height="6" rx="2" fill="#666" opacity="0.4"/>
  <!-- Barrel bore (dark opening) -->
  <ellipse cx="28" cy="16" rx="1.5" ry="5" fill="#222"/>
  <ellipse cx="28" cy="16" rx="1" ry="4" fill="#111"/>
  <!-- Barrel taper at muzzle -->
  <path d="M26 9 L29 10 L29 22 L26 23 Z" fill="#4a4a4a"/>
  <path d="M26 9 L29 10 L29 16 L26 16 Z" fill="#5a5a5a" opacity="0.4"/>
  <!-- Muzzle ring -->
  <ellipse cx="29" cy="16" rx="1" ry="6" stroke="#777" stroke-width="1" fill="none"/>
  <ellipse cx="29" cy="16" rx="0.8" ry="5.5" stroke="#999" stroke-width="0.3" fill="none" opacity="0.3"/>
  <!-- Reinforcement band 1 -->
  <rect x="10" y="9" width="2.5" height="14" rx="0.3" fill="#888"/>
  <rect x="10" y="9" width="2.5" height="7" rx="0.3" fill="#aaa" opacity="0.3"/>
  <rect x="10" y="9" width="2.5" height="14" rx="0.3" stroke="#666" stroke-width="0.4" fill="none"/>
  <!-- Rivets band 1 -->
  <circle cx="11.2" cy="10.5" r="0.6" fill="#aaa" stroke="#666" stroke-width="0.3"/>
  <circle cx="11.2" cy="21.5" r="0.6" fill="#aaa" stroke="#666" stroke-width="0.3"/>
  <!-- Reinforcement band 2 -->
  <rect x="17" y="9" width="2.5" height="14" rx="0.3" fill="#888"/>
  <rect x="17" y="9" width="2.5" height="7" rx="0.3" fill="#aaa" opacity="0.3"/>
  <rect x="17" y="9" width="2.5" height="14" rx="0.3" stroke="#666" stroke-width="0.4" fill="none"/>
  <!-- Rivets band 2 -->
  <circle cx="18.2" cy="10.5" r="0.6" fill="#aaa" stroke="#666" stroke-width="0.3"/>
  <circle cx="18.2" cy="21.5" r="0.6" fill="#aaa" stroke="#666" stroke-width="0.3"/>
  <!-- Reinforcement band 3 (breech) -->
  <rect x="5" y="9" width="2" height="14" rx="0.3" fill="#888"/>
  <rect x="5" y="9" width="2" height="7" rx="0.3" fill="#aaa" opacity="0.3"/>
  <rect x="5" y="9" width="2" height="14" rx="0.3" stroke="#666" stroke-width="0.4" fill="none"/>
  <!-- Breech cap -->
  <ellipse cx="6" cy="16" rx="1" ry="6" fill="#4a4a4a"/>
  <ellipse cx="6" cy="16" rx="0.7" ry="5" fill="#555" opacity="0.5"/>
  <!-- Barrel highlight (top edge) -->
  <line x1="8" y1="10.5" x2="26" y2="10.5" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <line x1="8" y1="11.5" x2="26" y2="11.5" stroke="white" stroke-width="0.3" opacity="0.1"/>
  <!-- Range indicator lines -->
  <line x1="30" y1="14" x2="32" y2="13" stroke="#f80" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="30" y1="16" x2="32" y2="16" stroke="#fa0" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="30" y1="18" x2="32" y2="19" stroke="#f80" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Barrel outline -->
  <rect x="6" y="10" width="22" height="12" rx="2" stroke="#333" stroke-width="0.5" fill="none"/>
</svg>