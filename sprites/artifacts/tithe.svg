<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Divine light rays (behind coin) -->
  <line x1="16" y1="2" x2="16" y2="8" stroke="#FFF8DC" stroke-width="1.2" opacity="0.3" />
  <line x1="8" y1="4" x2="12" y2="9" stroke="#FFF8DC" stroke-width="1" opacity="0.25" />
  <line x1="24" y1="4" x2="20" y2="9" stroke="#FFF8DC" stroke-width="1" opacity="0.25" />
  <line x1="5" y1="10" x2="10" y2="12" stroke="#FFF8DC" stroke-width="0.8" opacity="0.2" />
  <line x1="27" y1="10" x2="22" y2="12" stroke="#FFF8DC" stroke-width="0.8" opacity="0.2" />
  <line x1="4" y1="16" x2="9" y2="16" stroke="#FFF8DC" stroke-width="0.7" opacity="0.15" />
  <line x1="28" y1="16" x2="23" y2="16" stroke="#FFF8DC" stroke-width="0.7" opacity="0.15" />
  <!-- Divine glow aura -->
  <circle cx="16" cy="16" r="13" fill="#FFF8DC" opacity="0.08" />
  <circle cx="16" cy="16" r="10" fill="#FFD700" opacity="0.1" />
  <!-- Coin shadow -->
  <ellipse cx="17" cy="27" rx="7" ry="2" fill="#1A1A2E" opacity="0.2" />
  <!-- Coin base (edge/thickness) -->
  <ellipse cx="16" cy="17" rx="8" ry="8.5" fill="#8B6914" />
  <ellipse cx="16" cy="16.5" rx="8" ry="8.5" fill="#996B1D" />
  <!-- Coin face -->
  <ellipse cx="16" cy="16" rx="8" ry="8.5" fill="#DAA520" />
  <!-- Coin rim -->
  <ellipse cx="16" cy="16" rx="8" ry="8.5" fill="none" stroke="#B8860B" stroke-width="0.8" />
  <ellipse cx="16" cy="16" rx="7" ry="7.5" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.5" />
  <!-- Inner rim detail -->
  <ellipse cx="16" cy="16" rx="6.2" ry="6.7" fill="none" stroke="#B8860B" stroke-width="0.3" opacity="0.4" />
  <!-- Coin highlight (top-left) -->
  <path d="M10,11 Q12,8 18,8 Q14,9 11,13 Z" fill="white" opacity="0.25" />
  <path d="M10.5,11.5 Q12.5,9 16,8.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.2" />
  <!-- Coin shade (bottom-right) -->
  <path d="M20,22 Q22,20 22,16 Q21,20 18,22 Z" fill="#8B6914" opacity="0.4" />
  <!-- "2x" text -->
  <text x="16" y="18.5" text-anchor="middle" font-family="serif" font-size="8" font-weight="bold" fill="#8B6914">2x</text>
  <text x="15.8" y="18.3" text-anchor="middle" font-family="serif" font-size="8" font-weight="bold" fill="#FFF8DC" opacity="0.9">2x</text>
  <!-- Cross above 2x (divine symbol) -->
  <line x1="16" y1="8.5" x2="16" y2="11.5" stroke="#8B6914" stroke-width="0.8" />
  <line x1="14.5" y1="9.8" x2="17.5" y2="9.8" stroke="#8B6914" stroke-width="0.8" />
  <line x1="16" y1="8.5" x2="16" y2="11.5" stroke="#FFF8DC" stroke-width="0.5" opacity="0.6" />
  <line x1="14.5" y1="9.8" x2="17.5" y2="9.8" stroke="#FFF8DC" stroke-width="0.5" opacity="0.6" />
  <!-- Small decorative dots on rim -->
  <circle cx="16" cy="24" r="0.4" fill="#C9A84C" opacity="0.6" />
  <circle cx="10" cy="20.5" r="0.4" fill="#C9A84C" opacity="0.6" />
  <circle cx="22" cy="20.5" r="0.4" fill="#C9A84C" opacity="0.6" />
  <circle cx="10" cy="11.5" r="0.4" fill="#C9A84C" opacity="0.6" />
  <circle cx="22" cy="11.5" r="0.4" fill="#C9A84C" opacity="0.6" />
  <!-- Top sparkle -->
  <line x1="16" y1="1" x2="16" y2="3" stroke="#FFF8DC" stroke-width="0.5" opacity="0.5" />
  <line x1="15" y1="2" x2="17" y2="2" stroke="#FFF8DC" stroke-width="0.5" opacity="0.5" />
  <!-- Side sparkles -->
  <circle cx="6" cy="8" r="0.5" fill="#FFF8DC" opacity="0.3" />
  <circle cx="26" cy="8" r="0.5" fill="#FFF8DC" opacity="0.3" />
</svg>