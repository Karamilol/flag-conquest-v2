<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fire glow behind -->
  <circle cx="16" cy="14" r="10" fill="#f80" opacity="0.1"/>
  <circle cx="16" cy="12" r="6" fill="#fa0" opacity="0.12"/>
  <!-- Cannonball body -->
  <circle cx="16" cy="18" r="8" fill="#333"/>
  <circle cx="16" cy="18" r="8" fill="#444" opacity="0.4"/>
  <!-- Cannonball shading -->
  <ellipse cx="16" cy="21" rx="7" ry="5" fill="#222" opacity="0.4"/>
  <!-- Cannonball highlight -->
  <circle cx="13" cy="15" r="2.5" fill="#666" opacity="0.3"/>
  <circle cx="12.5" cy="14.5" r="1" fill="#888" opacity="0.3"/>
  <!-- Metal ring/fuse band -->
  <ellipse cx="16" cy="12" rx="3" ry="1" fill="#777" stroke="#555" stroke-width="0.4"/>
  <ellipse cx="16" cy="12" rx="2.5" ry="0.6" fill="#999" opacity="0.3"/>
  <!-- Fuse -->
  <path d="M16 11 Q18 8 17 5 Q16 3 18 2" stroke="#6a4a2a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M16 11 Q17.5 8.5 17 6" stroke="#8a6a4a" stroke-width="0.4" fill="none" opacity="0.5"/>
  <!-- Flames on fuse -->
  <path d="M18 2 Q20 0 19 3 Q21 2 19 5 Q20 4 18 5 Q17 4 18 2" fill="#f60"/>
  <path d="M18 2 Q19.5 1 19 3 Q20 2.5 19 4.5" fill="#fa0" opacity="0.6"/>
  <path d="M18.5 2.5 Q19 2 18.8 3.5" fill="#fe0" opacity="0.5"/>
  <!-- Flame glow -->
  <circle cx="18.5" cy="3" r="2" fill="#f80" opacity="0.15"/>
  <!-- Fire licking around ball -->
  <path d="M10 14 Q8 12 9 10 Q10 12 11 11 Q10 13 10 14" fill="#f60" opacity="0.4"/>
  <path d="M22 14 Q24 12 23 10 Q22 12 21 11 Q22 13 22 14" fill="#f60" opacity="0.4"/>
  <path d="M12 24 Q10 22 11 21 Q12 22 12 24" fill="#f40" opacity="0.3"/>
  <path d="M20 24 Q22 22 21 21 Q20 22 20 24" fill="#f40" opacity="0.3"/>
  <!-- Ember particles -->
  <circle cx="20" cy="1" r="0.4" fill="#fa0" opacity="0.5"/>
  <circle cx="17" cy="0.5" r="0.3" fill="#f80" opacity="0.4"/>
  <circle cx="8" cy="11" r="0.3" fill="#f60" opacity="0.3"/>
  <circle cx="24" cy="11" r="0.3" fill="#f60" opacity="0.3"/>
  <!-- Cannonball outline -->
  <circle cx="16" cy="18" r="8" stroke="#222" stroke-width="0.5" fill="none"/>
  <!-- Ground shadow -->
  <ellipse cx="16" cy="28" rx="7" ry="2" fill="#000" opacity="0.12"/>
</svg>