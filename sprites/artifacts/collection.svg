<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Shadow -->
  <ellipse cx="16" cy="30" rx="13" ry="2" fill="#1a0a00" opacity="0.15"/>
  <!-- Rack/display board background -->
  <rect x="3" y="3" width="26" height="26" rx="1.5" fill="#5a3a1a"/>
  <rect x="3" y="3" width="26" height="26" rx="1.5" fill="url(#co1)" opacity="0.5"/>
  <rect x="3" y="3" width="26" height="26" rx="1.5" fill="none" stroke="#3a2008" stroke-width="0.8"/>
  <!-- Inner felt/velvet backing -->
  <rect x="5" y="5" width="22" height="22" rx="0.8" fill="#2a1830"/>
  <rect x="5" y="5" width="22" height="22" rx="0.8" fill="url(#co2)" opacity="0.4"/>
  <rect x="5" y="5" width="22" height="22" rx="0.8" fill="none" stroke="#1a0a20" stroke-width="0.3"/>
  <!-- Trophy 1 — gold medal (top left) -->
  <line x1="10" y1="6" x2="10" y2="8" stroke="#c8a030" stroke-width="0.5"/>
  <circle cx="10" cy="10.5" r="2.5" fill="#c8a030" stroke="#a08020" stroke-width="0.4"/>
  <circle cx="10" cy="10.5" r="2.5" fill="url(#co3)" opacity="0.5"/>
  <circle cx="10" cy="10.5" r="1.7" fill="none" stroke="#e8d060" stroke-width="0.3" opacity="0.5"/>
  <!-- Star on medal -->
  <path d="M10 8.8 L10.4 9.8 L11.3 9.8 L10.6 10.4 L10.8 11.3 L10 10.8 L9.2 11.3 L9.4 10.4 L8.7 9.8 L9.6 9.8Z" fill="#e8d060" opacity="0.7"/>
  <circle cx="9.5" cy="9.5" r="0.3" fill="white" opacity="0.25"/>
  <!-- Ribbon for medal -->
  <path d="M8.5 6 L10 8 L11.5 6" fill="#cc3030" opacity="0.7"/>
  <path d="M8.8 6.2 L10 7.8 L11.2 6.2" fill="#ee5050" opacity="0.3"/>
  <!-- Trophy 2 — silver shield (top right) -->
  <path d="M19 7 L19 11 Q19 13 22 14 Q25 13 25 11 L25 7Z" fill="#a0a8b0"/>
  <path d="M19 7 L19 11 Q19 13 22 14 Q25 13 25 11 L25 7Z" fill="url(#co4)" opacity="0.5"/>
  <path d="M19 7 L19 11 Q19 13 22 14 Q25 13 25 11 L25 7Z" fill="none" stroke="#707880" stroke-width="0.4"/>
  <!-- Shield cross -->
  <rect x="21.3" y="8" width="1.4" height="5" rx="0.2" fill="#c0c8d0" opacity="0.5"/>
  <rect x="19.8" y="9.5" width="4.4" height="1.4" rx="0.2" fill="#c0c8d0" opacity="0.5"/>
  <!-- Shield highlight -->
  <path d="M20 7.5 L21 7.5 L20 9" fill="white" opacity="0.12"/>
  <!-- Trophy 3 — bronze cup (bottom left) -->
  <path d="M7 18 L7 22 Q7 24.5 10 24.5 Q13 24.5 13 22 L13 18Z" fill="#a07030"/>
  <path d="M7 18 L7 22 Q7 24.5 10 24.5 Q13 24.5 13 22 L13 18Z" fill="url(#co5)" opacity="0.5"/>
  <path d="M7 18 L7 22 Q7 24.5 10 24.5 Q13 24.5 13 22 L13 18Z" fill="none" stroke="#6a4a20" stroke-width="0.4"/>
  <!-- Cup rim -->
  <ellipse cx="10" cy="18" rx="3.5" ry="1" fill="#b88040" stroke="#8a5a28" stroke-width="0.3"/>
  <ellipse cx="10" cy="17.7" rx="2.5" ry="0.5" fill="#c89050" opacity="0.4"/>
  <!-- Cup handles -->
  <path d="M7 19.5 Q5 19.5 5 21 Q5 22.5 7 22.5" fill="none" stroke="#a07030" stroke-width="0.7"/>
  <path d="M13 19.5 Q15 19.5 15 21 Q15 22.5 13 22.5" fill="none" stroke="#a07030" stroke-width="0.7"/>
  <!-- Cup base -->
  <rect x="8.5" y="24.5" width="3" height="1" rx="0.3" fill="#8a5a28"/>
  <rect x="7.5" y="25.5" width="5" height="0.8" rx="0.3" fill="#a07030" stroke="#6a4a20" stroke-width="0.2"/>
  <!-- Trophy 4 — crossed swords badge (bottom right) -->
  <!-- Badge circle -->
  <circle cx="22" cy="22" r="3.5" fill="#8b6914" stroke="#6b4a0a" stroke-width="0.4"/>
  <circle cx="22" cy="22" r="3.5" fill="url(#co6)" opacity="0.4"/>
  <circle cx="22" cy="22" r="2.8" fill="none" stroke="#c8a030" stroke-width="0.3" opacity="0.5"/>
  <!-- Crossed swords -->
  <line x1="20" y1="20" x2="24" y2="24" stroke="#d0d8e0" stroke-width="0.7"/>
  <line x1="24" y1="20" x2="20" y2="24" stroke="#d0d8e0" stroke-width="0.7"/>
  <!-- Sword guards -->
  <circle cx="20.5" cy="20.5" r="0.5" fill="#c8a030" opacity="0.7"/>
  <circle cx="23.5" cy="20.5" r="0.5" fill="#c8a030" opacity="0.7"/>
  <!-- Badge shine -->
  <circle cx="21" cy="21" r="0.4" fill="white" opacity="0.2"/>
  <!-- Decorative nails on frame corners -->
  <circle cx="4.5" cy="4.5" r="0.6" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <circle cx="27.5" cy="4.5" r="0.6" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <circle cx="4.5" cy="27.5" r="0.6" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <circle cx="27.5" cy="27.5" r="0.6" fill="#c8a030" stroke="#a08020" stroke-width="0.2"/>
  <!-- Nail highlights -->
  <circle cx="4.3" cy="4.3" r="0.2" fill="#e8d060" opacity="0.5"/>
  <circle cx="27.3" cy="4.3" r="0.2" fill="#e8d060" opacity="0.5"/>
  <circle cx="4.3" cy="27.3" r="0.2" fill="#e8d060" opacity="0.5"/>
  <circle cx="27.3" cy="27.3" r="0.2" fill="#e8d060" opacity="0.5"/>
  <!-- Frame edge highlight -->
  <line x1="3.5" y1="3.5" x2="28.5" y2="3.5" stroke="#7a5a30" stroke-width="0.3" opacity="0.4"/>
  <line x1="3.5" y1="3.5" x2="3.5" y2="28.5" stroke="#7a5a30" stroke-width="0.3" opacity="0.3"/>
  <defs>
    <linearGradient id="co1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a30"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="co2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a2040"/>
      <stop offset="100%" stop-color="#1a0820"/>
    </linearGradient>
    <radialGradient id="co3" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#eedd60"/>
      <stop offset="100%" stop-color="#a08020"/>
    </radialGradient>
    <linearGradient id="co4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c8d0"/>
      <stop offset="100%" stop-color="#707880"/>
    </linearGradient>
    <linearGradient id="co5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c89050"/>
      <stop offset="100%" stop-color="#7a4a20"/>
    </linearGradient>
    <radialGradient id="co6" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#c8a030"/>
      <stop offset="100%" stop-color="#6b4a0a"/>
    </radialGradient>
  </defs>
</svg>