<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Helmet shadow -->
  <ellipse cx="16" cy="29" rx="8" ry="2" fill="#1a1a1a" opacity="0.15"/>
  <!-- Helmet body (rounded dome) -->
  <path d="M6,18 Q6,6 16,4 Q26,6 26,18 L26,22 Q26,24 24,24 L8,24 Q6,24 6,22 Z" fill="#6a6a6a"/>
  <path d="M7,18 Q7,7 16,5 Q25,7 25,18 L25,21 Q25,23 23,23 L9,23 Q7,23 7,21 Z" fill="#808080"/>
  <!-- Helmet dome highlight -->
  <path d="M10,10 Q12,6 16,5 Q14,7 12,10 Q10,14 10,18" fill="#9a9a9a" opacity="0.4"/>
  <path d="M11,9 Q13,7 15,6 Q14,8 13,11" fill="#b0b0b0" opacity="0.3"/>
  <!-- Central ridge/crest -->
  <path d="M16,3 Q16,2 16,3 L16,24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M16,3 L16,24" fill="none" stroke="#7a7a7a" stroke-width="0.8" opacity="0.5"/>
  <!-- Nose guard -->
  <path d="M15,16 L15,24 L17,24 L17,16 Z" fill="#5a5a5a"/>
  <path d="M15.3,17 L15.3,23.5 L16,23.5 L16,17 Z" fill="#6a6a6a" opacity="0.5"/>
  <!-- Eye slits -->
  <rect x="9" y="17" width="5" height="2" rx="0.5" fill="#1a1a1a"/>
  <rect x="18" y="17" width="5" height="2" rx="0.5" fill="#1a1a1a"/>
  <!-- Eye slit inner glow (eyes within) -->
  <rect x="10" y="17.5" width="3" height="1" rx="0.3" fill="#2a1a08" opacity="0.6"/>
  <rect x="19" y="17.5" width="3" height="1" rx="0.3" fill="#2a1a08" opacity="0.6"/>
  <!-- Brow ridge -->
  <path d="M7,16 L25,16" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M8,15.5 L24,15.5" fill="none" stroke="#8a8a8a" stroke-width="0.4" opacity="0.4"/>
  <!-- Cheek guards -->
  <path d="M6,20 Q5,22 5,25 Q5,27 7,27 L9,27 Q10,27 10,25 L10,23" fill="#6a6a6a"/>
  <path d="M7,21 Q6,23 6,25 Q6,26 7,26 L8,26 Q9,26 9,25 L9,23" fill="#808080" opacity="0.6"/>
  <path d="M26,20 Q27,22 27,25 Q27,27 25,27 L23,27 Q22,27 22,25 L22,23" fill="#6a6a6a"/>
  <path d="M25,21 Q26,23 26,25 Q26,26 25,26 L24,26 Q23,26 23,25 L23,23" fill="#808080" opacity="0.6"/>
  <!-- Bottom rim -->
  <path d="M6,22 Q6,24 8,24 L24,24 Q26,24 26,22" fill="none" stroke="#4a4a4a" stroke-width="1" opacity="0.7"/>
  <!-- Rivets -->
  <circle cx="8" cy="16" r="0.8" fill="#9a9a6a"/>
  <circle cx="8" cy="16" r="0.4" fill="#c0b080" opacity="0.5"/>
  <circle cx="24" cy="16" r="0.8" fill="#9a9a6a"/>
  <circle cx="24" cy="16" r="0.4" fill="#c0b080" opacity="0.5"/>
  <circle cx="10" cy="22" r="0.7" fill="#9a9a6a"/>
  <circle cx="22" cy="22" r="0.7" fill="#9a9a6a"/>
  <!-- Metal sheen -->
  <ellipse cx="13" cy="10" rx="3" ry="4" fill="#ffffff" opacity="0.08" transform="rotate(-15,13,10)"/>
  <!-- Crest plume hint -->
  <path d="M16,3 Q14,1 12,2" fill="none" stroke="#8B2020" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16,3 Q18,1 20,2" fill="none" stroke="#8B2020" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16,3 Q15,1 13,1.5" fill="none" stroke="#a83030" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
</svg>