  <path d="M16,18 L16,26" stroke="#c8a030" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <path d="M13.5,20 Q13,19 14,18.5 Q16,18 18,19 Q19,19.5 18.5,20.5 Q18,21 16,21.5 Q14,22 13.5,23 Q13,24 14,24.5 Q16,25 18,24" fill="none" stroke="#c8a030" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
  <!-- Coins peeking out top -->
