  <ellipse cx="13" cy="11" rx="1.5" ry="0.8" fill="#f0d040" opacity="0.6"/>
  <ellipse cx="19" cy="11" rx="2" ry="1.2" fill="#daa520"/>
  <ellipse cx="19" cy="11" rx="1.5" ry="0.8" fill="#f0c838" opacity="0.6"/>
