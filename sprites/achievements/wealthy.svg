  <path d="M22,16 Q23,20 23,24" fill="none" stroke="#7a5a10" stroke-width="0.7" opacity="0.5"/>
  <path d="M14,16 Q13,22 14,28" fill="none" stroke="#7a5a10" stroke-width="0.4" opacity="0.3"/>
