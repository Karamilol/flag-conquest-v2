  <rect x="9" y="16" width="14" height="1.5" rx="0.3" fill="#6a4a0e" opacity="0.5"/>
  <rect x="9" y="22" width="14" height="1.5" rx="0.3" fill="#6a4a0e" opacity="0.5"/>
