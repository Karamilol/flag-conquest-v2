  <path d="M17,16.3 L18,16.3 L18,17 L19,17 L19,16.3 L20,16.3 L20,17 L21,17 L21,16.3 L22,16.3" fill="none" stroke="#c09830" stroke-width="0.4" opacity="0.6"/>
