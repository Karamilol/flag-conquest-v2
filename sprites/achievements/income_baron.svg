<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background glow -->
  <ellipse cx="16" cy="16" rx="12" ry="12" fill="#ffd700" opacity="0.06"/>
  <!-- Chart base / ground line -->
  <line x1="4" y1="28" x2="28" y2="28" stroke="#5a4020" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="28" x2="4" y2="6" stroke="#5a4020" stroke-width="1" stroke-linecap="round"/>
  <!-- Grid lines -->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#5a4020" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#5a4020" stroke-width="0.3" opacity="0.3"/>
  <line x1="4" y1="10" x2="28" y2="10" stroke="#5a4020" stroke-width="0.3" opacity="0.3"/>
  <!-- Rising bar chart -->
  <rect x="6" y="24" width="3" height="4" rx="0.5" fill="#8B6914"/>
  <rect x="6.3" y="24.3" width="2.4" height="3.4" rx="0.3" fill="#a07a1e" opacity="0.6"/>
  <rect x="11" y="20" width="3" height="8" rx="0.5" fill="#a07a1e"/>
  <rect x="11.3" y="20.3" width="2.4" height="7.4" rx="0.3" fill="#b88a28" opacity="0.6"/>
  <rect x="16" y="15" width="3" height="13" rx="0.5" fill="#b88a28"/>
  <rect x="16.3" y="15.3" width="2.4" height="12.4" rx="0.3" fill="#c89a30" opacity="0.6"/>
  <rect x="21" y="9" width="3" height="19" rx="0.5" fill="#c89a30"/>
  <rect x="21.3" y="9.3" width="2.4" height="18.4" rx="0.3" fill="#daa520" opacity="0.6"/>
  <!-- Rising arrow -->
  <path d="M7,23 L12,19 L17,14 L22,8" fill="none" stroke="#e8b830" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7,23 L12,19 L17,14 L22,8" fill="none" stroke="#f0d040" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M20,6 L24,4 L23,9 Z" fill="#e8b830"/>
  <path d="M21,6.5 L23.5,5 L23,8 Z" fill="#f0d040" opacity="0.5"/>
  <!-- Gold coins on bars -->
  <ellipse cx="7.5" cy="23.5" rx="1.5" ry="0.8" fill="#e8b830"/>
  <ellipse cx="7.5" cy="23.5" rx="1" ry="0.5" fill="#f0d040" opacity="0.5"/>
  <ellipse cx="12.5" cy="19.5" rx="1.5" ry="0.8" fill="#daa520"/>
  <ellipse cx="12.5" cy="19.5" rx="1" ry="0.5" fill="#f0c838" opacity="0.5"/>
  <ellipse cx="17.5" cy="14.5" rx="1.5" ry="0.8" fill="#e8b830"/>
  <ellipse cx="17.5" cy="14.5" rx="1" ry="0.5" fill="#f0d040" opacity="0.5"/>
  <ellipse cx="22.5" cy="8.5" rx="1.5" ry="0.8" fill="#f0c838"/>
  <ellipse cx="22.5" cy="8.5" rx="1" ry="0.5" fill="#fff4a0" opacity="0.5"/>
  <!-- Sparkle at arrow tip -->
  <path d="M25,3 L25.5,1.5 L26,3 L25.5,4.5 Z" fill="#fff8c0" opacity="0.8"/>
  <path d="M24.5,3 L25.5,2.5 L26.5,3 L25.5,3.5 Z" fill="#fff8c0" opacity="0.5"/>
  <!-- Small sparkle -->
  <path d="M28,7 L28.3,6.2 L28.6,7 L28.3,7.8 Z" fill="#fff8c0" opacity="0.5"/>
</svg>