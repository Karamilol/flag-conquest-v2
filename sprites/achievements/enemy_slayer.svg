<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Left sword blade -->
  <path d="M4,4 L8,16 L7,17 L2,6 Z" fill="#b0b0c0" stroke="#7a7a8a" stroke-width="0.4"/>
  <path d="M4.5,5 L7.5,15" fill="none" stroke="#d0d0e0" stroke-width="0.5" opacity="0.5"/>
  <!-- Left sword guard -->
  <path d="M6,16 L9,16 Q9.5,17 9,18 L6,18 Q5.5,17 6,16" fill="#c9a020" stroke="#8B6914" stroke-width="0.3"/>
  <!-- Left sword handle -->
  <path d="M7,18 L8,18 L8.5,22 L7.5,22 Z" fill="#5a3018" stroke="#3a1e0a" stroke-width="0.3"/>
  <path d="M7.2,19 L8.2,19 M7.3,20 L8.3,20 M7.4,21 L8.4,21" stroke="#6a4a20" stroke-width="0.3" opacity="0.5"/>
  <!-- Left sword pommel -->
  <circle cx="8" cy="23" r="1" fill="#c9a020" stroke="#8B6914" stroke-width="0.3"/>
  <circle cx="7.7" cy="22.7" r="0.3" fill="#e0c040" opacity="0.4"/>

  <!-- Right sword blade -->
  <path d="M28,4 L24,16 L25,17 L30,6 Z" fill="#b0b0c0" stroke="#7a7a8a" stroke-width="0.4"/>
  <path d="M27.5,5 L24.5,15" fill="none" stroke="#d0d0e0" stroke-width="0.5" opacity="0.5"/>
  <!-- Right sword guard -->
  <path d="M23,16 L26,16 Q26.5,17 26,18 L23,18 Q22.5,17 23,16" fill="#c9a020" stroke="#8B6914" stroke-width="0.3"/>
  <!-- Right sword handle -->
  <path d="M24,18 L25,18 L25.5,22 L24.5,22 Z" fill="#5a3018" stroke="#3a1e0a" stroke-width="0.3"/>
  <path d="M24.2,19 L25.2,19 M24.3,20 L25.3,20 M24.4,21 L25.4,21" stroke="#6a4a20" stroke-width="0.3" opacity="0.5"/>
  <!-- Right sword pommel -->
  <circle cx="25" cy="23" r="1" fill="#c9a020" stroke="#8B6914" stroke-width="0.3"/>

  <!-- Skull -->
  <path d="M10,10 Q10,5 16,4 Q22,5 22,10 L22,16 Q22,20 19,20 L13,20 Q10,20 10,16 Z" fill="#e8e0d0" stroke="#a09880" stroke-width="0.5"/>
  <!-- Skull forehead highlight -->
  <path d="M12,7 Q16,5 20,7" fill="none" stroke="#f0ece0" stroke-width="0.8" opacity="0.4"/>
  <!-- Skull temple shadows -->
  <path d="M11,10 Q11,7 14,6" fill="none" stroke="#c0b8a0" stroke-width="0.5" opacity="0.4"/>
  <path d="M21,10 Q21,7 18,6" fill="none" stroke="#c0b8a0" stroke-width="0.5" opacity="0.4"/>
  <!-- Left eye socket -->
  <path d="M12,11 Q12,9 14,9 Q15,9 15,11 Q15,13 14,13 Q12,13 12,11" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="0.3"/>
  <circle cx="13.5" cy="10.5" r="0.5" fill="#3a0a0a" opacity="0.5"/>
  <!-- Right eye socket -->
  <path d="M17,11 Q17,9 19,9 Q20,9 20,11 Q20,13 19,13 Q17,13 17,11" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="0.3"/>
  <circle cx="18.5" cy="10.5" r="0.5" fill="#3a0a0a" opacity="0.5"/>
  <!-- Nose cavity -->
  <path d="M15,14 L16,13 L17,14 L16,15.5 Z" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.2"/>
  <!-- Teeth -->
  <path d="M12,18 L12,20 M13.5,18 L13.5,20.5 M15,18 L15,20 M16.5,17.5 L16.5,20 M18,18 L18,20.5 M19.5,18 L19.5,20 M20.5,18 L20.5,19.5" stroke="#d0c8b0" stroke-width="1" stroke-linecap="round"/>
  <!-- Jaw line -->
  <path d="M10,17 L10,20 Q10,22 13,22 L19,22 Q22,22 22,20 L22,17" fill="none" stroke="#c0b8a0" stroke-width="0.5"/>
  <!-- Skull crack -->
  <path d="M14,5 L15,7 L14.5,9" fill="none" stroke="#a09880" stroke-width="0.3" opacity="0.5"/>

  <!-- Blood drips -->
  <circle cx="13" cy="24" r="0.6" fill="#8B1A1A" opacity="0.5"/>
  <circle cx="16" cy="25" r="0.8" fill="#8B1A1A" opacity="0.4"/>
  <circle cx="19" cy="24.5" r="0.5" fill="#8B1A1A" opacity="0.45"/>

  <!-- Glow effect -->
  <ellipse cx="16" cy="14" rx="8" ry="6" fill="#8B1A1A" opacity="0.05"/>
</svg>