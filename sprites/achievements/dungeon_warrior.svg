<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pickaxe handle -->
  <path d="M6,28 L22,6" stroke="#6a4a20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M6.5,27.5 L21.5,6.5" stroke="#8B6914" stroke-width="0.7" opacity="0.4" stroke-linecap="round"/>
  <!-- Handle wood grain -->
  <path d="M8,25 L9,24" stroke="#5a3a18" stroke-width="0.3" opacity="0.4"/>
  <path d="M11,21 L12,20" stroke="#5a3a18" stroke-width="0.3" opacity="0.4"/>
  <path d="M14,17 L15,16" stroke="#5a3a18" stroke-width="0.3" opacity="0.4"/>
  <path d="M17,13 L18,12" stroke="#5a3a18" stroke-width="0.3" opacity="0.4"/>
  <!-- Handle wrap -->
  <path d="M7,27 L8,26 M7.5,26 L8.5,25 M8,25 L9,24" stroke="#4a2810" stroke-width="0.5" opacity="0.6"/>

  <!-- Pickaxe head - right blade -->
  <path d="M22,6 Q26,3 30,2 Q31,1 30,3 Q28,6 24,8 Z" fill="#8a8a9a" stroke="#5a5a6a" stroke-width="0.5"/>
  <path d="M23,6 Q26,4 29,3" fill="none" stroke="#b0b0c0" stroke-width="0.5" opacity="0.4"/>
  <!-- Blade edge highlight -->
  <path d="M27,3 Q29,2 30,2.5" fill="none" stroke="#d0d0e0" stroke-width="0.3" opacity="0.4"/>

  <!-- Pickaxe head - left blade -->
  <path d="M22,6 Q19,3 16,1 Q15,0 17,2 Q19,5 21,7 Z" fill="#8a8a9a" stroke="#5a5a6a" stroke-width="0.5"/>
  <path d="M21,6 Q19,4 17,2" fill="none" stroke="#b0b0c0" stroke-width="0.5" opacity="0.4"/>

  <!-- Head mount ring -->
  <ellipse cx="22" cy="6.5" rx="1.5" ry="1" fill="#6a6a7a" stroke="#4a4a5a" stroke-width="0.3"/>

  <!-- Gem sparks - large -->
  <path d="M26,10 L27,8 L28,10 L27,11 Z" fill="#4a9aff" stroke="#2a6acc" stroke-width="0.3" opacity="0.8"/>
  <path d="M26.5,8.5 L27,9 L27.5,8.5" fill="#8ac4ff" opacity="0.5"/>
  <!-- Gem spark rays -->
  <path d="M27,7 L27,6" stroke="#4a9aff" stroke-width="0.3" opacity="0.4" stroke-linecap="round"/>
  <path d="M29,9 L30,9" stroke="#4a9aff" stroke-width="0.3" opacity="0.4" stroke-linecap="round"/>
  <path d="M28.5,8 L29.5,7" stroke="#4a9aff" stroke-width="0.2" opacity="0.3" stroke-linecap="round"/>

  <!-- Small gem sparks -->
  <circle cx="24" cy="12" r="0.6" fill="#4a9aff" opacity="0.5"/>
  <circle cx="24" cy="12" r="0.3" fill="#8ac4ff" opacity="0.4"/>
  <circle cx="29" cy="5" r="0.5" fill="#4a9aff" opacity="0.4"/>
  <circle cx="14" cy="4" r="0.4" fill="#4a9aff" opacity="0.35"/>

  <!-- Spark particles -->
  <circle cx="25" cy="14" r="0.3" fill="#ffcc44" opacity="0.5"/>
  <circle cx="22" cy="11" r="0.25" fill="#ffcc44" opacity="0.4"/>
  <circle cx="28" cy="12" r="0.3" fill="#ffcc44" opacity="0.45"/>
  <circle cx="20" cy="9" r="0.2" fill="#ffaa00" opacity="0.4"/>

  <!-- Impact lines from mining -->
  <path d="M25,14 L26,16" stroke="#ffcc44" stroke-width="0.3" opacity="0.3" stroke-linecap="round"/>
  <path d="M23,13 L22,15" stroke="#ffcc44" stroke-width="0.3" opacity="0.3" stroke-linecap="round"/>
  <path d="M27,13 L29,14" stroke="#ffcc44" stroke-width="0.3" opacity="0.3" stroke-linecap="round"/>

  <!-- Ground dust -->
  <ellipse cx="6" cy="29.5" rx="3" ry="1" fill="#5a4a30" opacity="0.2"/>
</svg>