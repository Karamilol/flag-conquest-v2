  <!-- Right boot sole -->
  <path d="M15,18 L14,20 Q13,22 15,22 L22,22 Q24,22 24,20 L23,18" fill="#3a1e0a" stroke="#2a1005" stroke-width="0.4"/>
  <path d="M16,20 L22,20" stroke="#5a3a20" stroke-width="0.3" opacity="0.4"/>
  <!-- Right boot laces -->
  <path d="M18,6 L21,6 M18,8 L21,8 M18,10 L21,10" stroke="#8B6914" stroke-width="0.4" opacity="0.6"/>
  <!-- Right boot highlight -->
  <path d="M17,4 Q18,3 19,3" fill="none" stroke="#a07040" stroke-width="0.5" opacity="0.4"/>

  <!-- Motion lines -->
  <path d="M3,14 L1,14" stroke="#c0a060" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <path d="M3,16 L0,17" stroke="#c0a060" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M4,18 L1,20" stroke="#c0a060" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  <!-- Speed dust particles -->
  <circle cx="2" cy="26" r="0.8" fill="#d4b896" opacity="0.4"/>
  <circle cx="5" cy="28" r="1.0" fill="#d4b896" opacity="0.3"/>
  <circle cx="8" cy="29" r="0.6" fill="#d4b896" opacity="0.35"/>
  <circle cx="14" cy="27" r="0.7" fill="#d4b896" opacity="0.25"/>
