<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pole -->
  <path d="M10,2 L10,30" stroke="#6a4a20" stroke-width="2" stroke-linecap="round"/>
  <path d="M10.5,2 L10.5,30" stroke="#8B6914" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <!-- Pole top ornament -->
  <circle cx="10" cy="2.5" r="1.8" fill="#c9a020" stroke="#8B6914" stroke-width="0.5"/>
  <circle cx="10" cy="2.5" r="1" fill="#e0c040" opacity="0.6"/>
  <circle cx="9.5" cy="2" r="0.4" fill="#fff" opacity="0.3"/>

  <!-- Banner fabric -->
  <path d="M11,4 Q20,3 26,5 Q24,9 26,13 Q20,15 11,14 Z" fill="#8B1A1A" stroke="#5a0f0f" stroke-width="0.5"/>
  <!-- Banner wave shadow -->
  <path d="M11,4 Q16,6 20,5 Q24,4 26,5" fill="none" stroke="#6a1010" stroke-width="0.8" opacity="0.5"/>
  <path d="M11,14 Q16,12 20,13 Q24,14 26,13" fill="none" stroke="#6a1010" stroke-width="0.8" opacity="0.5"/>
  <!-- Banner fold highlights -->
  <path d="M14,5 Q17,7 14,9 Q17,11 14,13" fill="none" stroke="#b83030" stroke-width="0.6" opacity="0.5"/>
  <path d="M20,4.5 Q23,7 20,9 Q23,11 20,13.5" fill="none" stroke="#b83030" stroke-width="0.5" opacity="0.4"/>
  <!-- Banner emblem - shield -->
  <path d="M17,6 L20,6 L20,10 Q18.5,12 17,10 Z" fill="#c9a020" stroke="#8B6914" stroke-width="0.4"/>
  <path d="M17.5,7 L19.5,7 L19.5,9.5 Q18.5,11 17.5,9.5 Z" fill="#e0c040" opacity="0.5"/>
  <!-- Banner emblem - cross on shield -->
  <path d="M18.5,6.5 L18.5,10.5 M17.2,8 L19.8,8" stroke="#8B1A1A" stroke-width="0.5"/>
  <!-- Banner tails -->
  <path d="M11,14 L11,18 Q12,17 13,18" fill="none" stroke="#8B1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M13,14 L13,19 Q14,18 15,19" fill="none" stroke="#8B1A1A" stroke-width="1" stroke-linecap="round"/>
  <!-- Wind lines -->
  <path d="M26,7 L29,6" stroke="#c0a060" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  <path d="M27,9 L30,9" stroke="#c0a060" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  <path d="M26,11 L29,12" stroke="#c0a060" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  <!-- Ground -->
  <path d="M6,30 Q10,28 14,30" stroke="#5a4a30" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>