<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Leather armor with metal plates -->
  <!-- Armor body -->
  <path d="M8,6 Q8,4 12,4 L20,4 Q24,4 24,6 L26,24 Q26,28 22,28 L10,28 Q6,28 6,24Z" fill="#6a4a20"/>
  <!-- Lighter panel -->
  <path d="M10,6 Q10,5 14,5 L16,5 L16,26 L12,26 Q8,26 8,22Z" fill="#7a5a30" opacity="0.4"/>
  <!-- Neck hole -->
  <path d="M12,4 Q16,2 20,4" fill="none" stroke="#5a3a15" stroke-width="0.8"/>
  <!-- Metal plates -->
  <rect x="9" y="8" width="6" height="4" rx="0.5" fill="#aabbcc" stroke="#8899aa" stroke-width="0.3"/>
  <rect x="17" y="8" width="6" height="4" rx="0.5" fill="#aabbcc" stroke="#8899aa" stroke-width="0.3"/>
  <rect x="9" y="14" width="6" height="4" rx="0.5" fill="#99aabb" stroke="#8899aa" stroke-width="0.3"/>
  <rect x="17" y="14" width="6" height="4" rx="0.5" fill="#99aabb" stroke="#8899aa" stroke-width="0.3"/>
  <rect x="9" y="20" width="6" height="4" rx="0.5" fill="#8899aa" stroke="#778899" stroke-width="0.3"/>
  <rect x="17" y="20" width="6" height="4" rx="0.5" fill="#8899aa" stroke="#778899" stroke-width="0.3"/>
  <!-- Plate rivets -->
  <circle cx="10" cy="9" r="0.5" fill="#ccddee"/>
  <circle cx="14" cy="9" r="0.5" fill="#ccddee"/>
  <circle cx="18" cy="9" r="0.5" fill="#ccddee"/>
  <circle cx="22" cy="9" r="0.5" fill="#ccddee"/>
  <!-- Plate shine -->
  <path d="M10,8.5 L13,8.5" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.25"/>
  <path d="M18,8.5 L21,8.5" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.25"/>
  <!-- Leather stitching -->
  <line x1="16" y1="5" x2="16" y2="26" stroke="#4a3010" stroke-width="0.3" opacity="0.3" stroke-dasharray="1,1.5"/>
</svg>