<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Glowing magical mushroom -->
  <!-- Glow -->
  <ellipse cx="16" cy="14" rx="12" ry="10" fill="#aa44cc" opacity="0.08"/>
  <!-- Stem -->
  <rect x="13" y="16" width="6" height="10" rx="1" fill="#e8dcc8"/>
  <rect x="13.5" y="16" width="2.5" height="10" rx="0.5" fill="#f0e8d8" opacity="0.4"/>
  <!-- Stem base -->
  <ellipse cx="16" cy="27" rx="5" ry="2" fill="#d8ccb8"/>
  <!-- Cap -->
  <path d="M4,16 Q4,6 16,4 Q28,6 28,16Z" fill="#8833aa"/>
  <!-- Cap highlight -->
  <path d="M6,15 Q6,8 16,6 Q20,5 22,7 L16,16Z" fill="#aa55cc" opacity="0.4"/>
  <!-- Cap spots -->
  <circle cx="10" cy="10" r="2" fill="#cc77ee" opacity="0.6"/>
  <circle cx="18" cy="8" r="1.8" fill="#cc77ee" opacity="0.5"/>
  <circle cx="23" cy="12" r="1.5" fill="#cc77ee" opacity="0.5"/>
  <circle cx="14" cy="14" r="1.2" fill="#cc77ee" opacity="0.4"/>
  <!-- Spot highlights -->
  <circle cx="9.5" cy="9.5" r="0.6" fill="#ddaaff" opacity="0.4"/>
  <circle cx="17.5" cy="7.5" r="0.5" fill="#ddaaff" opacity="0.35"/>
  <!-- Magic sparkles -->
  <circle cx="6" cy="18" r="0.5" fill="#cc88ff" opacity="0.6"/>
  <circle cx="26" cy="16" r="0.4" fill="#cc88ff" opacity="0.5"/>
  <circle cx="4" cy="12" r="0.4" fill="#dd99ff" opacity="0.4"/>
  <circle cx="28" cy="10" r="0.3" fill="#dd99ff" opacity="0.4"/>
  <!-- Cap underside -->
  <path d="M8,16 Q16,18 24,16" fill="none" stroke="#6622aa" stroke-width="0.5" opacity="0.3"/>
</svg>