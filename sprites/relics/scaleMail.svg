<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Scale mail armor piece -->
  <!-- Armor shape -->
  <path d="M6,4 L26,4 L28,26 Q28,30 24,30 L8,30 Q4,30 4,26Z" fill="#888888"/>
  <!-- Scale rows -->
  <g fill="#999999" stroke="#777777" stroke-width="0.3">
    <!-- Row 1 -->
    <ellipse cx="8" cy="8" rx="3" ry="2.5"/>
    <ellipse cx="14" cy="8" rx="3" ry="2.5"/>
    <ellipse cx="20" cy="8" rx="3" ry="2.5"/>
    <ellipse cx="26" cy="8" rx="3" ry="2.5"/>
    <!-- Row 2 (offset) -->
    <ellipse cx="5" cy="12" rx="3" ry="2.5"/>
    <ellipse cx="11" cy="12" rx="3" ry="2.5"/>
    <ellipse cx="17" cy="12" rx="3" ry="2.5"/>
    <ellipse cx="23" cy="12" rx="3" ry="2.5"/>
    <!-- Row 3 -->
    <ellipse cx="8" cy="16" rx="3" ry="2.5"/>
    <ellipse cx="14" cy="16" rx="3" ry="2.5"/>
    <ellipse cx="20" cy="16" rx="3" ry="2.5"/>
    <ellipse cx="26" cy="16" rx="3" ry="2.5"/>
    <!-- Row 4 (offset) -->
    <ellipse cx="5" cy="20" rx="3" ry="2.5"/>
    <ellipse cx="11" cy="20" rx="3" ry="2.5"/>
    <ellipse cx="17" cy="20" rx="3" ry="2.5"/>
    <ellipse cx="23" cy="20" rx="3" ry="2.5"/>
    <!-- Row 5 -->
    <ellipse cx="8" cy="24" rx="3" ry="2.5"/>
    <ellipse cx="14" cy="24" rx="3" ry="2.5"/>
    <ellipse cx="20" cy="24" rx="3" ry="2.5"/>
  </g>
  <!-- Scale highlights -->
  <g fill="#bbbbbb" opacity="0.3">
    <ellipse cx="8" cy="7" rx="1.5" ry="0.8"/>
    <ellipse cx="14" cy="7" rx="1.5" ry="0.8"/>
    <ellipse cx="20" cy="7" rx="1.5" ry="0.8"/>
    <ellipse cx="11" cy="11" rx="1.5" ry="0.8"/>
    <ellipse cx="17" cy="11" rx="1.5" ry="0.8"/>
  </g>
  <!-- Top shine -->
  <path d="M8,4 L18,4" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
</svg>