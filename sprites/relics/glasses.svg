<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Enchanted spectacles with magic glow -->
  <!-- Left lens frame -->
  <circle cx="10" cy="14" r="6" fill="none" stroke="#c4984a" stroke-width="1.5"/>
  <!-- Right lens frame -->
  <circle cx="22" cy="14" r="6" fill="none" stroke="#c4984a" stroke-width="1.5"/>
  <!-- Bridge -->
  <path d="M16,14 Q16,11 16,14" fill="none" stroke="#c4984a" stroke-width="1.2"/>
  <path d="M14,12 Q16,10 18,12" fill="none" stroke="#c4984a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left temple -->
  <path d="M4,14 L2,12 Q1,11 1,14 L1,18" fill="none" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <!-- Right temple -->
  <path d="M28,14 L30,12 Q31,11 31,14 L31,18" fill="none" stroke="#c4984a" stroke-width="1" stroke-linecap="round"/>
  <!-- Left lens (magical blue) -->
  <circle cx="10" cy="14" r="5" fill="#4488cc" opacity="0.2"/>
  <!-- Right lens (magical blue) -->
  <circle cx="22" cy="14" r="5" fill="#4488cc" opacity="0.2"/>
  <!-- Lens shine -->
  <path d="M7,11 Q8,10 10,10" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
  <path d="M19,11 Q20,10 22,10" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
  <!-- Magic glow from lenses -->
  <circle cx="10" cy="14" r="7" fill="#8855cc" opacity="0.06"/>
  <circle cx="22" cy="14" r="7" fill="#8855cc" opacity="0.06"/>
  <!-- Magic sparkles -->
  <circle cx="8" cy="20" r="0.5" fill="#aa88ff" opacity="0.5"/>
  <circle cx="24" cy="20" r="0.4" fill="#aa88ff" opacity="0.4"/>
  <circle cx="12" cy="22" r="0.4" fill="#cc99ff" opacity="0.35"/>
  <circle cx="20" cy="22" r="0.4" fill="#cc99ff" opacity="0.35"/>
  <!-- Vision lines below -->
  <line x1="8" y1="20" x2="6" y2="28" stroke="#aa88ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="12" y1="20" x2="12" y2="28" stroke="#aa88ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="20" y1="20" x2="20" y2="28" stroke="#aa88ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="24" y1="20" x2="26" y2="28" stroke="#aa88ff" stroke-width="0.3" opacity="0.2"/>
</svg>