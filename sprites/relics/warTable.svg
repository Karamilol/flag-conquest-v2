<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- War strategy map/table -->
  <!-- Table surface -->
  <path d="M2,14 L16,8 L30,14 L16,20Z" fill="#8B6914"/>
  <path d="M2,14 L16,8 L16,14Z" fill="#a07a1e" opacity="0.3"/>
  <!-- Table side -->
  <path d="M2,14 L2,18 L16,24 L30,18 L30,14 L16,20Z" fill="#6a4a10"/>
  <path d="M2,14 L2,18 L16,24 L16,20Z" fill="#7a5a14" opacity="0.3"/>
  <!-- Map on table -->
  <path d="M6,13 L16,9 L26,13 L16,17Z" fill="#e8dcc8" opacity="0.6"/>
  <!-- Map markings -->
  <circle cx="12" cy="12" r="0.8" fill="#cc3333" opacity="0.6"/>
  <circle cx="18" cy="11" r="0.8" fill="#3344cc" opacity="0.6"/>
  <circle cx="16" cy="14" r="0.6" fill="#cc3333" opacity="0.5"/>
  <!-- Strategy lines -->
  <path d="M12,12 L16,14" fill="none" stroke="#cc3333" stroke-width="0.4" opacity="0.4" stroke-dasharray="1,1"/>
  <path d="M18,11 L16,14" fill="none" stroke="#3344cc" stroke-width="0.4" opacity="0.4" stroke-dasharray="1,1"/>
  <!-- Flag markers -->
  <line x1="12" y1="12" x2="12" y2="10" stroke="#cc3333" stroke-width="0.4"/>
  <path d="M12,10 L14,10.5 L12,11Z" fill="#cc3333" opacity="0.5"/>
  <line x1="18" y1="11" x2="18" y2="9" stroke="#3344cc" stroke-width="0.4"/>
  <path d="M18,9 L20,9.5 L18,10Z" fill="#3344cc" opacity="0.5"/>
  <!-- Table legs -->
  <line x1="4" y1="18" x2="4" y2="28" stroke="#5a3a10" stroke-width="1.5"/>
  <line x1="28" y1="18" x2="28" y2="28" stroke="#5a3a10" stroke-width="1.5"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#5a3a10" stroke-width="1.5"/>
</svg>