<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blacksmith's heavy hammer -->
  <!-- Handle -->
  <line x1="8" y1="28" x2="18" y2="10" stroke="#6a4a20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="28" x2="18" y2="10" stroke="#8B6914" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Hammer head -->
  <rect x="12" y="4" width="16" height="8" rx="1.5" fill="#777777"/>
  <!-- Head top highlight -->
  <rect x="12" y="4" width="16" height="3" rx="1" fill="#999999" opacity="0.4"/>
  <!-- Head face (striking surface) -->
  <rect x="26" y="4" width="2" height="8" rx="0.5" fill="#888888"/>
  <rect x="26" y="4.5" width="2" height="2" rx="0.3" fill="#aaaaaa" opacity="0.4"/>
  <!-- Peen (back end) -->
  <path d="M12,6 L10,8 L12,10Z" fill="#888888"/>
  <!-- Handle wedge -->
  <rect x="16" y="8" width="4" height="4" rx="0.5" fill="#5a3a15"/>
  <!-- Metal shine -->
  <path d="M14,5 L22,5" fill="none" stroke="#cccccc" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <circle cx="14" cy="5" r="0.5" fill="#ffffff" opacity="0.3"/>
  <!-- Impact sparks -->
  <circle cx="28" cy="3" r="0.5" fill="#ffaa33" opacity="0.5"/>
  <circle cx="30" cy="6" r="0.4" fill="#ffaa33" opacity="0.4"/>
  <circle cx="29" cy="10" r="0.4" fill="#ffcc44" opacity="0.35"/>
  <!-- Handle grip wrap -->
  <g stroke="#4a3010" stroke-width="0.5" opacity="0.5">
    <line x1="10" y1="24" x2="12" y2="23"/>
    <line x1="11" y1="22" x2="13" y2="21"/>
    <line x1="12" y1="20" x2="14" y2="19"/>
  </g>
</svg>