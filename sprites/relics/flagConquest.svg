<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Battle flag planted in ground -->
  <!-- Ground -->
  <path d="M2,26 Q16,24 30,26 L30,30 Q16,28 2,30Z" fill="#5a4a3a" opacity="0.3"/>
  <!-- Pole -->
  <line x1="10" y1="4" x2="10" y2="28" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pole top ornament -->
  <path d="M10,4 L8,2 L10,3 L12,2Z" fill="#daa520"/>
  <!-- Flag -->
  <path d="M11,5 Q20,4 26,7 Q20,10 26,13 Q20,16 11,15Z" fill="#cc3333"/>
  <!-- Flag highlight -->
  <path d="M11,5 Q16,4 20,6 L20,10 Q16,9 11,10Z" fill="#dd5555" opacity="0.4"/>
  <!-- Flag emblem - sword -->
  <line x1="18" y1="7" x2="18" y2="13" stroke="#ffdd88" stroke-width="0.6" opacity="0.6"/>
  <line x1="16" y1="9" x2="20" y2="9" stroke="#ffdd88" stroke-width="0.5" opacity="0.5"/>
  <!-- Flag wave lines -->
  <path d="M14,6 Q16,7 18,6" fill="none" stroke="#aa2222" stroke-width="0.3" opacity="0.3"/>
  <path d="M14,12 Q16,13 18,12" fill="none" stroke="#aa2222" stroke-width="0.3" opacity="0.3"/>
  <!-- Conquest sparkles -->
  <circle cx="26" cy="6" r="0.5" fill="#ffdd44" opacity="0.5"/>
  <circle cx="24" cy="14" r="0.4" fill="#ffdd44" opacity="0.4"/>
  <!-- Ground cracks from planting -->
  <path d="M10,26 L8,28" stroke="#4a3a2a" stroke-width="0.4" opacity="0.4"/>
  <path d="M10,26 L12,28" stroke="#4a3a2a" stroke-width="0.4" opacity="0.4"/>
  <!-- Wind effect on flag -->
  <path d="M26,7 Q28,7 29,6" fill="none" stroke="#cc3333" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
</svg>