<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pair of worn leather boots -->
  <!-- Left boot -->
  <path d="M4,8 L4,22 L2,24 L2,27 L14,27 L14,22 L12,20 L12,8Z" fill="#6a4a20"/>
  <path d="M5,8 L5,21 L8,21 L8,8Z" fill="#7a5a30" opacity="0.4"/>
  <!-- Left sole -->
  <rect x="2" y="27" width="12" height="2" rx="0.5" fill="#3a2a10"/>
  <!-- Left boot top -->
  <path d="M4,8 Q6,6 8,6 Q10,6 12,8" fill="none" stroke="#5a3a15" stroke-width="0.8"/>
  <!-- Left boot crease -->
  <path d="M6,14 Q8,15 10,14" fill="none" stroke="#5a3a15" stroke-width="0.5" opacity="0.4"/>
  <!-- Left patch (worn) -->
  <rect x="6" y="16" width="4" height="3" rx="0.5" fill="#8B6914" opacity="0.4"/>
  <rect x="6" y="16" width="4" height="3" rx="0.5" fill="none" stroke="#5a3a15" stroke-width="0.3" stroke-dasharray="0.8,0.8"/>
  <!-- Right boot -->
  <path d="M18,8 L18,22 L16,24 L16,27 L28,27 L30,24 L28,22 L28,8Z" fill="#6a4a20"/>
  <path d="M19,8 L19,21 L22,21 L22,8Z" fill="#7a5a30" opacity="0.4"/>
  <!-- Right sole -->
  <rect x="16" y="27" width="14" height="2" rx="0.5" fill="#3a2a10"/>
  <!-- Right boot top -->
  <path d="M18,8 Q20,6 22,6 Q24,6 28,8" fill="none" stroke="#5a3a15" stroke-width="0.8"/>
  <!-- Right boot crease -->
  <path d="M20,14 Q22,15 26,14" fill="none" stroke="#5a3a15" stroke-width="0.5" opacity="0.4"/>
  <!-- Scuff marks -->
  <path d="M14,26 Q14.5,25 15,26" fill="none" stroke="#4a3015" stroke-width="0.4" opacity="0.3"/>
  <path d="M28,25 Q29,24 30,25" fill="none" stroke="#4a3015" stroke-width="0.4" opacity="0.3"/>
  <!-- Speed dust -->
  <circle cx="1" cy="26" r="1" fill="#aa9977" opacity="0.2"/>
  <circle cx="31" cy="25" r="0.8" fill="#aa9977" opacity="0.15"/>
</svg>