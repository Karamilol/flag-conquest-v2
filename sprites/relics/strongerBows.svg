<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Reinforced longbow -->
  <!-- Bow limb -->
  <path d="M8,4 Q4,16 8,28" fill="none" stroke="#6a4a20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bow limb highlight -->
  <path d="M8,4 Q5,16 8,28" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Metal reinforcement bands -->
  <rect x="6" y="7" width="4" height="1.5" rx="0.3" fill="#aabbcc"/>
  <rect x="5" y="14" width="5" height="1.5" rx="0.3" fill="#aabbcc"/>
  <rect x="6" y="23" width="4" height="1.5" rx="0.3" fill="#aabbcc"/>
  <!-- Bowstring -->
  <line x1="8" y1="4" x2="8" y2="28" stroke="#c4984a" stroke-width="0.6"/>
  <!-- Arrow nocked -->
  <line x1="8" y1="16" x2="28" y2="16" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M28,16 L24,14 L25,16 L24,18Z" fill="#8899aa"/>
  <!-- Arrow fletching -->
  <path d="M10,15 L8,14 L9,16Z" fill="#cc4444" opacity="0.7"/>
  <path d="M10,17 L8,18 L9,16Z" fill="#aa3333" opacity="0.6"/>
  <!-- Grip wrapping -->
  <rect x="6.5" y="14.5" width="3" height="3" rx="0.5" fill="#4a3010"/>
  <line x1="6.5" y1="15" x2="9.5" y2="15" stroke="#5a4020" stroke-width="0.3"/>
  <line x1="6.5" y1="16" x2="9.5" y2="16" stroke="#5a4020" stroke-width="0.3"/>
  <line x1="6.5" y1="17" x2="9.5" y2="17" stroke="#5a4020" stroke-width="0.3"/>
  <!-- Power glow on arrow -->
  <ellipse cx="24" cy="16" rx="3" ry="1.5" fill="#ffaa33" opacity="0.15"/>
  <!-- Metal shine -->
  <circle cx="7" cy="7.5" r="0.4" fill="#ffffff" opacity="0.3"/>
  <circle cx="6.5" cy="14.5" r="0.3" fill="#ffffff" opacity="0.3"/>
</svg>