<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White flag on pole with healing aura -->
  <!-- Pole -->
  <line x1="8" y1="2" x2="8" y2="30" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="2" x2="8" y2="30" stroke="#a07a1e" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Pole top -->
  <circle cx="8" cy="2" r="1.2" fill="#c4984a"/>
  <!-- Flag cloth -->
  <path d="M9,4 Q18,3 24,6 Q18,9 24,12 Q18,15 9,14Z" fill="#e8e8e8"/>
  <!-- Flag folds/shading -->
  <path d="M9,4 Q14,3 18,5 L18,9 Q14,8 9,9Z" fill="#ffffff" opacity="0.4"/>
  <path d="M18,5 Q22,7 24,6 L24,12 Q22,11 18,9Z" fill="#d0d0d0" opacity="0.3"/>
  <!-- Flag wrinkle lines -->
  <path d="M12,5 Q14,7 12,9" fill="none" stroke="#cccccc" stroke-width="0.3" opacity="0.4"/>
  <path d="M18,6 Q20,8 18,10" fill="none" stroke="#cccccc" stroke-width="0.3" opacity="0.3"/>
  <!-- Healing aura -->
  <circle cx="16" cy="9" r="8" fill="#44cc66" opacity="0.06"/>
  <circle cx="16" cy="9" r="12" fill="#44cc66" opacity="0.03"/>
  <!-- Healing cross on flag -->
  <g transform="translate(16,9)" fill="#cc3333" opacity="0.2">
    <rect x="-0.8" y="-2.5" width="1.6" height="5" rx="0.3"/>
    <rect x="-2.5" y="-0.8" width="5" height="1.6" rx="0.3"/>
  </g>
  <!-- Healing sparkles -->
  <circle cx="20" cy="18" r="0.5" fill="#66ffaa" opacity="0.4"/>
  <circle cx="14" cy="20" r="0.4" fill="#66ffaa" opacity="0.35"/>
  <circle cx="24" cy="14" r="0.4" fill="#88ffcc" opacity="0.3"/>
</svg>