<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pile of iron nails -->
  <!-- Nail 1 (large, center) -->
  <line x1="16" y1="4" x2="16" y2="26" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="4" r="2.5" fill="#aabbcc" stroke="#888888" stroke-width="0.4"/>
  <circle cx="15.5" cy="3.5" r="0.6" fill="#ffffff" opacity="0.3"/>
  <!-- Nail tip -->
  <path d="M15.2,26 L16,28 L16.8,26Z" fill="#777777"/>
  <!-- Nail 2 (left, angled) -->
  <line x1="8" y1="8" x2="12" y2="28" stroke="#888888" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="8" cy="8" r="2" fill="#99aabb" stroke="#888888" stroke-width="0.3"/>
  <circle cx="7.5" cy="7.5" r="0.5" fill="#ffffff" opacity="0.25"/>
  <path d="M11.3,28 L12,30 L12.7,28Z" fill="#777777"/>
  <!-- Nail 3 (right, angled) -->
  <line x1="24" y1="6" x2="22" y2="27" stroke="#888888" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="24" cy="6" r="2" fill="#99aabb" stroke="#888888" stroke-width="0.3"/>
  <circle cx="23.5" cy="5.5" r="0.5" fill="#ffffff" opacity="0.25"/>
  <path d="M21.3,27 L22,29 L22.7,27Z" fill="#777777"/>
  <!-- Nail 4 (small, scattered) -->
  <line x1="6" y1="18" x2="8" y2="24" stroke="#888888" stroke-width="1" stroke-linecap="round"/>
  <circle cx="6" cy="18" r="1.5" fill="#99aabb" stroke="#888888" stroke-width="0.3"/>
  <!-- Nail 5 -->
  <line x1="26" y1="16" x2="24" y2="22" stroke="#888888" stroke-width="1" stroke-linecap="round"/>
  <circle cx="26" cy="16" r="1.5" fill="#99aabb" stroke="#888888" stroke-width="0.3"/>
  <!-- Metal shine -->
  <path d="M15.5,8 L15.5,14" fill="none" stroke="#cccccc" stroke-width="0.3" opacity="0.3"/>
</svg>