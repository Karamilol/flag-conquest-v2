<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fortified house/bunker -->
  <!-- House body -->
  <rect x="6" y="14" width="20" height="14" rx="1" fill="#8B6914"/>
  <rect x="6" y="14" width="20" height="4" rx="0.5" fill="#a07a1e" opacity="0.3"/>
  <!-- Roof -->
  <path d="M4,14 L16,4 L28,14Z" fill="#884422"/>
  <path d="M5,14 L16,5 L16,14Z" fill="#994433" opacity="0.3"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="8" rx="0.5" fill="#5a3a15"/>
  <circle cx="17.5" cy="24" r="0.7" fill="#c4984a"/>
  <!-- Window -->
  <rect x="8" y="17" width="4" height="4" rx="0.3" fill="#445566"/>
  <line x1="10" y1="17" x2="10" y2="21" stroke="#5a3a15" stroke-width="0.4"/>
  <line x1="8" y1="19" x2="12" y2="19" stroke="#5a3a15" stroke-width="0.4"/>
  <!-- Barricade boards on window -->
  <line x1="7" y1="16.5" x2="13" y2="21.5" stroke="#a07a1e" stroke-width="1" stroke-linecap="round"/>
  <line x1="7" y1="21.5" x2="13" y2="16.5" stroke="#a07a1e" stroke-width="1" stroke-linecap="round"/>
  <!-- Shield emblem on door -->
  <path d="M16,21 Q14.5,21.5 14.5,23 Q14.5,24.5 16,25.5 Q17.5,24.5 17.5,23 Q17.5,21.5 16,21Z" fill="#aabbcc" opacity="0.4"/>
  <!-- Defense aura -->
  <path d="M3,28 Q3,12 16,3 Q29,12 29,28" fill="none" stroke="#6688cc" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>
</svg>