<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Bread loaf with healing glow -->
  <!-- Shadow -->
  <ellipse cx="16" cy="26" rx="12" ry="2" fill="#5a3a10" opacity="0.15"/>
  <!-- Bread body -->
  <path d="M4,18 Q4,12 10,10 Q16,8 22,10 Q28,12 28,18 L28,22 Q28,24 24,24 L8,24 Q4,24 4,22Z" fill="#c4984a"/>
  <!-- Bread top highlight -->
  <path d="M6,16 Q6,12 12,10 Q16,9 20,10 Q24,12 24,16Z" fill="#d4a85a" opacity="0.4"/>
  <!-- Score marks on top -->
  <path d="M10,12 Q16,10 22,12" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.4"/>
  <path d="M12,14 Q16,12 20,14" fill="none" stroke="#8B6914" stroke-width="0.4" opacity="0.3"/>
  <!-- Bread crust bottom -->
  <rect x="6" y="22" width="20" height="2" rx="0.5" fill="#b08838" opacity="0.4"/>
  <!-- Bread texture -->
  <circle cx="10" cy="16" r="0.5" fill="#b08838" opacity="0.2"/>
  <circle cx="18" cy="14" r="0.4" fill="#b08838" opacity="0.2"/>
  <circle cx="14" cy="18" r="0.4" fill="#b08838" opacity="0.2"/>
  <!-- Healing glow -->
  <ellipse cx="16" cy="16" rx="10" ry="6" fill="#44cc66" opacity="0.08"/>
  <!-- Healing cross -->
  <g transform="translate(24,8)" opacity="0.5" fill="#44cc66">
    <rect x="-0.5" y="-2" width="1" height="4" rx="0.3"/>
    <rect x="-2" y="-0.5" width="4" height="1" rx="0.3"/>
  </g>
  <!-- Steam wisps -->
  <path d="M12,8 Q11,5 12,3" fill="none" stroke="#ddccbb" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M16,7 Q15,4 16,2" fill="none" stroke="#ddccbb" stroke-width="0.5" opacity="0.25" stroke-linecap="round"/>
  <path d="M20,8 Q19,5 20,3" fill="none" stroke="#ddccbb" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
</svg>