<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Flexing arm with power glow -->
  <!-- Arm -->
  <path d="M8,26 Q6,20 8,16 L14,12 Q18,10 20,12 Q22,14 20,16 L16,18 Q14,20 14,24 L12,28Z" fill="#c49460"/>
  <!-- Bicep highlight -->
  <path d="M10,16 Q12,12 16,12 Q18,11 19,12 L16,14 Q14,16 12,18Z" fill="#d4a470" opacity="0.4"/>
  <!-- Muscle definition -->
  <path d="M12,16 Q14,14 16,14" fill="none" stroke="#a07440" stroke-width="0.5" opacity="0.4"/>
  <path d="M10,20 Q12,18 14,18" fill="none" stroke="#a07440" stroke-width="0.5" opacity="0.3"/>
  <!-- Fist -->
  <circle cx="20" cy="12" r="3.5" fill="#c49460"/>
  <path d="M18,10 Q20,9 22,10" fill="none" stroke="#a07440" stroke-width="0.5" opacity="0.5"/>
  <path d="M18,12 Q20,11 22,12" fill="none" stroke="#a07440" stroke-width="0.4" opacity="0.4"/>
  <!-- Power aura -->
  <circle cx="16" cy="16" r="12" fill="#44cc66" opacity="0.06"/>
  <!-- Speed/power lines -->
  <line x1="22" y1="6" x2="26" y2="4" stroke="#44cc66" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="28" y2="8" stroke="#44cc66" stroke-width="0.7" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="28" y2="14" stroke="#44cc66" stroke-width="0.6" opacity="0.35" stroke-linecap="round"/>
  <!-- Sparkles -->
  <g fill="#88ff88" opacity="0.5">
    <path d="M26,4 L26.3,2.5 L26.6,4 L28,3.5 L26.6,4.3 L26.3,5.5 L26,4.3 L24.5,3.5Z"/>
  </g>
  <circle cx="4" cy="14" r="0.5" fill="#66ff66" opacity="0.4"/>
  <circle cx="6" cy="8" r="0.4" fill="#66ff66" opacity="0.3"/>
  <!-- 3x text -->
  <text x="6" y="10" font-size="5" font-weight="bold" fill="#44cc66" opacity="0.5">3x</text>
</svg>