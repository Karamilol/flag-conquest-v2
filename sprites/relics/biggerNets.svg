<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fishing net with handle -->
  <!-- Handle -->
  <line x1="4" y1="28" x2="14" y2="10" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="28" x2="14" y2="10" stroke="#a07a1e" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <!-- Net frame (hoop) -->
  <ellipse cx="20" cy="12" rx="9" ry="7" fill="none" stroke="#8B6914" stroke-width="1.2"/>
  <!-- Net mesh -->
  <g stroke="#c4984a" stroke-width="0.4" opacity="0.6">
    <line x1="14" y1="8" x2="18" y2="22"/>
    <line x1="17" y1="6" x2="20" y2="20"/>
    <line x1="20" y1="5" x2="22" y2="19"/>
    <line x1="24" y1="6" x2="24" y2="18"/>
    <line x1="27" y1="8" x2="26" y2="17"/>
    <path d="M13,10 Q20,12 28,10" fill="none"/>
    <path d="M12,14 Q20,16 29,14" fill="none"/>
    <path d="M14,17 Q20,20 27,17" fill="none"/>
  </g>
  <!-- Net bag (sagging) -->
  <path d="M14,18 Q20,26 26,18" fill="none" stroke="#c4984a" stroke-width="0.5" opacity="0.5"/>
  <path d="M16,18 Q20,24 24,18" fill="none" stroke="#c4984a" stroke-width="0.4" opacity="0.4"/>
  <!-- Caught slime in net -->
  <circle cx="20" cy="18" r="3" fill="#44cc55" opacity="0.5"/>
  <circle cx="19" cy="17" r="0.8" fill="#88ff99" opacity="0.4"/>
  <!-- Net knots -->
  <circle cx="14" cy="8" r="0.5" fill="#8B6914" opacity="0.5"/>
  <circle cx="27" cy="8" r="0.5" fill="#8B6914" opacity="0.5"/>
</svg>