<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Ticket/voucher with dice and refresh arrows -->
  <!-- Ticket body -->
  <rect x="3" y="8" width="26" height="16" rx="2" fill="#e8dcc8"/>
  <!-- Ticket perforation (left notch) -->
  <circle cx="3" cy="16" r="2.5" fill="#1a0a2e"/>
  <!-- Ticket perforation (right notch) -->
  <circle cx="29" cy="16" r="2.5" fill="#1a0a2e"/>
  <!-- Ticket border -->
  <rect x="3" y="8" width="26" height="16" rx="2" fill="none" stroke="#c4984a" stroke-width="0.8"/>
  <!-- Dashed line separator -->
  <line x1="9" y1="9" x2="9" y2="23" stroke="#c4984a" stroke-width="0.5" stroke-dasharray="1.5,1.5" opacity="0.5"/>
  <!-- Refresh/reroll arrows -->
  <g transform="translate(18,16)">
    <path d="M-4,-1 A4,4 0 1,1 -1,4" fill="none" stroke="#44aa66" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-1,4 L1,3 L0,5.5Z" fill="#44aa66"/>
    <path d="M4,1 A4,4 0 1,1 1,-4" fill="none" stroke="#44aa66" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M1,-4 L-1,-3 L0,-5.5Z" fill="#44aa66"/>
  </g>
  <!-- Star on stub -->
  <g transform="translate(6,16)" fill="#daa520">
    <path d="M0,-2.5 L0.7,-0.8 L2.5,-0.8 L1.1,0.3 L1.6,2 L0,1.1 L-1.6,2 L-1.1,0.3 L-2.5,-0.8 L-0.7,-0.8Z"/>
  </g>
  <!-- Ticket text lines -->
  <line x1="12" y1="11" x2="24" y2="11" stroke="#c4984a" stroke-width="0.4" opacity="0.4"/>
  <line x1="12" y1="21" x2="24" y2="21" stroke="#c4984a" stroke-width="0.4" opacity="0.4"/>
  <!-- Shine -->
  <path d="M5,9 L12,9" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>
</svg>