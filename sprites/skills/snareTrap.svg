<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Bear trap / snare on ground -->
  <!-- Ground shadow -->
  <ellipse cx="16" cy="26" rx="11" ry="3" fill="#3a3020" opacity="0.3"/>
  <!-- Trap base plate -->
  <ellipse cx="16" cy="22" rx="8" ry="2.5" fill="#666666"/>
  <ellipse cx="16" cy="22" rx="8" ry="2.5" fill="none" stroke="#555555" stroke-width="0.5"/>
  <!-- Left jaw -->
  <path d="M8,22 Q6,16 8,10 L10,10 Q9,16 10,22Z" fill="#888888"/>
  <path d="M8,10 L6,8 L8,9 L10,8 L10,10 L8,10Z" fill="#999999"/>
  <!-- Right jaw -->
  <path d="M24,22 Q26,16 24,10 L22,10 Q23,16 22,22Z" fill="#888888"/>
  <path d="M24,10 L26,8 L24,9 L22,8 L22,10 L24,10Z" fill="#999999"/>
  <!-- Jaw teeth left -->
  <path d="M9,12 L7,11" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <path d="M9,14 L7,13.5" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <path d="M9,16 L7,16" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <!-- Jaw teeth right -->
  <path d="M23,12 L25,11" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <path d="M23,14 L25,13.5" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <path d="M23,16 L25,16" stroke="#aaaaaa" stroke-width="1" stroke-linecap="round"/>
  <!-- Center trigger plate -->
  <ellipse cx="16" cy="18" rx="4" ry="1.5" fill="#777777" stroke="#666666" stroke-width="0.4"/>
  <!-- Chain -->
  <path d="M16,24 L16,28" stroke="#888888" stroke-width="1.2"/>
  <circle cx="16" cy="29" r="1.5" fill="none" stroke="#888888" stroke-width="1"/>
  <!-- Metallic shine -->
  <path d="M9,11 L9,15" fill="none" stroke="#cccccc" stroke-width="0.4" opacity="0.4"/>
  <path d="M23,11 L23,15" fill="none" stroke="#cccccc" stroke-width="0.4" opacity="0.4"/>
  <!-- Danger indicator -->
  <circle cx="16" cy="6" r="3" fill="#cc3333" opacity="0.15"/>
  <text x="16" y="8" text-anchor="middle" font-size="5" font-weight="bold" fill="#cc3333" opacity="0.6">!</text>
</svg>