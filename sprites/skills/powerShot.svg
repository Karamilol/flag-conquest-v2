<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Arrow hitting bullseye with power glow -->
  <!-- Target rings -->
  <circle cx="16" cy="16" r="12" fill="#cc3333" stroke="#aa2222" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="9" fill="#ffffff" stroke="#dddddd" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="6" fill="#cc3333" stroke="#aa2222" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="3" fill="#ffffff" stroke="#dddddd" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="1.2" fill="#ffdd00"/>
  <!-- Arrow embedded in center -->
  <line x1="16" y1="16" x2="28" y2="8" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow head in bullseye -->
  <path d="M15,16.5 L16,14 L17,16.5Z" fill="#8899aa" transform="rotate(-40 16 16)"/>
  <!-- Arrow fletching -->
  <path d="M26,9 L28,7 L27,10Z" fill="#cc4444" opacity="0.8"/>
  <path d="M27,8 L29,7 L28,9.5Z" fill="#aa3333" opacity="0.7"/>
  <!-- Impact glow -->
  <circle cx="16" cy="16" r="3" fill="#ffdd00" opacity="0.3"/>
  <circle cx="16" cy="16" r="5" fill="#ffdd00" opacity="0.1"/>
  <!-- Impact lines -->
  <line x1="14" y1="12" x2="12" y2="10" stroke="#ffaa00" stroke-width="0.6" opacity="0.6" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="9" y2="16" stroke="#ffaa00" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="14" y1="20" x2="12" y2="22" stroke="#ffaa00" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
</svg>