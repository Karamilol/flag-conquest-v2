<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Glowing crystal orb with shield -->
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="#6644aa" opacity="0.1"/>
  <!-- Shield bubble -->
  <circle cx="16" cy="16" r="12" fill="#8866cc" opacity="0.15"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#aa88ee" stroke-width="0.8" opacity="0.4"/>
  <!-- Crystal orb -->
  <circle cx="16" cy="16" r="8" fill="#553399"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#7755bb" stroke-width="0.6"/>
  <!-- Inner swirl -->
  <path d="M12,12 Q16,10 20,14 Q22,18 18,20 Q14,22 12,18" fill="none" stroke="#9977dd" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Crystal facets -->
  <path d="M16,8 L20,12 L16,16Z" fill="#7755cc" opacity="0.3"/>
  <path d="M16,8 L12,12 L16,16Z" fill="#6644bb" opacity="0.2"/>
  <!-- Orb highlight -->
  <circle cx="13" cy="13" r="2.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="12.5" cy="12.5" r="1" fill="#ffffff" opacity="0.3"/>
  <!-- Rune marks on shield bubble -->
  <g opacity="0.3" fill="#ccaaff">
    <rect x="15.5" y="3" width="1" height="2" rx="0.3"/>
    <rect x="15.5" y="27" width="1" height="2" rx="0.3"/>
    <rect x="3" y="15.5" width="2" height="1" rx="0.3"/>
    <rect x="27" y="15.5" width="2" height="1" rx="0.3"/>
  </g>
  <!-- Magic particles -->
  <circle cx="8" cy="8" r="0.6" fill="#ccaaff" opacity="0.6"/>
  <circle cx="24" cy="10" r="0.5" fill="#ccaaff" opacity="0.5"/>
  <circle cx="6" cy="22" r="0.5" fill="#ccaaff" opacity="0.5"/>
  <circle cx="26" cy="22" r="0.6" fill="#ccaaff" opacity="0.4"/>
  <!-- Orb base/stand -->
  <path d="M12,24 Q16,26 20,24" fill="none" stroke="#7755bb" stroke-width="0.8" opacity="0.5"/>
</svg>