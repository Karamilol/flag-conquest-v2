<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Billowing smoke cloud -->
  <!-- Base smoke layer -->
  <ellipse cx="16" cy="24" rx="13" ry="5" fill="#556677" opacity="0.3"/>
  <!-- Smoke puffs - back layer -->
  <circle cx="10" cy="18" r="6" fill="#667788" opacity="0.4"/>
  <circle cx="22" cy="17" r="5.5" fill="#667788" opacity="0.35"/>
  <circle cx="16" cy="20" r="7" fill="#778899" opacity="0.4"/>
  <!-- Smoke puffs - mid layer -->
  <circle cx="8" cy="14" r="5" fill="#8899aa" opacity="0.45"/>
  <circle cx="20" cy="12" r="6" fill="#8899aa" opacity="0.4"/>
  <circle cx="14" cy="15" r="5.5" fill="#99aabb" opacity="0.45"/>
  <!-- Smoke puffs - front layer -->
  <circle cx="12" cy="10" r="4.5" fill="#aabbcc" opacity="0.5"/>
  <circle cx="18" cy="9" r="4" fill="#aabbcc" opacity="0.45"/>
  <circle cx="24" cy="13" r="3.5" fill="#99aabb" opacity="0.4"/>
  <!-- Top wisps -->
  <circle cx="10" cy="6" r="3" fill="#bbccdd" opacity="0.35"/>
  <circle cx="16" cy="5" r="3.5" fill="#bbccdd" opacity="0.3"/>
  <circle cx="22" cy="7" r="2.5" fill="#bbccdd" opacity="0.3"/>
  <!-- Wispy trails -->
  <path d="M6,8 Q4,4 6,2" fill="none" stroke="#ccddee" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
  <path d="M20,4 Q22,1 24,2" fill="none" stroke="#ccddee" stroke-width="0.7" opacity="0.2" stroke-linecap="round"/>
  <!-- Inner depth -->
  <circle cx="14" cy="16" r="3" fill="#445566" opacity="0.3"/>
  <circle cx="18" cy="14" r="2.5" fill="#445566" opacity="0.25"/>
</svg>