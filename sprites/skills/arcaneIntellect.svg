<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Glowing spellbook -->
  <!-- Book shadow -->
  <ellipse cx="16" cy="28" rx="10" ry="2" fill="#222244" opacity="0.2"/>
  <!-- Book back cover -->
  <path d="M5,6 L5,26 L27,26 L27,6Z" fill="#3a2266" rx="1"/>
  <!-- Pages -->
  <rect x="6" y="5" width="20" height="20" rx="0.5" fill="#e8dcc8"/>
  <rect x="6" y="5" width="20" height="1" fill="#d8cbb8" opacity="0.5"/>
  <!-- Page lines -->
  <line x1="9" y1="9" x2="23" y2="9" stroke="#c4b8a4" stroke-width="0.4" opacity="0.5"/>
  <line x1="9" y1="11.5" x2="23" y2="11.5" stroke="#c4b8a4" stroke-width="0.4" opacity="0.5"/>
  <line x1="9" y1="14" x2="23" y2="14" stroke="#c4b8a4" stroke-width="0.4" opacity="0.5"/>
  <line x1="9" y1="16.5" x2="20" y2="16.5" stroke="#c4b8a4" stroke-width="0.4" opacity="0.5"/>
  <!-- Book spine -->
  <rect x="4" y="5" width="2.5" height="21" rx="0.5" fill="#4a2a88"/>
  <rect x="4" y="5" width="1" height="21" rx="0.3" fill="#5a3a99" opacity="0.4"/>
  <!-- Spine detail -->
  <rect x="4" y="8" width="2.5" height="0.5" fill="#6a4aaa" opacity="0.3"/>
  <rect x="4" y="22" width="2.5" height="0.5" fill="#6a4aaa" opacity="0.3"/>
  <!-- Magic symbol on page -->
  <circle cx="16" cy="15" r="4" fill="none" stroke="#8855cc" stroke-width="0.6" opacity="0.5"/>
  <path d="M16,11 L13.5,17.5 L19.5,13.5 L12.5,13.5 L18.5,17.5Z" fill="none" stroke="#8855cc" stroke-width="0.5" opacity="0.6"/>
  <!-- Book cover corners -->
  <path d="M5,6 L7,6 L5,8Z" fill="#5a3a99" opacity="0.3"/>
  <path d="M27,6 L25,6 L27,8Z" fill="#5a3a99" opacity="0.3"/>
  <!-- Magic glow from book -->
  <ellipse cx="16" cy="12" rx="8" ry="5" fill="#aa77ff" opacity="0.08"/>
  <!-- Floating glyphs -->
  <circle cx="10" cy="3" r="0.8" fill="#aa88ff" opacity="0.5"/>
  <circle cx="22" cy="2" r="0.6" fill="#aa88ff" opacity="0.4"/>
  <circle cx="16" cy="1" r="0.7" fill="#cc99ff" opacity="0.45"/>
</svg>