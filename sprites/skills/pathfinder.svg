<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rugged boot with speed lines -->
  <!-- Boot body -->
  <path d="M8,10 L8,22 L4,24 L4,27 L24,27 L26,24 L20,22 L20,8 Q18,6 14,6 Q10,6 8,10Z" fill="#6a4a20"/>
  <!-- Boot lighter panel -->
  <path d="M10,10 L10,21 L14,21 L14,8 Q12,7 10,10Z" fill="#7a5a30" opacity="0.5"/>
  <!-- Boot sole -->
  <path d="M4,27 L24,27 L26,28 L26,30 L2,30 L2,28Z" fill="#3a2a10"/>
  <rect x="4" y="28" width="20" height="0.8" fill="#4a3a1a" opacity="0.5"/>
  <!-- Boot top rim -->
  <path d="M8,10 Q10,6 14,6 Q18,6 20,8" fill="none" stroke="#5a3a15" stroke-width="1"/>
  <!-- Laces -->
  <line x1="13" y1="9" x2="16" y2="9" stroke="#c4984a" stroke-width="0.6"/>
  <line x1="12.5" y1="11" x2="16.5" y2="11" stroke="#c4984a" stroke-width="0.6"/>
  <line x1="12" y1="13" x2="17" y2="13" stroke="#c4984a" stroke-width="0.6"/>
  <line x1="11.5" y1="15" x2="17" y2="15" stroke="#c4984a" stroke-width="0.6"/>
  <!-- Speed lines -->
  <line x1="26" y1="14" x2="30" y2="12" stroke="#66ccff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="26" y1="18" x2="31" y2="17" stroke="#66ccff" stroke-width="0.7" opacity="0.4" stroke-linecap="round"/>
  <line x1="25" y1="22" x2="29" y2="22" stroke="#66ccff" stroke-width="0.6" opacity="0.3" stroke-linecap="round"/>
  <!-- Dust puff at heel -->
  <circle cx="4" cy="26" r="2" fill="#aa9977" opacity="0.25"/>
  <circle cx="2" cy="24" r="1.5" fill="#aa9977" opacity="0.2"/>
</svg>