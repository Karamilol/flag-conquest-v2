<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- War drum -->
  <!-- Drum body -->
  <ellipse cx="16" cy="22" rx="10" ry="4" fill="#8B4513"/>
  <rect x="6" y="12" width="20" height="10" fill="#a0522d"/>
  <ellipse cx="16" cy="12" rx="10" ry="4" fill="#d2a06a"/>
  <!-- Drum skin highlight -->
  <ellipse cx="14" cy="11.5" rx="5" ry="2" fill="#e8c89a" opacity="0.4"/>
  <!-- Drum tension ropes -->
  <line x1="7" y1="13" x2="9" y2="22" stroke="#c4984a" stroke-width="0.7"/>
  <line x1="11" y1="12" x2="11" y2="22" stroke="#c4984a" stroke-width="0.7"/>
  <line x1="16" y1="11" x2="16" y2="22" stroke="#c4984a" stroke-width="0.7"/>
  <line x1="21" y1="12" x2="21" y2="22" stroke="#c4984a" stroke-width="0.7"/>
  <line x1="25" y1="13" x2="23" y2="22" stroke="#c4984a" stroke-width="0.7"/>
  <!-- Drum rim -->
  <ellipse cx="16" cy="12" rx="10" ry="4" fill="none" stroke="#6b3410" stroke-width="0.8"/>
  <!-- Drumsticks -->
  <line x1="4" y1="4" x2="13" y2="11" stroke="#d4a85a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="4" cy="4" r="1.5" fill="#e8c89a"/>
  <line x1="28" y1="4" x2="19" y2="11" stroke="#d4a85a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="28" cy="4" r="1.5" fill="#e8c89a"/>
  <!-- Impact lines -->
  <line x1="13" y1="8" x2="11" y2="5" stroke="#ffdd88" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="19" y1="8" x2="21" y2="5" stroke="#ffdd88" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
</svg>