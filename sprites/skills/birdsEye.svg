<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Eagle head profile - scouting -->
  <!-- Head shape -->
  <path d="M8,12 Q8,6 14,4 Q18,3 22,5 Q26,7 26,12 Q26,16 22,18 L14,18 Q10,18 8,15Z" fill="#5a3a1a"/>
  <!-- Lighter belly/chest -->
  <path d="M10,14 Q10,10 14,8 Q16,7 18,8 Q20,9 20,12 Q20,16 16,17 L12,17 Q10,17 10,14Z" fill="#7a5a2a" opacity="0.6"/>
  <!-- Beak -->
  <path d="M22,11 L30,14 L28,16 L22,15Z" fill="#daa520"/>
  <path d="M22,11 L28,13 L22,13Z" fill="#c49420" opacity="0.7"/>
  <!-- Beak hook -->
  <path d="M29,14 Q30,15 28,16" fill="none" stroke="#b08838" stroke-width="0.6"/>
  <!-- Eye -->
  <circle cx="19" cy="10" r="2.5" fill="#ffffff"/>
  <circle cx="19.5" cy="10" r="1.5" fill="#1a1a00"/>
  <circle cx="20" cy="9.5" r="0.5" fill="#ffffff"/>
  <!-- Brow (fierce) -->
  <path d="M16,8 L21,7.5" fill="none" stroke="#3a2a10" stroke-width="1" stroke-linecap="round"/>
  <!-- Head feather tuft -->
  <path d="M10,6 Q8,3 6,2" fill="none" stroke="#5a3a1a" stroke-width="1" stroke-linecap="round"/>
  <path d="M12,5 Q10,2 9,1" fill="none" stroke="#5a3a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Scout mark indicator -->
  <circle cx="8" cy="26" r="4" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  <line x1="8" y1="22" x2="8" y2="24" stroke="#ff4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="8" y1="28" x2="8" y2="30" stroke="#ff4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="4" y1="26" x2="6" y2="26" stroke="#ff4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="26" x2="12" y2="26" stroke="#ff4444" stroke-width="0.8" opacity="0.6"/>
</svg>